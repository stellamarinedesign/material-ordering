<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Warehouse Intake</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="fonts/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- APP CHECK: remove this line to disable App Check (also remove init block in firebase-sync.js) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-check-compat.js"></script>
<script src="js/shared.js"></script>
<script src="js/firebase-sync.js"></script>
<script src="js/intake.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
}

const Warehouse = {
  orders:      [],
  materials:   [],
  consumables: [],
  activeTab:   'materials',
  _filters:    { materials: 'outstanding', consumables: 'outstanding' },
  _openOrders: new Set(),
  _drafts:     new Map(), // cardKey ("orderId|||category") -> { [itemId]: {status, qtyReceived, notes} }
  _unsubOrders: null,
  _connState:  { connected: false, latestVersion: null },
  _noteSaveTimers: {},

  async init() {
    const cfg  = FirebaseConfig.get();
    const name = WarehouseDeviceName.get();
    if (!cfg || !name) { this.showSetup(); return; }
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Could not connect. Check your Firebase config.'); return; }
    this.materials   = await Data.load('./materials.csv');
    this.consumables = await Data.loadConsumables('./consumables.csv');
    this.renderShell();
    this.startListening();
    this.startConnectionStatus();
    this.startVersionCheck();
  },

  // ── SETUP SCREEN ─────────────────────────────────────────────────────
  showSetup(err) {
    const isTest = FirebaseConfig.isTestMode();
    document.getElementById('root').innerHTML = `
      <div class="setup-screen">
        <div class="setup-card">
          <h2><i class="ti ti-warehouse" style="color:#ea580c;vertical-align:-2px"></i> ${isTest ? 'Warehouse — Test Setup' : 'Warehouse Intake Setup'}</h2>
          <p>${isTest ? 'Enter the <strong>test</strong> Firebase config. Saved separately — production config is unchanged.' : 'Connect this device to Firebase and give it a name so intake records are attributed correctly.'}</p>
          ${isTest ? `<div style="background:var(--amber-bg);color:var(--amber-text);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:12px"><i class="ti ti-flask"></i> Test mode is active</div>` : ''}
          ${err ? `<div style="background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:12px">${esc(err)}</div>` : ''}

          <div class="setup-field">
            <label>Device name</label>
            <input id="cfg-name" placeholder="Warehouse iPad" autocomplete="off"
              value="${esc(WarehouseDeviceName.get())}">
          </div>

          <div class="setup-field" style="margin-top:6px">
            <label>Paste Firebase config</label>
            <textarea id="cfg-paste" class="setup-paste-area" placeholder="apiKey|projectId|appId"></textarea>
          </div>
          <div class="setup-divider">or enter manually</div>
          <div class="setup-field"><label>API Key</label><input id="cfg-apiKey" autocomplete="off" placeholder="AIzaSy…"></div>
          <div class="setup-field"><label>Project ID</label><input id="cfg-projectId" autocomplete="off" placeholder="my-project-id"></div>
          <div class="setup-field"><label>App ID</label><input id="cfg-appId" autocomplete="off" placeholder="1:123456:web:abc…"></div>

          <button id="btn-connect" class="btn btn-primary" style="margin-top:8px;width:100%">
            <i class="ti ti-plug"></i> Connect
          </button>
          ${isTest ? `<button id="btn-cancel-test" class="btn btn-outline" style="margin-top:8px;width:100%"><i class="ti ti-arrow-left"></i> Cancel — back to production</button>` : ''}
          <div class="setup-note" style="margin-top:14px">Enter the config string provided by your administrator.</div>
        </div>
      </div>`;

    // Auto-fill fields from paste
    document.getElementById('cfg-paste').addEventListener('input', () => {
      const raw    = document.getElementById('cfg-paste').value;
      const parsed = parseFirebaseConfig(raw);
      if (parsed.apiKey)    document.getElementById('cfg-apiKey').value    = parsed.apiKey;
      if (parsed.projectId) document.getElementById('cfg-projectId').value = parsed.projectId;
      if (parsed.appId)     document.getElementById('cfg-appId').value     = parsed.appId;
    });
    document.getElementById('btn-connect').addEventListener('click', () => this.saveSetup());
    document.getElementById('btn-cancel-test')?.addEventListener('click', () => { FirebaseConfig.setTestMode(false); location.reload(); });
  },

  async saveSetup() {
    const name = document.getElementById('cfg-name').value.trim();
    if (!name) { alert('Please enter a device name.'); return; }

    // Apply paste if present
    const paste = document.getElementById('cfg-paste').value;
    if (paste.trim()) {
      const p = parseFirebaseConfig(paste);
      if (p.apiKey)    document.getElementById('cfg-apiKey').value    = p.apiKey;
      if (p.projectId) document.getElementById('cfg-projectId').value = p.projectId;
      if (p.appId)     document.getElementById('cfg-appId').value     = p.appId;
    }

    const apiKey    = document.getElementById('cfg-apiKey').value.trim();
    const projectId = document.getElementById('cfg-projectId').value.trim();
    const appId     = document.getElementById('cfg-appId').value.trim();
    if (!apiKey || !projectId || !appId) { alert('Please fill in all Firebase config fields.'); return; }

    const cfg = {
      apiKey, projectId, appId,
      authDomain:        `${projectId}.firebaseapp.com`,
      storageBucket:     `${projectId}.appspot.com`,
      messagingSenderId: '000000000000',
    };
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Connection failed. Check your config and try again.'); return; }

    FirebaseConfig.save(cfg);
    WarehouseDeviceName.save(name);
    this.materials   = await Data.load('./materials.csv');
    this.consumables = await Data.loadConsumables('./consumables.csv');
    this.renderShell();
    this.startListening();
    this.startConnectionStatus();
    this.startVersionCheck();
  },

  // ── SHELL ─────────────────────────────────────────────────────────────
  renderShell() {
    const name = WarehouseDeviceName.get();
    document.getElementById('root').innerHTML = `
      <div class="app-root" id="app-root">

        <div class="header">
          <div class="col"><div class="header-inner">
            <div class="header-left">
              <div class="header-title"><i class="ti ti-warehouse" style="opacity:.7;margin-right:6px"></i>Warehouse Intake</div>
              <div class="header-ref">
                <span class="live-dot" id="live-dot"></span><span id="live-label">Live</span>
                &nbsp;·&nbsp; <span id="app-version" style="opacity:.6;font-family:var(--mono)"></span>
              </div>
            </div>
            <div class="header-actions">
              <span class="role-pill">${esc(name)}</span>
              <button class="icon-btn" id="btn-setup" title="Setup"><i class="ti ti-settings"></i></button>
            </div>
          </div></div>
        </div>

        <div id="update-banner-wrap"></div>
        ${FirebaseConfig.isTestMode() ? '<div class="test-mode-banner"><i class="ti ti-flask"></i> Test mode — connected to test database</div>' : ''}

        <!-- TAB BAR -->
        <div style="background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0">
          <div class="col" style="padding:0">
            <div style="display:flex;overflow-x:auto;scrollbar-width:none">
              <button class="main-tab active" id="tab-materials">
                <i class="ti ti-cube"></i>Materials
              </button>
              <button class="main-tab" id="tab-consumables">
                <i class="ti ti-package"></i>Consumables
              </button>
            </div>
          </div>
        </div>

        <!-- MATERIALS VIEW -->
        <div id="view-materials" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0">
          <div class="col" style="padding-top:10px;padding-bottom:0;flex-shrink:0">
            <div class="intake-filter-bar" id="filter-materials">
              <div class="intake-filter-chip" data-filter="all">All</div>
              <div class="intake-filter-chip active" data-filter="outstanding"><i class="ti ti-clock"></i> Outstanding</div>
              <div class="intake-filter-chip" data-filter="backorder"><i class="ti ti-clock-pause"></i> Back Orders</div>
              <div class="intake-filter-chip" data-filter="completed"><i class="ti ti-circle-check"></i> Completed</div>
              <div class="intake-filter-chip" data-filter="cancelled"><i class="ti ti-ban"></i> Cancelled</div>
            </div>
          </div>
          <div class="intake-scroll app-scroll">
            <div class="col"><div class="intake-list" id="intake-list-materials"></div></div>
          </div>
        </div>

        <!-- CONSUMABLES VIEW -->
        <div id="view-consumables" style="display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0">
          <div class="col" style="padding-top:10px;padding-bottom:0;flex-shrink:0">
            <div class="intake-filter-bar" id="filter-consumables">
              <div class="intake-filter-chip" data-filter="all">All</div>
              <div class="intake-filter-chip active" data-filter="outstanding"><i class="ti ti-clock"></i> Outstanding</div>
              <div class="intake-filter-chip" data-filter="backorder"><i class="ti ti-clock-pause"></i> Back Orders</div>
              <div class="intake-filter-chip" data-filter="completed"><i class="ti ti-circle-check"></i> Completed</div>
              <div class="intake-filter-chip" data-filter="cancelled"><i class="ti ti-ban"></i> Cancelled</div>
            </div>
          </div>
          <div class="intake-scroll app-scroll">
            <div class="col"><div class="intake-list" id="intake-list-consumables"></div></div>
          </div>
        </div>

        <!-- SETTINGS PANEL -->
        <div class="panel" id="wh-settings-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-wh-settings"><i class="ti ti-chevron-left"></i>Back</button>
            <div class="panel-title">Settings</div>
          </div>
          <div class="panel-scroll"><div class="panel-col" style="gap:20px">
            <div class="settings-section">
              <div class="settings-label">Database</div>
              <div class="settings-card">
                <div class="settings-row">
                  <div><div class="settings-row-label">Test mode</div><div class="settings-row-sub">Use a separate test Firebase database — shared across all pages on this server</div></div>
                  <button class="btn-sm ${FirebaseConfig.isTestMode()?'btn-sm-danger':''}" id="btn-wh-toggle-test">${FirebaseConfig.isTestMode()?'On — tap to exit':'Off'}</button>
                </div>
              </div>
            </div>
            <div class="settings-section">
              <div class="settings-label">Connection</div>
              <div class="settings-card">
                <div class="settings-row">
                  <div><div class="settings-row-label">Reset connection</div><div class="settings-row-sub">Re-enter device name or Firebase config</div></div>
                  <button class="btn-sm btn-sm-danger" id="btn-wh-reconnect">Reconnect</button>
                </div>
              </div>
            </div>
          </div></div>
        </div>

      </div>`;

    const verEl = document.getElementById('app-version');
    if (verEl) verEl.textContent = APP_VERSION;

    // Tab switching
    document.getElementById('tab-materials').addEventListener('click',   () => this.setTab('materials'));
    document.getElementById('tab-consumables').addEventListener('click', () => this.setTab('consumables'));

    // Filter chips
    document.getElementById('filter-materials').addEventListener('click', e => {
      const chip = e.target.closest('[data-filter]'); if (!chip) return;
      this._filters.materials = chip.dataset.filter;
      document.querySelectorAll('#filter-materials .intake-filter-chip').forEach(c => c.classList.toggle('active', c === chip));
      this.renderList('materials');
    });
    document.getElementById('filter-consumables').addEventListener('click', e => {
      const chip = e.target.closest('[data-filter]'); if (!chip) return;
      this._filters.consumables = chip.dataset.filter;
      document.querySelectorAll('#filter-consumables .intake-filter-chip').forEach(c => c.classList.toggle('active', c === chip));
      this.renderList('consumables');
    });

    // Settings button — opens settings panel (test mode toggle + reconnect option)
    document.getElementById('btn-setup').addEventListener('click', () => this.openPanel('wh-settings-panel'));
    document.getElementById('btn-close-wh-settings').addEventListener('click', () => this.closePanel('wh-settings-panel'));
    document.getElementById('btn-wh-toggle-test').addEventListener('click', () => {
      FirebaseConfig.setTestMode(!FirebaseConfig.isTestMode());
      location.reload();
    });
    document.getElementById('btn-wh-reconnect').addEventListener('click', () => {
      if (confirm('Re-open setup? This will let you change the device name or Firebase config.')) {
        this.showSetup();
      }
    });

    // Wire intake events for both lists
    this._wireIntakeList('materials');
    this._wireIntakeList('consumables');
  },

  _wireIntakeList(type) {
    const container = document.getElementById(`intake-list-${type}`);
    if (!container) return;
    Intake.attachListeners(container, {
      onAction:   (orderId, itemId, action) => this.setItemStatus(orderId, itemId, action),
      onQtyChange:(orderId, itemId, qty)    => this.setPartialQty(orderId, itemId, qty),
      onNoteChange:(orderId, itemId, text)  => this.setNote(orderId, itemId, text),
      onRerender: (orderId)                 => this.rerenderCard(orderId, type),
      onConfirm:  (cardKey)                 => this.onConfirm(cardKey),
    });
  },

  openPanel(id)  { document.getElementById(id)?.classList.add('open'); },
  closePanel(id) { document.getElementById(id)?.classList.remove('open'); },

  setTab(tab) {
    this.activeTab = tab;
    document.getElementById('tab-materials').classList.toggle('active',   tab === 'materials');
    document.getElementById('tab-consumables').classList.toggle('active', tab === 'consumables');
    document.getElementById('view-materials').style.display   = tab === 'materials'   ? 'flex' : 'none';
    document.getElementById('view-consumables').style.display = tab === 'consumables' ? 'flex' : 'none';
  },

  // ── LIVE STATUS ────────────────────────────────────────────────────────
  _renderLiveStatus() {
    const dot  = document.getElementById('live-dot');
    const lbl  = document.getElementById('live-label');
    const wrap = document.getElementById('update-banner-wrap');
    const { connected, latestVersion } = this._connState;
    const outdated = connected && latestVersion && isVersionNewer(latestVersion, APP_VERSION);
    if (dot && lbl) {
      dot.classList.remove('disconnected', 'update-available');
      if (!connected)    { dot.classList.add('disconnected');    lbl.textContent = 'Offline'; }
      else if (outdated) { dot.classList.add('update-available'); lbl.textContent = 'Update Available'; }
      else               { lbl.textContent = 'Live'; }
    }
    if (wrap) {
      wrap.innerHTML = outdated ? `<div class="update-banner">
        <i class="ti ti-refresh"></i>
        <span>A newer version (${esc(latestVersion)}) is available — you're on ${esc(APP_VERSION)}.</span>
        <button id="btn-refresh-update">Refresh</button>
      </div>` : '';
      document.getElementById('btn-refresh-update')?.addEventListener('click', () => location.reload());
    }
  },
  startConnectionStatus() {
    DB.listenConnectionStatus(c => { this._connState.connected = c; this._renderLiveStatus(); });
  },
  startVersionCheck() {
    DB.announceVersionIfNewer(APP_VERSION, isVersionNewer);
    DB.listenAppVersion(v => { this._connState.latestVersion = v; this._renderLiveStatus(); });
  },

  // ── LIVE DATA ─────────────────────────────────────────────────────────
  startListening() {
    this._unsubOrders = DB.listenOrders(orders => {
      this.orders = orders;
      this.renderList('materials');
      this.renderList('consumables');
    });
  },

  renderList(type) {
    const el = document.getElementById(`intake-list-${type}`); if (!el) return;
    el.innerHTML = Intake.renderCategoryList(this.orders, type, this._filters[type], this._openOrders, this._drafts);
  },

  // Looks up a delivery group by groupKey across both types (a card doesn't know its own
  // type ahead of time from the key alone).
  _findGroup(groupKey) {
    const matGroups  = Intake.buildCategoryGroups(this.orders, 'materials');
    const consGroups = Intake.buildCategoryGroups(this.orders, 'consumables');
    return [...matGroups, ...consGroups].find(g => g.groupKey === groupKey);
  },

  // Toggles a card's open/closed state and re-renders it in place. cardKey may be a
  // plain orderId (notes-toggle path — falls back to a full list re-render) or a
  // delivery groupKey (optionally suffixed "|||bo" for the derived back-order-only
  // card) — groupKeys are always DLV-... or legacy:orderId:category, never a bare doc
  // id, which is what lets a bare orderId fall through to the full-rerender branch below.
  rerenderCard(cardKey, type) {
    if (this._openOrders.has(cardKey)) this._openOrders.delete(cardKey);
    else this._openOrders.add(cardKey);

    let isDerived = false, groupKey = cardKey;
    if (groupKey.endsWith('|||bo')) { isDerived = true; groupKey = groupKey.slice(0, -5); }

    const group = this._findGroup(groupKey);
    if (!group) { this.renderList(type || 'materials'); return; }

    const isMat = !group.entries[0].order.type || group.entries[0].order.type === 'materials';
    const t     = type || (isMat ? 'materials' : 'consumables');
    let entries = group.entries;
    if (isDerived) entries = entries.filter(({ order, item }) => Intake._itemStatus(order, item) === 'backorder');

    const safeId = cardKey.replace(/[^a-zA-Z0-9]/g, '_');
    const cardEl = document.getElementById(`intake-card-${safeId}`);
    const draftForCard = this._drafts.get(groupKey);
    const isCancelled = entries.every(({ order }) => !!order.intakeCancelled);
    const opts = { isDerived, readOnly: isCancelled, isCancelledCard: isCancelled, draftForCard };
    if (cardEl) cardEl.outerHTML = Intake.renderCategoryCard(groupKey, group.category, entries, t, this._openOrders, opts);
    else this.renderList(t);
  },

  // ── INTAKE MUTATIONS (staged in _drafts — nothing is saved until Confirm) ──
  // _drafts is keyed by groupKey; each draft's own entries use composite
  // "orderId::itemId" keys since a delivery can span multiple orders (see intake.js).

  setItemStatus(orderId, itemId, action) {
    const order = this.orders.find(o => o._id === orderId); if (!order) return;
    const item = (order.items || []).find(i => String(i.id) === String(itemId)); if (!item) return;
    const groupKey = item.deliveryId || `legacy:${orderId}:${item.category}`;
    if (!this._drafts.has(groupKey)) this._drafts.set(groupKey, {});
    const draft = this._drafts.get(groupKey);
    const key = `${orderId}::${itemId}`;
    const saved = ((order.intake && order.intake.items) || {})[String(itemId)] || {};
    const draftItem = draft[key] || {};
    const currentStatus = draftItem.status !== undefined ? draftItem.status : (saved.status || null);
    if (currentStatus === action) {
      draft[key] = { ...draftItem, status: null, qtyReceived: null };
    } else {
      draft[key] = { ...draftItem, status: action, qtyReceived: action === 'partial' ? (draftItem.qtyReceived ?? saved.qtyReceived ?? null) : null };
    }
    this._rerenderCardOnly(orderId, item.category, groupKey);
  },

  setPartialQty(orderId, itemId, qty) {
    const order = this.orders.find(o => o._id === orderId); if (!order) return;
    const item = (order.items || []).find(i => String(i.id) === String(itemId)); if (!item) return;
    const groupKey = item.deliveryId || `legacy:${orderId}:${item.category}`;
    if (!this._drafts.has(groupKey)) this._drafts.set(groupKey, {});
    const draft = this._drafts.get(groupKey);
    const key = `${orderId}::${itemId}`;
    draft[key] = { ...(draft[key] || {}), qtyReceived: qty };
    this._rerenderCardOnly(orderId, item.category, groupKey);
  },

  setNote(orderId, itemId, text) {
    const order = this.orders.find(o => o._id === orderId); if (!order) return;
    const item = (order.items || []).find(i => String(i.id) === String(itemId)); if (!item) return;
    const groupKey = item.deliveryId || `legacy:${orderId}:${item.category}`;
    if (!this._drafts.has(groupKey)) this._drafts.set(groupKey, {});
    const draft = this._drafts.get(groupKey);
    const key = `${orderId}::${itemId}`;
    draft[key] = { ...(draft[key] || {}), notes: text };
    this._rerenderCardOnly(orderId, item.category, groupKey);
  },

  // Re-renders just the open card showing staged draft edits — no Firestore write,
  // so tab placement never changes until the user hits Confirm.
  _rerenderCardOnly(orderId, category, groupKey) {
    const order = this.orders.find(o => o._id === orderId); if (!order) return;
    const isMat = !order.type || order.type === 'materials';
    const type  = isMat ? 'materials' : 'consumables';
    const group = this._findGroup(groupKey);
    if (!group) return;
    const draftForCard = this._drafts.get(groupKey);

    const fullSafe = groupKey.replace(/[^a-zA-Z0-9]/g, '_');
    const fullEl   = document.getElementById(`intake-card-${fullSafe}`);
    if (fullEl) {
      fullEl.outerHTML = Intake.renderCategoryCard(groupKey, category, group.entries, type, this._openOrders, { draftForCard });
      return;
    }

    const boEntries = group.entries.filter(({ order: o, item }) => Intake._itemStatus(o, item) === 'backorder');
    const boSafe  = `${groupKey}|||bo`.replace(/[^a-zA-Z0-9]/g, '_');
    const boEl    = document.getElementById(`intake-card-${boSafe}`);
    if (boEl) {
      boEl.outerHTML = Intake.renderCategoryCard(groupKey, category, boEntries, type, this._openOrders, { isDerived: true, draftForCard });
    }
  },

  // Validates and saves a card's staged draft to Firestore, then clears it. A delivery
  // can span multiple orders, so this splits the merged draft by which order each item
  // belongs to and writes each order's own intake.items patch separately.
  async onConfirm(cardKey) {
    let groupKey = cardKey;
    if (groupKey.endsWith('|||bo')) groupKey = groupKey.slice(0, -5);

    const group = this._findGroup(groupKey); if (!group) return;
    const draft = this._drafts.get(groupKey); if (!draft) return;

    // The derived back-order-only card's draft is shared with the full card (same
    // underlying items, just a filtered view) — always validate/save against the FULL
    // set of entries, not just the backorder-filtered subset.
    if (!Intake.canConfirmEntries(group.entries, draft)) return;

    const merged = Intake.mergeDraftEntries(group.entries, draft);
    const byOrder = new Map(); // orderId -> { order, fullMap }
    for (const { order, item } of group.entries) {
      if (!byOrder.has(order._id)) {
        byOrder.set(order._id, { order, fullMap: { ...((order.intake && order.intake.items) || {}) } });
      }
      const bucket = byOrder.get(order._id);
      const compositeKey = `${order._id}::${item.id}`;
      const bareKey = String(item.id);
      if (merged[compositeKey]) bucket.fullMap[bareKey] = merged[compositeKey]; else delete bucket.fullMap[bareKey];
    }

    try {
      await Promise.all([...byOrder.values()].map(({ order, fullMap }) => {
        const isMat = !order.type || order.type === 'materials';
        const totalItems = (order.items || []).filter(i => (isMat ? !!i.emailed : true) && !i.rejected).length;
        return DB.updateIntake(order._id, fullMap, WarehouseDeviceName.get(), totalItems);
      }));
      this._drafts.delete(groupKey);
      const isMat = !group.entries[0].order.type || group.entries[0].order.type === 'materials';
      this.renderList(isMat ? 'materials' : 'consumables');
    } catch (e) {
      console.error('Confirm save failed:', e);
      alert('Save failed — please try again.');
    }
  },
};

Warehouse.init();
</script>
</body>
</html>
