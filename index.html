<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Material Orders">
  <title>Material Orders</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="fonts/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .mat-bin {
      width:30px; height:32px; display:flex; align-items:center; justify-content:center;
      background:none; border:none; color:var(--red-text); font-size:15px;
      opacity:0; pointer-events:none; transition:opacity 0.15s; flex-shrink:0;
    }
    .mat-card.in-order .mat-bin { opacity:1; pointer-events:auto; }
    .device-chip {
      font-size:11px; font-family:var(--mono); color:rgba(255,255,255,0.7);
      background:rgba(255,255,255,0.1); border-radius:20px;
      padding:2px 10px; letter-spacing:0.04em;
    }
    /* Prominent header button — stocktakes are worker-run, no manager needed */
    .stocktake-btn {
      display:flex; align-items:center; gap:7px; height:38px; padding:0 16px;
      border-radius:var(--radius); border:1px solid rgba(255,255,255,0.3);
      background:rgba(255,255,255,0.12); color:#fff; font-size:13px; font-weight:600;
      cursor:pointer;
    }
    .stocktake-btn .ti { font-size:16px; }
    .st-recorded { font-family:var(--mono); }
    /* Stocktake mode must be unmistakable from ordering — the list itself reuses the
       ordering cards, so the environment carries the signal: amber header band,
       tinted background, mode-coloured banner, and an accent stripe on every card. */
    #stocktake-panel { background:#fdf6ec; }
    #stocktake-panel .panel-header { background:#b45309; border-bottom-color:#92400e; }
    #stocktake-panel .panel-title { color:#fff; }
    #stocktake-panel .panel-title .ti { vertical-align:-2px; margin-right:6px; }
    #stocktake-panel .back-btn { color:rgba(255,255,255,0.92); }
    #stocktake-panel .mat-card { border-left:4px solid #d97706; }
    .st-mode-banner {
      display:flex; align-items:center; gap:8px; padding:9px 16px;
      font-size:12.5px; font-weight:600; flex-shrink:0; letter-spacing:0.01em;
    }
    .st-mode-banner .ti { font-size:15px; }
    .st-mode-banner.set      { background:var(--blue-bg);  color:var(--blue-text); }
    .st-mode-banner.add      { background:var(--green-bg); color:var(--green-text); }
    .st-mode-banner.subtract { background:var(--red-bg);   color:var(--red-text); }
    /* Review overlay bits (same look as the consumables sign-out overlay) */
    .checkout-name-input {
      width:100%; border:1px solid var(--border); background:var(--bg);
      border-radius:var(--radius); padding:8px 12px; font-size:14px; color:var(--text); outline:none;
    }
    .checkout-name-input:focus { border-color:var(--border2); }
    .signout-card { max-width:380px; }
    .signout-item-list { display:flex; flex-direction:column; gap:6px; max-height:240px; overflow-y:auto; text-align:left; }
    .signout-item-row {
      display:flex; align-items:center; justify-content:space-between; gap:8px;
      background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:8px 10px;
    }
    .signout-item-info { flex:1; min-width:0; text-align:left; }
    .signout-item-name { font-size:13px; font-weight:500; color:var(--text); line-height:1.3; }
    .signout-item-unit { font-size:11px; color:var(--text3); margin-top:1px; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- APP CHECK: remove this line to disable App Check (also remove init block in firebase-sync.js) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-check-compat.js"></script>
<script src="js/shared.js"></script>
<script src="js/firebase-sync.js"></script>
<script>
const WorkerApp = { // not "Worker" — that shadows the browser's Web Worker global
  activeCat:  null,
  activeSub:  null,
  orderRef:   genRef(),
  materials:  [],
  _cats:      [],
  _subs:      [],

  // Stocktake panel state — its own cart (decimals allowed: bar/pipe counted in
  // metres) and category tabs, fully independent of the ordering flow.
  _st:            { _items: {} },   // id -> counted qty (float)
  _stMode:        'set',            // 'set' | 'add' | 'subtract'
  _stCat:         null,
  _stSub:         null,
  _stCats:        [],
  _stSubs:        [],
  _matStock:      [],               // live material_stock records
  _unsubMatStock: null,
  _stBusy:        false,

  async init() {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) await r.unregister();
    }
    const cfg = FirebaseConfig.get();
    if (!cfg || !DeviceName.isSet()) { this.showSetup(); return; }
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Could not connect. Check your Firebase config.'); return; }
    this.materials = await Data.load('./materials.csv');
    this.renderApp();
    this.startConnectionStatus();
    this.startVersionCheck();
    this.startMatStockListening();
  },

  // ── SETUP — includes device name field ──
  showSetup(err) {
    const isTest = FirebaseConfig.isTestMode();
    document.getElementById('root').innerHTML = `
      <div class="setup-screen">
        <div class="setup-card">
          <h2><i class="ti ti-flame" style="color:#ea580c;vertical-align:-2px"></i> ${isTest ? 'Test Mode Setup' : 'Device Setup'}</h2>
          <p>${isTest ? 'Enter the <strong>test</strong> Firebase config. Saved separately — production config is unchanged.' : 'Enter a name for this device and your Firebase project config. This only needs to be done once.'}</p>
          ${isTest ? `<div style="background:var(--amber-bg);color:var(--amber-text);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:12px"><i class="ti ti-flask"></i> Test mode is active</div>` : ''}
          ${err ? `<div style="background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:12px">${esc(err)}</div>` : ''}

          <div style="background:var(--bg2);border-radius:var(--radius);padding:12px;margin-bottom:16px">
            <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
              color:var(--text3);font-family:var(--mono);margin-bottom:10px">This Device</div>
            <div class="setup-field" style="margin-bottom:0">
              <label>Device Name</label>
              <input id="cfg-device" autocomplete="off" placeholder="e.g. Workshop iPad, Bay 2 Tablet"
                value="${esc(DeviceName.get())}">
            </div>

          </div>

          <div style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
            color:var(--text3);font-family:var(--mono);margin-bottom:10px">Firebase Connection</div>
          <div class="setup-field">
            <label>Paste Firebase config</label>
            <textarea id="cfg-paste" class="setup-paste-area" placeholder="apiKey|projectId|appId"></textarea>
          </div>
          <div class="setup-divider">or enter manually</div>
          <div class="setup-field"><label>API Key</label><input id="cfg-apiKey" autocomplete="off" placeholder="AIzaSy..."></div>
          <div class="setup-field"><label>Project ID</label><input id="cfg-projectId" autocomplete="off" placeholder="my-project-id"></div>
          <div class="setup-field"><label>App ID</label><input id="cfg-appId" autocomplete="off" placeholder="1:123456:web:abc..."></div>
          <button id="btn-connect" class="btn btn-primary" style="margin-top:8px">
            <i class="ti ti-plug"></i> Connect
          </button>
          ${isTest ? `<button id="btn-cancel-test" class="btn btn-outline" style="margin-top:8px"><i class="ti ti-arrow-left"></i> Cancel — back to production</button>` : ''}
          <div class="setup-note" style="margin-top:14px">Enter the config string provided by your administrator.</div>
        </div>
      </div>`;
    document.getElementById('cfg-paste').addEventListener('input', () => {
      const p = parseFirebaseConfig(document.getElementById('cfg-paste').value);
      if (p.apiKey)    document.getElementById('cfg-apiKey').value    = p.apiKey;
      if (p.projectId) document.getElementById('cfg-projectId').value = p.projectId;
      if (p.appId)     document.getElementById('cfg-appId').value     = p.appId;
    });
    document.getElementById('btn-connect').addEventListener('click', () => this.saveConfig());
    document.getElementById('btn-cancel-test')?.addEventListener('click', () => { FirebaseConfig.setTestMode(false); location.reload(); });
  },

  async saveConfig() {
    const paste = document.getElementById('cfg-paste')?.value || '';
    if (paste.trim()) {
      const p = parseFirebaseConfig(paste);
      if (p.apiKey)    document.getElementById('cfg-apiKey').value    = p.apiKey;
      if (p.projectId) document.getElementById('cfg-projectId').value = p.projectId;
      if (p.appId)     document.getElementById('cfg-appId').value     = p.appId;
    }
    const deviceName = document.getElementById('cfg-device').value.trim();
    const apiKey     = document.getElementById('cfg-apiKey').value.trim();
    const projectId  = document.getElementById('cfg-projectId').value.trim();
    const appId      = document.getElementById('cfg-appId').value.trim();
    if (!deviceName) { alert('Please enter a device name.'); return; }
    if (!apiKey || !projectId || !appId) { alert('Please fill in all Firebase fields.'); return; }
    const cfg = { apiKey, projectId, appId,
      authDomain:`${projectId}.firebaseapp.com`,
      storageBucket:`${projectId}.appspot.com`,
      messagingSenderId:'000000000000' };
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Connection failed. Double-check your Firebase config values.'); return; }
    DeviceName.save(deviceName);
    FirebaseConfig.save(cfg);
    this.materials = await Data.load('./materials.csv');
    this.renderApp();
    this.startConnectionStatus();
    this.startVersionCheck();
    this.startMatStockListening();
  },

  // ── APP SHELL ──
  renderApp() {
    const device = DeviceName.get();
    document.getElementById('root').innerHTML = `
      <div class="app-root" id="app-root">
        <div class="header">
          <div class="col"><div class="header-inner">
            <div class="header-left">
              <div class="header-title">Material Orders</div>
              <div class="header-ref" style="display:flex;gap:6px;align-items:center"><span class="live-dot" id="live-dot"></span><span id="live-label">Live</span><span style="opacity:0.45">·</span><span id="order-ref"></span><span style="opacity:0.45">·</span><span id="app-version" style="opacity:0.6;font-family:var(--mono)"></span></div>
            </div>
            <div class="header-actions">
              <span class="device-chip">${esc(device)}</span>
              <button class="stocktake-btn" id="btn-stocktake" title="Materials stocktake"><i class="ti ti-clipboard-list"></i> Stocktake</button>
              <button class="icon-btn" id="btn-settings" title="Settings"><i class="ti ti-settings"></i></button>
            </div>
          </div></div>
        </div>

        <div id="update-banner-wrap"></div>
        ${FirebaseConfig.isTestMode() ? '<div class="test-mode-banner"><i class="ti ti-flask"></i> Test mode — connected to test database</div>' : ''}

        <div id="tabs-wrap"></div>

        <div class="search-bar">
          <div class="col"><div class="search-wrap">
            <i class="ti ti-search"></i>
            <input type="search" id="search" placeholder="Search part code or description…" autocomplete="off">
          </div></div>
        </div>

        <div class="app-scroll" id="app-scroll">
          <div class="col">
            <div class="mat-list" id="mat-list"></div>
          </div>
        </div>

        <div class="action-bar"><div class="action-bar-inner">
          <button class="btn btn-danger" id="btn-clear-main">
            <i class="ti ti-x"></i> Clear order
          </button>
          <button class="btn btn-primary" id="btn-review" style="margin-top:2px">
            <i class="ti ti-clipboard-list"></i>Review order
            <span class="sidebar-count zero" id="order-badge" style="margin-left:4px">0</span>
          </button>
        </div></div>

        <div class="panel" id="review-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-review">
              <i class="ti ti-chevron-left"></i> Back
            </button>
            <div class="panel-title">Order Confirmation</div>
            <div class="panel-spacer"></div>
          </div>
          <div class="panel-scroll">
            <div class="panel-col" id="review-contents"></div>
          </div>
          <div class="action-bar"><div class="action-bar-inner">
            <button class="btn btn-danger" id="btn-clear">
              <i class="ti ti-x"></i> Clear order
            </button>
            <button class="btn btn-orange" id="btn-submit" style="margin-top:2px">
              <i class="ti ti-send"></i> Submit
            </button>
          </div></div>
        </div>

        <!-- STOCKTAKE PANEL — counts write to material_stock, never to orders -->
        <div class="panel" id="stocktake-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-stocktake"><i class="ti ti-chevron-left"></i>Back</button>
            <div class="panel-title"><i class="ti ti-clipboard-list"></i>Materials Stocktake</div>
            <div class="panel-spacer"></div>
          </div>
          <div class="st-mode-banner set" id="st-mode-banner"></div>
          <div class="col" style="padding-top:10px;padding-bottom:6px;flex-shrink:0">
            <div class="intake-filter-bar" id="st-mode-bar">
              <div class="intake-filter-chip active" data-st-mode="set"><i class="ti ti-clipboard-check"></i> Set counts</div>
              <div class="intake-filter-chip" data-st-mode="add"><i class="ti ti-plus"></i> Add</div>
              <div class="intake-filter-chip" data-st-mode="subtract"><i class="ti ti-minus"></i> Subtract</div>
            </div>
          </div>
          <div id="st-tabs-wrap"></div>
          <div class="search-bar"><div class="col"><div class="search-wrap">
            <i class="ti ti-search"></i>
            <input type="search" id="st-search" placeholder="Search materials…" autocomplete="off">
          </div></div></div>
          <div class="app-scroll" id="st-scroll"><div class="col"><div class="mat-list" id="st-mat-list"></div></div></div>
          <div class="action-bar"><div class="action-bar-inner">
            <button class="btn btn-danger" id="btn-st-clear"><i class="ti ti-x"></i> Clear counts</button>
            <button class="btn btn-primary" id="btn-st-review" style="margin-top:2px"><i class="ti ti-clipboard-check"></i> Review &amp; submit
              <span class="sidebar-count zero" id="st-badge" style="margin-left:4px">0</span>
            </button>
          </div></div>
        </div>

        <div class="panel" id="settings-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-settings"><i class="ti ti-chevron-left"></i>Back</button>
            <div class="panel-title">Settings</div>
            <button class="btn-sm btn-sm-save" id="btn-save-settings">Save</button>
          </div>
          <div class="panel-scroll"><div class="panel-col" style="gap:20px" id="settings-body"></div></div>
        </div>

        <div class="panel" id="success-panel" style="background:var(--surface);z-index:30">
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
              flex:1;padding:40px 24px;text-align:center">
            <div class="success-icon green" style="margin-bottom:20px">
              <i class="ti ti-circle-check"></i>
            </div>
            <h2 style="font-size:20px;font-weight:600;margin-bottom:10px">Order submitted!</h2>
            <p style="font-size:14px;color:var(--text2);line-height:1.6;max-width:300px;margin-bottom:28px">
              The production manager has been notified and will review your order.
            </p>
            <button class="btn btn-primary" style="max-width:280px" id="btn-new-order">
              <i class="ti ti-plus"></i> Start new order
            </button>
          </div>
        </div>
      </div>
      <div id="overlay-wrap"></div>`;

    // ── ALL LISTENERS ATTACHED ONCE ──
    document.getElementById('btn-review')      .addEventListener('click', () => this.openReview());
    document.getElementById('btn-clear-main')  .addEventListener('click', () => this.clearOrder());
    document.getElementById('btn-close-review').addEventListener('click', () => this.closePanel('review-panel'));
    document.getElementById('btn-submit')      .addEventListener('click', () => this.confirmSubmit());
    document.getElementById('btn-clear')       .addEventListener('click', () => this.clearOrder());
    document.getElementById('btn-settings')      .addEventListener('click', () => { this._populateSettings(); this.openPanel('settings-panel'); });
    document.getElementById('btn-close-settings').addEventListener('click', () => this.closePanel('settings-panel'));
    document.getElementById('btn-save-settings') .addEventListener('click', () => this.saveSettings());
    document.getElementById('btn-new-order')   .addEventListener('click', () => this.newOrder());
    document.getElementById('search')          .addEventListener('input', () => this.renderList());

    document.getElementById('mat-list').addEventListener('click', e => {
      const dec = e.target.closest('[data-dec]');
      const inc = e.target.closest('[data-inc]');
      const add = e.target.closest('[data-add]');
      const bin = e.target.closest('[data-bin]');
      if (dec) { e.stopPropagation(); this.adj(+dec.dataset.dec, -1); }
      if (inc) { e.stopPropagation(); this.adj(+inc.dataset.inc,  1); }
      if (add) { e.stopPropagation(); this.quickAdd(+add.dataset.add); }
      if (bin) { e.stopPropagation(); this.zeroItem(+bin.dataset.bin); }
    });
    document.getElementById('mat-list').addEventListener('change', e => {
      const inp = e.target.closest('[data-qid]');
      if (inp) this.setQty(+inp.dataset.qid, inp.value);
    });

    document.getElementById('review-contents').addEventListener('click', e => {
      const dec = e.target.closest('[data-rdec]');
      const inc = e.target.closest('[data-rinc]');
      const rem = e.target.closest('[data-rrem]');
      if (dec) this.revAdj(+dec.dataset.rdec, -1);
      if (inc) this.revAdj(+inc.dataset.rinc,  1);
      if (rem) this.removeItem(+rem.dataset.rrem);
    });
    document.getElementById('review-contents').addEventListener('change', e => {
      const inp = e.target.closest('[data-rqid]');
      if (inp) this.revSet(+inp.dataset.rqid, inp.value);
    });

    document.getElementById('tabs-wrap').addEventListener('click', e => {
      const catBtn = e.target.closest('[data-cat-idx]');
      const subBtn = e.target.closest('[data-sub-idx]');
      if (catBtn) { const i=+catBtn.dataset.catIdx; this.setCat(i===-1?null:this._cats[i]); }
      else if (subBtn) { const i=+subBtn.dataset.subIdx; this.setSub(i===-1?null:this._subs[i]); }
    });

    // ── Stocktake panel ──
    document.getElementById('btn-stocktake')      .addEventListener('click', () => this.openStocktake());
    document.getElementById('btn-close-stocktake').addEventListener('click', () => this.closePanel('stocktake-panel'));
    document.getElementById('st-mode-bar').addEventListener('click', e => {
      const chip = e.target.closest('[data-st-mode]'); if (!chip) return;
      this._stMode = chip.dataset.stMode;
      document.querySelectorAll('#st-mode-bar .intake-filter-chip').forEach(c => c.classList.toggle('active', c === chip));
      this._updateStModeHint();
    });
    document.getElementById('st-tabs-wrap').addEventListener('click', e => {
      const c = e.target.closest('[data-st-cat-idx]');
      const s = e.target.closest('[data-st-sub-idx]');
      if (c) { const i=+c.dataset.stCatIdx; this.stSetCat(i===-1?null:this._stCats[i]); }
      else if (s) { const i=+s.dataset.stSubIdx; this.stSetSub(i===-1?null:this._stSubs[i]); }
    });
    document.getElementById('st-mat-list').addEventListener('click', e => {
      const dec=e.target.closest('[data-st-dec]'), inc=e.target.closest('[data-st-inc]');
      const add=e.target.closest('[data-st-add]'), bin=e.target.closest('[data-st-bin]');
      if (dec) { e.stopPropagation(); this.stAdj(+dec.dataset.stDec, -1); }
      if (inc) { e.stopPropagation(); this.stAdj(+inc.dataset.stInc,  1); }
      if (add) { e.stopPropagation(); this.stQuickAdd(+add.dataset.stAdd); }
      if (bin) { e.stopPropagation(); this.stZero(+bin.dataset.stBin); }
    });
    document.getElementById('st-mat-list').addEventListener('change', e => {
      const inp = e.target.closest('[data-st-qid]'); if (inp) this.stSetQty(+inp.dataset.stQid, inp.value);
    });
    document.getElementById('st-search').addEventListener('input', () => this.renderStList());
    document.getElementById('btn-st-review').addEventListener('click', () => this.stOpenReview());
    document.getElementById('btn-st-clear').addEventListener('click', () => {
      if (!confirm('Clear all entered counts?')) return;
      this._st._items = {};
      this._updateStBadge(); this.renderStList();
    });

    const _v=document.getElementById('app-version'); if(_v) _v.textContent=APP_VERSION;
    const _r=document.getElementById('order-ref'); if(_r) _r.textContent=this.orderRef;
    this.renderTabs();
    this.renderList();
    this.updateBadge();
  },

  // ── LIVE STATUS DOT (3-state: Live / Update Available / Offline) ──
  // Single source of truth so the dot and the update banner never disagree.
  // connected starts null (= not yet known) — the submit guard must only block on an
  // explicit false, or submitting right after page load gets wrongly refused.
  _connState: { connected: null, latestVersion: null },

  _renderLiveStatus() {
    const dot = document.getElementById('live-dot');
    const lbl = document.getElementById('live-label');
    const wrap = document.getElementById('update-banner-wrap');
    const { connected, latestVersion } = this._connState;
    const outdated = connected && latestVersion && isVersionNewer(latestVersion, APP_VERSION);

    if (dot && lbl) {
      dot.classList.remove('disconnected', 'update-available');
      if (!connected)      { dot.classList.add('disconnected'); lbl.textContent = 'Offline'; }
      else if (outdated)   { dot.classList.add('update-available'); lbl.textContent = 'Update Available'; }
      else                 { lbl.textContent = 'Live'; }
    }
    if (wrap) {
      wrap.innerHTML = outdated ? `<div class="update-banner">
          <i class="ti ti-refresh"></i>
          <span>A newer version (${esc(latestVersion)}) is available — you're on ${esc(APP_VERSION)}.</span>
          <button id="btn-refresh-update">Refresh</button>
        </div>` : '';
      document.getElementById('btn-refresh-update')?.addEventListener('click', () => location.reload());
    }
  },

  startConnectionStatus() {
    DB.listenConnectionStatus(connected => {
      this._connState.connected = connected;
      this._renderLiveStatus();
    });
  },

  // See firebase-sync.js announceVersionIfNewer for the rollback caveat —
  // if you ever revert to an older build, manually edit meta/version's
  // "latest" field down in the Firebase console.
  startVersionCheck() {
    DB.announceVersionIfNewer(APP_VERSION, isVersionNewer);
    DB.listenAppVersion(latest => {
      this._connState.latestVersion = latest;
      this._renderLiveStatus();
    });
  },

  renderTabs() {
    const wrap = document.getElementById('tabs-wrap');
    if (!wrap) return;
    this._cats = Data.categories(this.materials);
    this._subs = this.activeCat ? Data.subcategories(this.materials, this.activeCat) : [];
    const catBtns = this._cats.map((c,i) =>
      `<button class="tab ${this.activeCat===c?'active':''}" data-cat-idx="${i}">${esc(c)}</button>`).join('');
    let subHtml = '';
    if (this.activeCat && this._subs.length) {
      const subBtns = this._subs.map((s,i) =>
        `<button class="tab ${this.activeSub===s?'active':''}" data-sub-idx="${i}">${esc(s)}</button>`).join('');
      subHtml = `<div class="tabs-bar sub-bar"><div class="tabs-inner">
        <button class="tab ${!this.activeSub?'active':''}" data-sub-idx="-1">All</button>${subBtns}
      </div></div>`;
    }
    wrap.innerHTML = `<div class="tabs-bar"><div class="tabs-inner">
      <button class="tab ${!this.activeCat?'active':''}" data-cat-idx="-1">All</button>${catBtns}
    </div></div>${subHtml}`;
  },

  setCat(cat) { this.activeCat=cat; this.activeSub=null; this.renderTabs(); this.renderList(); const s=document.getElementById('app-scroll'); if(s)s.scrollTop=0; },
  setSub(sub) { this.activeSub=sub; this.renderTabs(); this.renderList(); const s=document.getElementById('app-scroll'); if(s)s.scrollTop=0; },

  renderList() {
    const q=document.getElementById('search')?.value||'';
    const filtered=Data.filter(this.materials,this.activeCat,this.activeSub,q);
    const list=document.getElementById('mat-list'); if(!list) return;
    if(!filtered.length){list.innerHTML=`<div class="empty-state"><i class="ti ti-package-off"></i><p>No materials found.</p></div>`;return;}
    list.innerHTML=filtered.map(m=>this._matCard(m)).join('');
  },

  _matCard(m) {
    const qty=Order.get(m.id),inOrder=qty>0;
    const ci=CAT_ICONS[m.category]||CAT_ICONS.default;
    return `<div class="mat-card ${inOrder?'in-order':''}">
      <button class="mat-bin" data-bin="${m.id}" aria-label="Remove"><i class="ti ti-trash"></i></button>
      <div class="mat-icon" style="background:${ci.bg}"><i class="ti ${ci.icon}" style="color:${ci.color}"></i></div>
      <div class="mat-info">
        <div class="mat-name">${esc(m.description)}</div>
        <div class="mat-partcode">${esc(m.partCode)}</div>
        <div class="mat-unit">${esc(m.qtyType||'')}</div>
      </div>
      <div class="mat-controls">
        <button class="qty-btn" data-dec="${m.id}">−</button>
        <input class="qty-input" type="number" min="0" step="1" value="${qty}" data-qid="${m.id}">
        <button class="qty-btn" data-inc="${m.id}">+</button>
        <button class="add-btn ${inOrder?'in-order':''}" data-add="${m.id}">
          <i class="ti ${inOrder?'ti-check':'ti-plus'}"></i>
        </button>
      </div>
    </div>`;
  },

  adj(id,d)     { Order.adjust(id,d);           this._changed(); },
  setQty(id,v)  { Order.set(id,parseInt(v)||0); this._changed(); },
  quickAdd(id)  { if(!Order.get(id)) Order.set(id,1); this._changed(); },
  zeroItem(id)  { Order.remove(id); this._changed(); },
  revAdj(id,d)  { Order.adjust(id,d);           this.updateBadge(); this._syncReview(); },
  revSet(id,v)  { Order.set(id,parseInt(v)||0); this.updateBadge(); this._syncReview(); },
  removeItem(id){ Order.remove(id);              this.updateBadge(); this._syncReview(); },
  clearOrder()  { if(!confirm('Clear all items?')) return; Order.clear(); this.updateBadge(); this._syncReview(); this.closePanel('review-panel'); },

  _changed()    { this.updateBadge(); this.renderList(); if(document.getElementById('review-panel')?.classList.contains('open')) this._renderReviewContents(); },
  _syncReview() { this._renderReviewContents(); this.renderList(); },

  updateBadge() {
    const b=document.getElementById('order-badge'); if(!b) return;
    const n=Order.count(); b.textContent=n; b.classList.toggle('zero', n===0);
  },
  openPanel(id)  { document.getElementById(id)?.classList.add('open'); },
  closePanel(id) { document.getElementById(id)?.classList.remove('open'); },

  _populateSettings() {
    const s = Settings.get();
    const el = document.getElementById('settings-body'); if (!el) return;
    const isTest = FirebaseConfig.isTestMode();
    el.innerHTML = `
      <div class="settings-section">
        <div class="settings-label">Search &amp; Sort</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">Numeric-aware sorting</div><div class="settings-row-sub">e.g. 8mm lists before 10mm, rather than alphabetically</div></div>
            <input type="checkbox" id="s-natural-sort" ${s.naturalSort!==false?'checked':''} style="width:20px;height:20px">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Unit-aware search</div><div class="settings-row-sub">"1 inch", "25.4mm", "1\"" etc. all find the same item</div></div>
            <input type="checkbox" id="s-unit-search" ${s.unitAwareSearch!==false?'checked':''} style="width:20px;height:20px">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Typo-tolerant search</div><div class="settings-row-sub">Finds close matches even with spelling mistakes</div></div>
            <input type="checkbox" id="s-fuzzy-search" ${s.fuzzySearch!==false?'checked':''} style="width:20px;height:20px">
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Database</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">Test mode</div><div class="settings-row-sub">Use a separate test Firebase database — shared across all pages on this server</div></div>
            <button class="btn-sm ${isTest?'btn-sm-danger':''}" id="btn-toggle-test-mode">${isTest?'On — tap to exit':'Off'}</button>
          </div>
        </div>
      </div>`;
    document.getElementById('btn-toggle-test-mode').addEventListener('click', () => {
      const on = FirebaseConfig.isTestMode();
      FirebaseConfig.setTestMode(!on);
      location.reload();
    });
  },

  saveSettings() {
    Settings.save({
      naturalSort:     document.getElementById('s-natural-sort')?.checked ?? true,
      unitAwareSearch: document.getElementById('s-unit-search')?.checked ?? true,
      fuzzySearch:     document.getElementById('s-fuzzy-search')?.checked ?? true,
    });
    this.renderList();
    const btn = document.getElementById('btn-save-settings');
    if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => btn.textContent = 'Save', 1500); }
  },
  openReview()   { this._renderReviewContents(); this.openPanel('review-panel'); },

  _renderReviewContents() {
    const wrap=document.getElementById('review-contents'); if(!wrap) return;
    const items=Order.items(this.materials);
    if(!items.length){ wrap.innerHTML=`<div class="empty-state"><i class="ti ti-clipboard"></i><p>No items on this order yet.</p></div>`; return; }
    wrap.innerHTML=items.map(i=>`
      <div class="order-item">
        <div class="order-item-row">
          <div>
            <div class="order-item-name">${esc(i.description)}</div>
            <div class="order-item-code">${esc(i.partCode)}</div>
            <div class="order-item-unit">${esc(i.qtyType||'')}</div>
          </div>
          <div class="order-item-qty">× ${i.qty}</div>
        </div>
        <div class="order-item-foot">
          <button class="qty-btn" data-rdec="${i.id}">−</button>
          <input class="qty-input" type="number" min="1" step="1" value="${i.qty}" data-rqid="${i.id}">
          <button class="qty-btn" data-rinc="${i.id}">+</button>
          <button class="remove-btn" data-rrem="${i.id}"><i class="ti ti-x"></i> Remove</button>
        </div>
      </div>`).join('')+`
      <div class="order-summary-card">
        <div class="order-summary-row total">
          <span>Total items</span>
          <span>${items.reduce((s,i)=>s+i.qty,0)} across ${items.length} line${items.length!==1?'s':''}</span>
        </div>
      </div>`;
  },

  confirmSubmit() {
    if(Order.isEmpty()){ alert('No items on this order.'); return; }
    if (this._connState.connected === false) {
      alert("You're currently offline — orders can't be submitted without a connection. Please reconnect and try again.");
      return;
    }
    const items=Order.items(this.materials);
    const lines=items.map(i=>`${i.partCode}  ×${i.qty}  ${i.description}`).join('\n');
    const ow=document.getElementById('overlay-wrap');
    ow.innerHTML=`
      <div class="overlay" id="submit-confirm">
        <div class="sheet">
          <div class="sheet-handle"></div>
          <h3>Submit order?</h3>
          <pre style="font-size:12px;font-family:var(--mono);background:var(--bg);padding:10px;
            border-radius:var(--radius);margin-bottom:12px;white-space:pre-wrap;line-height:1.6">${esc(lines)}</pre>
          <p>The production manager will review and forward to purchasing.</p>
          <div class="sheet-btns">
            <button class="btn btn-orange" id="btn-confirm-yes"><i class="ti ti-send"></i> Confirm and submit</button>
            <button class="btn btn-outline" id="btn-confirm-no">Cancel</button>
          </div>
        </div>
      </div>`;
    document.getElementById('btn-confirm-yes').addEventListener('click', ()=>this.doSubmit());
    document.getElementById('btn-confirm-no') .addEventListener('click', ()=>this.closeOverlay());
    requestAnimationFrame(()=>document.getElementById('submit-confirm')?.classList.add('show'));
  },

  closeOverlay() {
    const el=document.getElementById('submit-confirm'); if(!el) return;
    el.classList.remove('show');
    setTimeout(()=>{ document.getElementById('overlay-wrap').innerHTML=''; },300);
  },

  async doSubmit() {
    const items=Order.items(this.materials).map(i=>({
      id:i.id,partCode:i.partCode,description:i.description,
      category:i.category,subcategory:i.subcategory,qtyType:i.qtyType||'',qty:i.qty,
    }));
    // Submit can take a moment to fail outright when offline (App Check needs
    // a live network round-trip for a token, so offline writes don't queue
    // the way plain Firestore writes normally would) — keep the sheet open with
    // a disabled, spinning button until the write settles. Disabling also blocks
    // a double-tap from submitting the order twice.
    const yesBtn = document.getElementById('btn-confirm-yes');
    if (yesBtn) { yesBtn.disabled = true; yesBtn.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Submitting…'; }
    try {
      await DB.submitOrder({ ref:this.orderRef, deviceName:DeviceName.get(), items });
      this.closeOverlay();
      this.closePanel('review-panel');
      this.openPanel('success-panel');
    } catch(e) {
      if (yesBtn) { yesBtn.disabled = false; yesBtn.innerHTML = '<i class="ti ti-send"></i> Confirm and submit'; }
      alert("Couldn't submit the order — check your internet connection and try again.\n\n" + e.message);
    }
  },

  // ══════════════════════════════════════════
  // STOCKTAKE — periodic count for tax purposes. Writes to material_stock and a
  // material_stocktakes history session, never to orders. Bar/pipe (Length/Metre
  // items) are counted in metres, sheets/plates per each — see stocktakeUnit().
  // ══════════════════════════════════════════
  startMatStockListening() {
    if (this._unsubMatStock) this._unsubMatStock();
    this._unsubMatStock = DB.listenMaterialStock(recs => {
      this._matStock = recs;
      if (document.getElementById('stocktake-panel')?.classList.contains('open')) this.renderStList();
    });
  },

  openStocktake() {
    this._stCat = null; this._stSub = null;
    const s = document.getElementById('st-search'); if (s) s.value = '';
    this._updateStModeHint();
    this.renderStTabs(); this.renderStList(); this._updateStBadge();
    this.openPanel('stocktake-panel');
  },

  _updateStModeHint() {
    const banners = {
      set:      '<i class="ti ti-clipboard-check"></i> STOCKTAKE — entered quantities REPLACE the recorded stock. Nothing is ordered.',
      add:      '<i class="ti ti-plus"></i> STOCKTAKE — entered quantities are ADDED to the recorded stock. Nothing is ordered.',
      subtract: '<i class="ti ti-minus"></i> STOCKTAKE — entered quantities are SUBTRACTED from the recorded stock. Nothing is ordered.',
    };
    const el = document.getElementById('st-mode-banner');
    if (el) {
      el.className = `st-mode-banner ${this._stMode}`;
      el.innerHTML = banners[this._stMode] || '';
    }
  },

  stGet(id)      { return this._st._items[id] || 0; },
  stSet(id, qty) {
    // Decimals allowed (metre counts like 2.4) — round to 2dp to absorb float noise.
    qty = Math.round((parseFloat(qty) || 0) * 100) / 100;
    if (qty <= 0) delete this._st._items[id]; else this._st._items[id] = qty;
  },
  stAdj(id, d)    { this.stSet(id, this.stGet(id) + d); this._stChanged(); },
  stSetQty(id, v) { this.stSet(id, v); this._stChanged(); },
  stQuickAdd(id)  { if (!this.stGet(id)) this.stSet(id, 1); this._stChanged(); },
  stZero(id)      { delete this._st._items[id]; this._stChanged(); },
  stCount()       { return Object.keys(this._st._items).length; },
  stItems() {
    return Object.keys(this._st._items).map(id => {
      const m = this.materials.find(x => x.id == id);
      return m ? { ...m, qty: this._st._items[id] } : null;
    }).filter(Boolean);
  },
  _stChanged() { this._updateStBadge(); this.renderStList(); },
  _updateStBadge() {
    const b = document.getElementById('st-badge'); if (!b) return;
    const n = this.stCount(); b.textContent = n; b.classList.toggle('zero', n === 0);
  },

  renderStTabs() {
    const wrap = document.getElementById('st-tabs-wrap'); if (!wrap) return;
    this._stCats = Data.categories(this.materials);
    this._stSubs = this._stCat ? Data.subcategories(this.materials, this._stCat) : [];
    const catBtns = this._stCats.map((c,i)=>`<button class="tab ${this._stCat===c?'active':''}" data-st-cat-idx="${i}">${esc(c)}</button>`).join('');
    let subHtml = '';
    if (this._stCat && this._stSubs.length) {
      const subBtns = this._stSubs.map((s,i)=>`<button class="tab ${this._stSub===s?'active':''}" data-st-sub-idx="${i}">${esc(s)}</button>`).join('');
      subHtml = `<div class="tabs-bar sub-bar"><div class="tabs-inner"><button class="tab ${!this._stSub?'active':''}" data-st-sub-idx="-1">All</button>${subBtns}</div></div>`;
    }
    wrap.innerHTML = `<div class="tabs-bar"><div class="tabs-inner"><button class="tab ${!this._stCat?'active':''}" data-st-cat-idx="-1">All</button>${catBtns}</div></div>${subHtml}`;
  },
  stSetCat(cat) { this._stCat=cat; this._stSub=null; this.renderStTabs(); this.renderStList(); const s=document.getElementById('st-scroll'); if(s)s.scrollTop=0; },
  stSetSub(sub) { this._stSub=sub; this.renderStTabs(); this.renderStList(); },

  renderStList() {
    const list = document.getElementById('st-mat-list'); if (!list) return;
    const q = document.getElementById('st-search')?.value || '';
    const filtered = Data.filter(this.materials, this._stCat, this._stSub, q);
    if (!filtered.length) { list.innerHTML = `<div class="empty-state"><i class="ti ti-package-off"></i><p>No materials found.</p></div>`; return; }
    const restoreFocus = captureInputFocus(); // live stock updates re-render mid-typing
    const stockMap = new Map(this._matStock.map(r => [r._id, r]));
    list.innerHTML = filtered.map(m => {
      const qty = this.stGet(m.id), inCount = qty > 0;
      const unit = stocktakeUnit(m);
      const rec = stockMap.get(stockId(m));
      const ci = CAT_ICONS[m.category] || CAT_ICONS.default;
      const showCode = m.partCode && !Data.isDummyCode(m.partCode);
      return `<div class="mat-card ${inCount?'in-order':''}">
        <button class="mat-bin" data-st-bin="${m.id}" aria-label="Remove"><i class="ti ti-trash"></i></button>
        <div class="mat-icon" style="background:${ci.bg}"><i class="ti ${ci.icon}" style="color:${ci.color}"></i></div>
        <div class="mat-info">
          <div class="mat-name">${esc(m.description)}</div>
          ${showCode ? `<div class="mat-partcode">${esc(m.partCode)}</div>` : '<div class="mat-partcode"></div>'}
          <div class="mat-unit">${esc(unit)} · <span class="st-recorded">${rec && rec.qty != null ? rec.qty + ' recorded' : 'not counted yet'}</span></div>
        </div>
        <div class="mat-controls">
          <button class="qty-btn" data-st-dec="${m.id}">−</button>
          <input class="qty-input" type="number" min="0" step="0.1" value="${qty}" data-st-qid="${m.id}">
          <button class="qty-btn" data-st-inc="${m.id}">+</button>
          <button class="add-btn ${inCount?'in-order':''}" data-st-add="${m.id}"><i class="ti ${inCount?'ti-check':'ti-plus'}"></i></button>
        </div>
      </div>`;
    }).join('');
    restoreFocus();
  },

  stOpenReview() {
    if (this.stCount() === 0) { alert('No counts entered yet.'); return; }
    const items = this.stItems();
    const modeLabels = { set: 'Setting counted totals', add: 'Adding to recorded stock', subtract: 'Subtracting from recorded stock' };
    const lines = items.map(i => `<div class="signout-item-row">
        <div class="signout-item-info">
          <div class="signout-item-name">${esc(i.description)}</div>
          <div class="signout-item-unit">${i.qty} ${esc(stocktakeUnit(i))}</div>
        </div>
      </div>`).join('');
    const ow = document.getElementById('overlay-wrap');
    ow.innerHTML = `
      <div class="success-overlay">
        <div class="success-card signout-card">
          <div class="success-icon blue"><i class="ti ti-clipboard-check"></i></div>
          <h3>Submit stocktake</h3>
          <p style="margin-bottom:8px">${modeLabels[this._stMode]} — ${items.length} item${items.length!==1?'s':''}.</p>
          <input class="checkout-name-input" type="text" id="st-counted-by" placeholder="Counted by (your name)" autocomplete="off"
            value="${esc(localStorage.getItem('mo_stocktake_name') || '')}" style="margin:4px 0 10px">
          <div class="signout-item-list">${lines}</div>
          <button class="btn btn-primary" id="btn-st-confirm" style="width:100%;margin-top:12px"><i class="ti ti-check"></i> Confirm stocktake</button>
          <button class="btn btn-outline" id="btn-st-cancel" style="width:100%;margin-top:8px">Cancel</button>
        </div>
      </div>`;
    document.getElementById('btn-st-confirm').addEventListener('click', () => this._doStSubmit());
    document.getElementById('btn-st-cancel').addEventListener('click', () => { ow.innerHTML=''; });
  },

  async _doStSubmit() {
    if (this._stBusy) return; // double-tap guard
    const name = document.getElementById('st-counted-by')?.value.trim();
    if (!name) { alert('Please enter your name.'); return; }
    const items = this.stItems();
    if (!items.length) { document.getElementById('overlay-wrap').innerHTML=''; return; }
    if (this._connState.connected === false) {
      alert("You're currently offline — stocktakes can't be submitted without a connection."); return;
    }
    this._stBusy = true;
    const btn = document.getElementById('btn-st-confirm');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Submitting…'; }
    try {
      await DB.applyStocktake(items.map(m => ({
        sid: stockId(m), partCode: m.partCode || '', description: m.description,
        category: m.category, subcategory: m.subcategory, unit: stocktakeUnit(m), qty: m.qty,
      })), this._stMode, name, DeviceName.get());
      localStorage.setItem('mo_stocktake_name', name);
      this._st._items = {};
      this._updateStBadge(); this.renderStList();
      const ow = document.getElementById('overlay-wrap');
      ow.innerHTML = `
        <div class="success-overlay">
          <div class="success-card">
            <div class="success-icon green"><i class="ti ti-circle-check"></i></div>
            <h3>Stocktake submitted!</h3>
            <p>${items.length} item${items.length!==1?'s':''} recorded. Thanks, ${esc(name)}.</p>
            <button class="btn btn-primary" id="btn-st-done">Done</button>
          </div>
        </div>`;
      document.getElementById('btn-st-done').addEventListener('click', () => { ow.innerHTML=''; });
    } catch(e) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-check"></i> Confirm stocktake'; }
      alert('Submit failed — please try again.\n\n' + e.message);
    } finally { this._stBusy = false; }
  },

  newOrder() {
    Order.clear(); this.orderRef=genRef(); this.activeCat=null; this.activeSub=null;
    this.closePanel('success-panel'); this.updateBadge();
    const ref=document.getElementById('order-ref'); if(ref) ref.textContent=this.orderRef;
    const srch=document.getElementById('search');   if(srch) srch.value='';
    this.renderTabs(); this.renderList();
  },
};

document.addEventListener('DOMContentLoaded', ()=>WorkerApp.init());
</script>
</body>
</html>
