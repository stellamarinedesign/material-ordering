<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Material Orders">
  <title>Material Orders</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="root"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/shared.js"></script>
<script src="js/firebase-sync.js"></script>
<script>
const Worker = {
  activeCategory:    null,
  activeSubcategory: null,
  orderRef: genRef(),
  materials: [],

  async init() {
    const cfg = FirebaseConfig.get();
    if (!cfg) { this.showSetup(); return; }
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Could not connect. Check your Firebase config.'); return; }
    this.materials = await Data.load('./materials.csv');
    this.renderApp();
  },

  // ── SETUP ──
  showSetup(err) {
    document.getElementById('root').innerHTML = `
      <div class="setup-screen">
        <div class="setup-card">
          <h2><i class="ti ti-flame" style="color:#ea580c;vertical-align:-2px"></i> Connect to Firebase</h2>
          <p>Enter your Firebase project config once to start syncing orders.</p>
          ${err ? `<div style="background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:12px">${esc(err)}</div>` : ''}
          <div class="setup-field"><label>API Key</label><input id="cfg-apiKey" autocomplete="off" placeholder="AIzaSy..."></div>
          <div class="setup-field"><label>Project ID</label><input id="cfg-projectId" autocomplete="off" placeholder="my-project-id"></div>
          <div class="setup-field"><label>App ID</label><input id="cfg-appId" autocomplete="off" placeholder="1:123456:web:abc..."></div>
          <button class="btn btn-primary" style="margin-top:8px" onclick="Worker.saveConfig()">
            <i class="ti ti-plug"></i> Connect
          </button>
          <div class="setup-note" style="margin-top:14px">
            Get these from <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a>
            → Project settings → Web app. See README.md for full guide.
          </div>
        </div>
      </div>`;
  },

  async saveConfig() {
    const apiKey    = document.getElementById('cfg-apiKey').value.trim();
    const projectId = document.getElementById('cfg-projectId').value.trim();
    const appId     = document.getElementById('cfg-appId').value.trim();
    if (!apiKey || !projectId || !appId) { alert('Please fill in all fields.'); return; }
    const cfg = { apiKey, projectId, appId,
      authDomain:`${projectId}.firebaseapp.com`,
      storageBucket:`${projectId}.appspot.com`,
      messagingSenderId:'000000000000' };
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Connection failed. Double-check your config values.'); return; }
    FirebaseConfig.save(cfg);
    this.materials = await Data.load('./materials.csv');
    this.renderApp();
  },

  // ── SHELL ──
  renderApp() {
    document.getElementById('root').innerHTML = `
      <div class="app-root" id="app-root">
        <div class="header">
          <div class="header-left">
            <div class="header-title">Material Orders</div>
            <div class="header-ref" id="order-ref">${esc(this.orderRef)}</div>
          </div>
          <div class="header-actions">
            <span class="role-pill">Worker</span>
            <button class="icon-btn" onclick="Worker.openReview()" aria-label="Review order">
              <i class="ti ti-clipboard-list"></i>
              <span class="order-badge" id="order-badge" style="display:none">0</span>
            </button>
          </div>
        </div>
        <div class="app-body">
          <div id="tabs-wrap"></div>
          <div class="search-bar">
            <div class="search-wrap">
              <i class="ti ti-search"></i>
              <input type="search" id="search" placeholder="Search part code or description…"
                autocomplete="off" oninput="Worker.renderList()">
            </div>
          </div>
          <div id="mat-list-wrap" style="flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0"></div>
        </div>
        <!-- panels live inside app-root so they clip correctly -->
        <div class="panel" id="review-panel">
          <div class="panel-header">
            <button class="back-btn" onclick="Worker.closePanel('review-panel')">
              <i class="ti ti-chevron-left"></i> Back
            </button>
            <div class="panel-title">Order Confirmation</div>
            <div class="panel-spacer"></div>
          </div>
          <div class="order-items" id="review-items"></div>
          <div id="review-summary"></div>
          <div class="action-bar">
            <button class="btn btn-orange" onclick="Worker.confirmSubmit()">
              <i class="ti ti-send"></i> Submit to manager
            </button>
            <button class="btn btn-danger" onclick="Worker.clearOrder()">
              <i class="ti ti-x"></i> Clear order
            </button>
          </div>
        </div>
      </div>
      <div id="overlay-wrap"></div>`;
    this.renderTabs();
    this.renderList();
    this.updateBadge();
  },

  // ── TABS ──
  renderTabs() {
    const wrap = document.getElementById('tabs-wrap');
    if (!wrap) return;
    const cats = Data.categories(this.materials);
    const catHtml = `<div class="tabs">
      <button class="tab ${!this.activeCategory?'active':''}" onclick="Worker.setCategory(null)">All</button>
      ${cats.map(c=>`<button class="tab ${this.activeCategory===c?'active':''}" onclick="Worker.setCategory('${esc(c)}')">${esc(c)}</button>`).join('')}
    </div>`;
    let subHtml = '';
    if (this.activeCategory) {
      const subs = Data.subcategories(this.materials, this.activeCategory);
      subHtml = `<div class="tabs sub">
        <button class="tab ${!this.activeSubcategory?'active':''}" onclick="Worker.setSubcategory(null)">All</button>
        ${subs.map(s=>`<button class="tab ${this.activeSubcategory===s?'active':''}" onclick="Worker.setSubcategory('${esc(s)}')">${esc(s)}</button>`).join('')}
      </div>`;
    }
    wrap.innerHTML = catHtml + subHtml;
  },

  setCategory(cat) { this.activeCategory=cat; this.activeSubcategory=null; this.renderTabs(); this.renderList(); },
  setSubcategory(sub) { this.activeSubcategory=sub; this.renderTabs(); this.renderList(); },

  // ── MATERIAL LIST ──
  renderList() {
    const q = (document.getElementById('search')?.value||'').toLowerCase();
    const wrap = document.getElementById('mat-list-wrap');
    if (!wrap) return;
    let filtered = this.materials;
    if (this.activeCategory)    filtered = filtered.filter(m=>m.category===this.activeCategory);
    if (this.activeSubcategory) filtered = filtered.filter(m=>m.subcategory===this.activeSubcategory);
    if (q) filtered = filtered.filter(m=>m.description.toLowerCase().includes(q)||m.partCode.toLowerCase().includes(q));
    if (!filtered.length) {
      wrap.innerHTML=`<div class="mat-list"><div class="empty-state"><i class="ti ti-package-off"></i><p>No materials found.</p></div></div>`;
      return;
    }
    wrap.innerHTML=`<div class="mat-list">${filtered.map(m=>this.matCardHtml(m)).join('')}</div>`;
  },

  matCardHtml(m) {
    const qty = Order.get(m.id);
    const inOrder = qty > 0;
    const ci = CAT_ICONS[m.category]||CAT_ICONS.default;
    return `<div class="mat-card ${inOrder?'in-order':''}">
      <div class="mat-icon" style="background:${ci.bg}">
        <i class="ti ${ci.icon}" style="color:${ci.color}"></i>
      </div>
      <div class="mat-info">
        <div class="mat-name">${esc(m.description)}</div>
        <div class="mat-partcode">${esc(m.partCode)}</div>
        <div class="mat-unit">${esc(m.qtyType||'')}</div>
      </div>
      <div class="mat-controls">
        <button class="qty-btn" onclick="Worker.adj(${m.id},-1)">−</button>
        <input class="qty-input" type="number" min="0" step="1" value="${qty}"
          onchange="Worker.setQty(${m.id},this.value)">
        <button class="qty-btn" onclick="Worker.adj(${m.id},1)">+</button>
        <button class="add-btn ${inOrder?'in-order':''}" onclick="Worker.quickAdd(${m.id})">
          <i class="ti ${inOrder?'ti-check':'ti-plus'}"></i>
        </button>
      </div>
    </div>`;
  },

  // ── ORDER ACTIONS ──
  adj(id,d)    { Order.adjust(id,d); this.updateBadge(); this.renderList(); if(this.panelOpen('review-panel')) this.renderReviewContents(); },
  setQty(id,v) { Order.set(id,parseInt(v)||0); this.updateBadge(); this.renderList(); if(this.panelOpen('review-panel')) this.renderReviewContents(); },
  quickAdd(id) { if(!Order.get(id)) Order.set(id,1); this.updateBadge(); this.renderList(); },
  revAdj(id,d) { Order.adjust(id,d); this.updateBadge(); this.renderReviewContents(); },
  revSet(id,v) { Order.set(id,parseInt(v)||0); this.updateBadge(); this.renderReviewContents(); },
  removeItem(id){ Order.remove(id); this.updateBadge(); this.renderReviewContents(); },
  clearOrder()  { if(!confirm('Clear all items?')) return; Order.clear(); this.updateBadge(); this.renderReviewContents(); },

  updateBadge() {
    const b = document.getElementById('order-badge');
    if (!b) return;
    const n = Order.count();
    b.textContent = n; b.style.display = n>0?'flex':'none';
  },

  // ── PANEL MANAGEMENT ──
  // All panels are pre-rendered in the DOM; we just toggle .open
  panelOpen(id) { return document.getElementById(id)?.classList.contains('open'); },

  openPanel(id) { document.getElementById(id)?.classList.add('open'); },

  closePanel(id) { document.getElementById(id)?.classList.remove('open'); },

  openReview() {
    this.renderReviewContents();
    this.openPanel('review-panel');
  },

  renderReviewContents() {
    const items = Order.items(this.materials);
    const itemsEl = document.getElementById('review-items');
    const summaryEl = document.getElementById('review-summary');
    if (!itemsEl) return;
    if (!items.length) {
      itemsEl.innerHTML = `<div class="empty-state"><i class="ti ti-clipboard"></i><p>No items on this order yet.</p></div>`;
      if (summaryEl) summaryEl.innerHTML = '';
      return;
    }
    itemsEl.innerHTML = items.map(i=>`
      <div class="order-item">
        <div class="order-item-row">
          <div>
            <div class="order-item-name">${esc(i.description)}</div>
            <div class="order-item-code">${esc(i.partCode)}</div>
            <div class="order-item-unit">${esc(i.qtyType||'')}</div>
          </div>
          <div class="order-item-qty">× ${i.qty}</div>
        </div>
        <div class="order-item-foot">
          <button class="qty-btn" onclick="Worker.revAdj(${i.id},-1)">−</button>
          <input class="qty-input" type="number" min="1" step="1" value="${i.qty}" onchange="Worker.revSet(${i.id},this.value)">
          <button class="qty-btn" onclick="Worker.revAdj(${i.id},1)">+</button>
          <button class="remove-btn" onclick="Worker.removeItem(${i.id})"><i class="ti ti-x"></i> Remove</button>
        </div>
      </div>`).join('');
    const total = items.reduce((s,i)=>s+i.qty,0);
    if (summaryEl) summaryEl.innerHTML = `
      <div class="order-summary">
        <div class="order-summary-row total">
          <span>Total items</span>
          <span>${total} across ${items.length} line${items.length!==1?'s':''}</span>
        </div>
      </div>`;
  },

  // ── SUBMIT ──
  confirmSubmit() {
    if (Order.isEmpty()) { alert('No items on this order.'); return; }
    const items = Order.items(this.materials);
    const lines = items.map(i=>`${i.partCode}  ×${i.qty}  ${i.description}`).join('\n');
    document.getElementById('overlay-wrap').innerHTML = `
      <div class="overlay" id="submit-confirm">
        <div class="sheet">
          <div class="sheet-handle"></div>
          <h3>Submit order to manager?</h3>
          <pre style="font-size:12px;font-family:var(--mono);background:var(--bg);padding:10px;border-radius:var(--radius);margin-bottom:12px;white-space:pre-wrap;line-height:1.6">${esc(lines)}</pre>
          <p>The production manager will review and forward to purchasing.</p>
          <div class="sheet-btns">
            <button class="btn btn-orange" onclick="Worker.doSubmit()"><i class="ti ti-send"></i> Confirm and submit</button>
            <button class="btn btn-outline" onclick="Worker.closeOverlay()">Cancel</button>
          </div>
        </div>
      </div>`;
    requestAnimationFrame(()=>document.getElementById('submit-confirm')?.classList.add('show'));
  },

  closeOverlay() {
    const el = document.querySelector('.overlay');
    el?.classList.remove('show');
    setTimeout(()=>{ document.getElementById('overlay-wrap').innerHTML=''; }, 300);
  },

  async doSubmit() {
    this.closeOverlay();
    const items = Order.items(this.materials).map(i=>({
      id:i.id, partCode:i.partCode, description:i.description,
      category:i.category, subcategory:i.subcategory,
      qtyType:i.qtyType||'', qty:i.qty,
    }));
    try {
      await DB.submitOrder({ ref:this.orderRef, items });
      document.getElementById('overlay-wrap').innerHTML = `
        <div class="success-overlay">
          <div class="success-card">
            <div class="success-icon green"><i class="ti ti-circle-check"></i></div>
            <h3>Order submitted!</h3>
            <p>The production manager has been notified and will review your order.</p>
            <button class="btn btn-primary" onclick="Worker.newOrder()">Start new order</button>
          </div>
        </div>`;
    } catch(e) { alert('Failed to submit. Check your internet connection.\n\n'+e.message); }
  },

  newOrder() {
    Order.clear(); this.orderRef = genRef(); this.updateBadge();
    document.getElementById('overlay-wrap').innerHTML = '';
    this.closePanel('review-panel');
    const ref = document.getElementById('order-ref');
    if (ref) ref.textContent = this.orderRef;
    this.renderList();
  },
};

document.addEventListener('DOMContentLoaded', ()=>Worker.init());
if ('serviceWorker' in navigator) {
  window.addEventListener('load', ()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
