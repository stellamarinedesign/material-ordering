<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Material Orders">
  <title>Material Orders</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .mat-bin {
      width: 30px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      color: var(--red-text); font-size: 15px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .mat-card.in-order .mat-bin { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/shared.js"></script>
<script src="js/firebase-sync.js"></script>
<script>
// ── GLOBAL HANDLER OBJECT ──
// All inline onclick calls go through W.* so there are no closures
// that stack up and no escaping issues with category/subcategory names.
const W = {};

const Worker = {
  activeCat:  null,
  activeSub:  null,
  orderRef:   genRef(),
  materials:  [],

  async init() {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) await r.unregister();
    }
    const cfg = FirebaseConfig.get();
    if (!cfg) { this.showSetup(); return; }
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Could not connect. Check your Firebase config.'); return; }
    this.materials = await Data.load('./materials.csv');
    this.renderApp();
  },

  // ── SETUP ──
  showSetup(err) {
    document.getElementById('root').innerHTML = `
      <div class="setup-screen">
        <div class="setup-card">
          <h2><i class="ti ti-flame" style="color:#ea580c;vertical-align:-2px"></i> Connect to Firebase</h2>
          <p>Enter your Firebase project config once to start syncing orders.</p>
          ${err ? `<div style="background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:12px">${esc(err)}</div>` : ''}
          <div class="setup-field"><label>API Key</label><input id="cfg-apiKey" autocomplete="off" placeholder="AIzaSy..."></div>
          <div class="setup-field"><label>Project ID</label><input id="cfg-projectId" autocomplete="off" placeholder="my-project-id"></div>
          <div class="setup-field"><label>App ID</label><input id="cfg-appId" autocomplete="off" placeholder="1:123456:web:abc..."></div>
          <button class="btn btn-primary" style="margin-top:8px" onclick="W.saveConfig()">
            <i class="ti ti-plug"></i> Connect
          </button>
          <div class="setup-note" style="margin-top:14px">
            Get these from <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a> → Project settings → Web app.
          </div>
        </div>
      </div>`;
  },

  // ── APP SHELL — rendered ONCE, never re-rendered ──
  renderApp() {
    document.getElementById('root').innerHTML = `
      <div class="app-root" id="app-root">
        <div class="header">
          <div class="col"><div class="header-inner">
            <div class="header-left">
              <div class="header-title">Material Orders</div>
              <div class="header-ref" id="order-ref">${esc(this.orderRef)}</div>
            </div>
            <div class="header-actions">
              <span class="role-pill">Worker</span>
              <button class="icon-btn" onclick="W.openReview()" aria-label="Review order">
                <i class="ti ti-clipboard-list"></i>
                <span class="order-badge" id="order-badge" style="display:none">0</span>
              </button>
            </div>
          </div></div>
        </div>

        <div id="tabs-wrap"></div>

        <div class="search-bar">
          <div class="col"><div class="search-wrap">
            <i class="ti ti-search"></i>
            <input type="search" id="search" placeholder="Search part code or description…"
              autocomplete="off" oninput="W.search()">
          </div></div>
        </div>

        <div class="app-scroll" id="app-scroll">
          <div class="col">
            <div class="mat-list" id="mat-list"></div>
          </div>
        </div>

        <!-- REVIEW PANEL -->
        <div class="panel" id="review-panel">
          <div class="panel-header">
            <button class="back-btn" onclick="W.closePanel('review-panel')">
              <i class="ti ti-chevron-left"></i> Back
            </button>
            <div class="panel-title">Order Confirmation</div>
            <div class="panel-spacer"></div>
          </div>
          <div class="panel-scroll">
            <div class="panel-col" id="review-contents"></div>
          </div>
          <div class="action-bar"><div class="action-bar-inner">
            <button class="btn btn-orange" onclick="W.confirmSubmit()">
              <i class="ti ti-send"></i> Submit to manager
            </button>
            <button class="btn btn-danger" onclick="W.clearOrder()">
              <i class="ti ti-x"></i> Clear order
            </button>
          </div></div>
        </div>

        <!-- SUCCESS PANEL -->
        <div class="panel" id="success-panel" style="background:var(--surface);z-index:30">
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
              flex:1;padding:40px 24px;text-align:center">
            <div class="success-icon green" style="margin-bottom:20px">
              <i class="ti ti-circle-check"></i>
            </div>
            <h2 style="font-size:20px;font-weight:600;margin-bottom:10px">Order submitted!</h2>
            <p style="font-size:14px;color:var(--text2);line-height:1.6;max-width:300px;margin-bottom:28px">
              The production manager has been notified and will review your order.
            </p>
            <button class="btn btn-primary" style="max-width:280px" onclick="W.newOrder()">
              <i class="ti ti-plus"></i> Start new order
            </button>
          </div>
        </div>
      </div>
      <div id="overlay-wrap"></div>`;

    // Wire up W.* handlers now that DOM exists
    this._bindHandlers();
    this.renderTabs();
    this.renderList();
    this.updateBadge();
  },

  // ── BIND ALL HANDLERS ONCE ──
  // W.* is a stable object — handlers are set once and never duplicated.
  _bindHandlers() {
    const self = this;

    W.saveConfig   = () => self.saveConfig();
    W.openReview   = () => self.openReview();
    W.closePanel   = id => self.closePanel(id);
    W.confirmSubmit= () => self.confirmSubmit();
    W.clearOrder   = () => self.clearOrder();
    W.closeOverlay = () => self.closeOverlay();
    W.doSubmit     = () => self.doSubmit();
    W.newOrder     = () => self.newOrder();
    W.search       = () => self.renderList();

    // Category/subcategory — store the value in a closure-safe way
    // These are re-bound each time tabs are rendered (safe — just replaces a function reference)
    W.setCat = cat => self.setCat(cat);
    W.setSub = sub => self.setSub(sub);

    // Material card controls — keyed by material id, safe to call repeatedly
    W.adj      = (id, d)  => self.adj(id, d);
    W.setQty   = (id, v)  => self.setQty(id, v);
    W.quickAdd = id       => self.quickAdd(id);
    W.zeroItem = id       => self.zeroItem(id);

    // Review panel controls
    W.revAdj    = (id, d) => self.revAdj(id, d);
    W.revSet    = (id, v) => self.revSet(id, v);
    W.removeItem= id      => self.removeItem(id);
  },

  // ── TABS ──
  // Tabs are re-rendered into #tabs-wrap when category changes.
  // They only contain buttons with onclick="W.setCat(...)" — W is stable so no stacking.
  renderTabs() {
    const wrap = document.getElementById('tabs-wrap');
    if (!wrap) return;
    const cats = Data.categories(this.materials);

    const catBtns = cats.map(c =>
      `<button class="tab ${this.activeCat === c ? 'active' : ''}"
        onclick="W.setCat(${JSON.stringify(c)})">${esc(c)}</button>`
    ).join('');

    let subHtml = '';
    if (this.activeCat) {
      const subs = Data.subcategories(this.materials, this.activeCat);
      const subBtns = subs.map(s =>
        `<button class="tab ${this.activeSub === s ? 'active' : ''}"
          onclick="W.setSub(${JSON.stringify(s)})">${esc(s)}</button>`
      ).join('');
      subHtml = `<div class="tabs-bar sub-bar">
        <div class="tabs-inner">
          <button class="tab ${!this.activeSub ? 'active' : ''}" onclick="W.setSub(null)">All</button>
          ${subBtns}
        </div>
      </div>`;
    }

    wrap.innerHTML = `<div class="tabs-bar">
      <div class="tabs-inner">
        <button class="tab ${!this.activeCat ? 'active' : ''}" onclick="W.setCat(null)">All</button>
        ${catBtns}
      </div>
    </div>${subHtml}`;
  },

  setCat(cat) {
    this.activeCat = cat || null; this.activeSub = null;
    this.renderTabs(); this.renderList();
    const s = document.getElementById('app-scroll'); if (s) s.scrollTop = 0;
  },
  setSub(sub) {
    this.activeSub = sub || null;
    this.renderTabs(); this.renderList();
    const s = document.getElementById('app-scroll'); if (s) s.scrollTop = 0;
  },

  // ── MATERIAL LIST ──
  // Re-rendered on filter/qty changes. Uses W.* which is stable — no listener stacking possible.
  renderList() {
    const q        = document.getElementById('search')?.value || '';
    const filtered = Data.filter(this.materials, this.activeCat, this.activeSub, q);
    const list     = document.getElementById('mat-list');
    if (!list) return;
    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><i class="ti ti-package-off"></i><p>No materials found.</p></div>`;
      return;
    }
    list.innerHTML = filtered.map(m => this._matCard(m)).join('');
  },

  _matCard(m) {
    const qty     = Order.get(m.id);
    const inOrder = qty > 0;
    const ci      = CAT_ICONS[m.category] || CAT_ICONS.default;
    return `<div class="mat-card ${inOrder ? 'in-order' : ''}">
      <button class="mat-bin" onclick="W.zeroItem(${m.id})" aria-label="Remove">
        <i class="ti ti-trash"></i>
      </button>
      <div class="mat-icon" style="background:${ci.bg}">
        <i class="ti ${ci.icon}" style="color:${ci.color}"></i>
      </div>
      <div class="mat-info">
        <div class="mat-name">${esc(m.description)}</div>
        <div class="mat-partcode">${esc(m.partCode)}</div>
        <div class="mat-unit">${esc(m.qtyType || '')}</div>
      </div>
      <div class="mat-controls">
        <button class="qty-btn" onclick="W.adj(${m.id},-1)">−</button>
        <input class="qty-input" type="number" min="0" step="1" value="${qty}"
          onchange="W.setQty(${m.id},this.value)">
        <button class="qty-btn" onclick="W.adj(${m.id},1)">+</button>
        <button class="add-btn ${inOrder ? 'in-order' : ''}" onclick="W.quickAdd(${m.id})">
          <i class="ti ${inOrder ? 'ti-check' : 'ti-plus'}"></i>
        </button>
      </div>
    </div>`;
  },

  // ── ORDER ACTIONS ──
  adj(id, d)     { Order.adjust(id, d);           this._changed(); },
  setQty(id, v)  { Order.set(id, parseInt(v)||0); this._changed(); },
  quickAdd(id)   { if (!Order.get(id)) Order.set(id, 1); this._changed(); },
  zeroItem(id)   { Order.remove(id); this._changed(); },

  // Review panel — only re-renders review contents, NOT the main list
  revAdj(id, d)  { Order.adjust(id, d);           this.updateBadge(); this._syncReview(); },
  revSet(id, v)  { Order.set(id, parseInt(v)||0); this.updateBadge(); this._syncReview(); },
  removeItem(id) { Order.remove(id);              this.updateBadge(); this._syncReview(); },
  clearOrder()   { if (!confirm('Clear all items?')) return; Order.clear(); this.updateBadge(); this._syncReview(); },

  _changed() {
    this.updateBadge();
    this.renderList();
    // Also refresh review panel contents if it's open, but DON'T re-render the list from inside review
    if (document.getElementById('review-panel')?.classList.contains('open')) {
      this._renderReviewContents();
    }
  },

  // Sync review → also refresh main list so quantities stay consistent
  _syncReview() {
    this._renderReviewContents();
    this.renderList();  // keeps main list in sync with review edits
  },

  updateBadge() {
    const b = document.getElementById('order-badge');
    if (!b) return;
    const n = Order.count();
    b.textContent = n; b.style.display = n > 0 ? 'flex' : 'none';
  },

  openPanel(id)  { document.getElementById(id)?.classList.add('open'); },
  closePanel(id) { document.getElementById(id)?.classList.remove('open'); },

  openReview() {
    this._renderReviewContents();
    this.openPanel('review-panel');
  },

  _renderReviewContents() {
    const wrap = document.getElementById('review-contents');
    if (!wrap) return;
    const items = Order.items(this.materials);
    if (!items.length) {
      wrap.innerHTML = `<div class="empty-state"><i class="ti ti-clipboard"></i><p>No items on this order yet.</p></div>`;
      return;
    }
    // Review uses W.revAdj / W.revSet — same stable W object, no stacking
    wrap.innerHTML = items.map(i => `
      <div class="order-item">
        <div class="order-item-row">
          <div>
            <div class="order-item-name">${esc(i.description)}</div>
            <div class="order-item-code">${esc(i.partCode)}</div>
            <div class="order-item-unit">${esc(i.qtyType || '')}</div>
          </div>
          <div class="order-item-qty">× ${i.qty}</div>
        </div>
        <div class="order-item-foot">
          <button class="qty-btn" onclick="W.revAdj(${i.id},-1)">−</button>
          <input class="qty-input" type="number" min="1" step="1" value="${i.qty}"
            onchange="W.revSet(${i.id},this.value)">
          <button class="qty-btn" onclick="W.revAdj(${i.id},1)">+</button>
          <button class="remove-btn" onclick="W.removeItem(${i.id})">
            <i class="ti ti-x"></i> Remove
          </button>
        </div>
      </div>`).join('') + `
      <div class="order-summary-card">
        <div class="order-summary-row total">
          <span>Total items</span>
          <span>${items.reduce((s,i)=>s+i.qty,0)} across ${items.length} line${items.length!==1?'s':''}</span>
        </div>
      </div>`;
  },

  // ── SUBMIT ──
  confirmSubmit() {
    if (Order.isEmpty()) { alert('No items on this order.'); return; }
    const items = Order.items(this.materials);
    const lines = items.map(i => `${i.partCode}  ×${i.qty}  ${i.description}`).join('\n');
    document.getElementById('overlay-wrap').innerHTML = `
      <div class="overlay" id="submit-confirm">
        <div class="sheet">
          <div class="sheet-handle"></div>
          <h3>Submit order to manager?</h3>
          <pre style="font-size:12px;font-family:var(--mono);background:var(--bg);padding:10px;
            border-radius:var(--radius);margin-bottom:12px;white-space:pre-wrap;line-height:1.6">${esc(lines)}</pre>
          <p>The production manager will review and forward to purchasing.</p>
          <div class="sheet-btns">
            <button class="btn btn-orange" onclick="W.doSubmit()">
              <i class="ti ti-send"></i> Confirm and submit
            </button>
            <button class="btn btn-outline" onclick="W.closeOverlay()">Cancel</button>
          </div>
        </div>
      </div>`;
    requestAnimationFrame(() => document.getElementById('submit-confirm')?.classList.add('show'));
  },

  closeOverlay() {
    const el = document.getElementById('submit-confirm');
    if (!el) return;
    el.classList.remove('show');
    setTimeout(() => { document.getElementById('overlay-wrap').innerHTML = ''; }, 300);
  },

  async doSubmit() {
    this.closeOverlay();
    const items = Order.items(this.materials).map(i => ({
      id: i.id, partCode: i.partCode, description: i.description,
      category: i.category, subcategory: i.subcategory,
      qtyType: i.qtyType || '', qty: i.qty,
    }));
    try {
      await DB.submitOrder({ ref: this.orderRef, items });
      this.closePanel('review-panel');
      this.openPanel('success-panel');
    } catch (e) {
      alert('Failed to submit. Check your internet connection.\n\n' + e.message);
    }
  },

  async saveConfig() {
    const apiKey    = document.getElementById('cfg-apiKey').value.trim();
    const projectId = document.getElementById('cfg-projectId').value.trim();
    const appId     = document.getElementById('cfg-appId').value.trim();
    if (!apiKey || !projectId || !appId) { alert('Please fill in all fields.'); return; }
    const cfg = { apiKey, projectId, appId,
      authDomain: `${projectId}.firebaseapp.com`,
      storageBucket: `${projectId}.appspot.com`,
      messagingSenderId: '000000000000' };
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Connection failed. Double-check your config values.'); return; }
    FirebaseConfig.save(cfg);
    this.materials = await Data.load('./materials.csv');
    this.renderApp();
  },

  newOrder() {
    Order.clear();
    this.orderRef  = genRef();
    this.activeCat = null;
    this.activeSub = null;
    this.closePanel('success-panel');
    this.updateBadge();
    const ref = document.getElementById('order-ref');
    if (ref) ref.textContent = this.orderRef;
    const search = document.getElementById('search');
    if (search) search.value = '';
    this.renderTabs();
    this.renderList();
  },
};

document.addEventListener('DOMContentLoaded', () => Worker.init());
</script>
</body>
</html>
