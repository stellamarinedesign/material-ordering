<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Consumables">
  <title>Consumables Checkout</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="fonts/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cons-stock-badge {
      font-size: 11px; font-family: var(--mono); padding: 2px 8px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .cons-stock-badge.ok       { background: var(--green-bg); color: var(--green-text); }
    .cons-stock-badge.low      { background: var(--amber-bg); color: var(--amber-text); }
    .cons-stock-badge.critical { background: var(--red-bg);   color: var(--red-text); }
    .cons-stock-badge.zero     { background: var(--bg2);      color: var(--text3); }
    .mat-card.out-of-stock     { opacity: 0.5; pointer-events: none; }
    .mat-card.out-of-stock .mat-controls { opacity: 0.4; }
    /* ── Image grid (tradesmen pick by photo) ── */
    .cons-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px; padding: 12px 0;
    }
    .cons-tile {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);
      overflow: hidden; display: flex; flex-direction: column;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: transform 0.06s;
    }
    .cons-tile:active { transform: scale(0.97); }   /* tap feedback — the tile is the button */
    .cons-tile.in-order { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }
    .cons-tile.out-of-stock { opacity: 0.55; pointer-events: none; }
    .cons-tile-img { position: relative; width: 100%; aspect-ratio: 1 / 1; background: var(--bg2); }
    .cons-tile-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .cons-tile-icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 46px; }
    .cons-tile-badge { position: absolute; top: 6px; right: 6px; }
    /* Count bubble — how many of this you've picked, readable at a glance */
    .cons-tile-qty {
      position: absolute; top: 6px; left: 6px; min-width: 26px; height: 26px; padding: 0 7px;
      border-radius: 13px; background: var(--green); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; font-family: var(--mono);
      box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    }
    .cons-tile-body { padding: 8px 9px 9px; display: flex; flex-direction: column; gap: 7px; flex: 1; }
    .cons-tile-name { font-size: 12.5px; font-weight: 500; line-height: 1.3; color: var(--text); }
    .cons-tile-controls { display: flex; align-items: center; gap: 4px; margin-top: auto; }
    .cons-tile-controls .qty-input { flex: 1; min-width: 0; height: 32px; text-align: center; }
    .cons-box-btn {
      display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; height: 30px;
      border: 1px solid var(--border2); border-radius: var(--radius); background: var(--bg2); color: var(--text2);
      font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .cons-box-btn:active { background: var(--border); }
    .checkout-name-bar {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 10px 16px; flex-shrink: 0;
    }
    .checkout-name-input {
      width: 100%; border: 1px solid var(--border); background: var(--bg);
      border-radius: var(--radius); padding: 8px 12px; font-size: 14px; color: var(--text); outline: none;
    }
    .checkout-name-input:focus { border-color: var(--border2); }
    .checkout-name-label {
      font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text3); font-family: var(--mono); margin-bottom: 5px;
    }
    .signout-card { max-width: 380px; }
    .signout-item-list { display: flex; flex-direction: column; gap: 6px; max-height: 240px; overflow-y: auto; text-align: left; }
    .signout-item-row {
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 10px;
    }
    .signout-item-row.over-limit { border-color: var(--amber-text); }
    .signout-item-info { flex: 1; min-width: 0; text-align: left; }
    .signout-item-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
    .signout-item-unit { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .signout-item-controls { display: flex; align-items: center; gap: 0; flex-shrink: 0; }
    .signout-item-controls .qty-input { width: 36px; height: 28px; font-size: 12px; }
    .signout-item-controls .qty-btn { width: 28px; height: 28px; font-size: 14px; }
    .signout-item-controls .remove-btn { margin-left: 6px; width: 28px; height: 28px; padding: 0; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- APP CHECK: remove this line to disable App Check (also remove init block in firebase-sync.js) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-check-compat.js"></script>
<script src="js/shared.js"></script>
<script src="js/firebase-sync.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
}

const ConsApp = {
  consumables: [],
  _stock:      [],       // live from Firestore
  _unsubStock: null,
  _items:      {},       // id -> qty in current checkout
  _stockReady: false,
  _checkoutBusy: false,  // in-flight guard — Enter key bypasses the disabled button
  _noImage: new Set(),   // stock keys whose photo 404'd this session — don't re-request

  async init() {
    const cfg = FirebaseConfig.get();
    if (!cfg) { this.showSetup(); return; }
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Could not connect. Check your Firebase config.'); return; }
    this.consumables = await Data.loadConsumables('./consumables.csv');
    this.renderShell();
    this.startStockListening();
    this.startConnectionStatus();
    this.startVersionCheck();
  },

  showSetup(err) {
    const isTest = FirebaseConfig.isTestMode();
    document.getElementById('root').innerHTML = `
      <div class="setup-screen">
        <div class="setup-card">
          <h2><i class="ti ti-package" style="color:#6b7280;vertical-align:-2px"></i> ${isTest ? 'Consumables — Test Setup' : 'Consumables — Setup'}</h2>
          <p>${isTest ? 'Enter the <strong>test</strong> Firebase config. Saved separately — production config is unchanged.' : 'Give this device a name, then connect to Firebase.'}</p>
          ${isTest ? `<div style="background:var(--amber-bg);color:var(--amber-text);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:12px"><i class="ti ti-flask"></i> Test mode is active</div>` : ''}
          ${err ? `<div style="background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:12px">${esc(err)}</div>` : ''}
          <div class="setup-field"><label>Device Name</label><input id="cfg-device" autocomplete="off" placeholder="e.g. Consumables Store iPad" value="${esc(ConsumablesDeviceName.get())}"></div>
          <div class="setup-field">
            <label>Paste Firebase config</label>
            <textarea id="cfg-paste" class="setup-paste-area" placeholder="apiKey|projectId|appId"></textarea>
          </div>
          <div class="setup-divider">or enter manually</div>
          <div class="setup-field"><label>API Key</label><input id="cfg-apiKey" autocomplete="off" placeholder="AIzaSy..."></div>
          <div class="setup-field"><label>Project ID</label><input id="cfg-projectId" autocomplete="off" placeholder="my-project-id"></div>
          <div class="setup-field"><label>App ID</label><input id="cfg-appId" autocomplete="off" placeholder="1:123456:web:abc..."></div>
          <button id="btn-connect" class="btn btn-primary" style="margin-top:8px"><i class="ti ti-plug"></i> Connect</button>
          ${isTest ? `<button id="btn-cancel-test" class="btn btn-outline" style="margin-top:8px"><i class="ti ti-arrow-left"></i> Cancel — back to production</button>` : ''}
          <div class="setup-note" style="margin-top:14px">Enter the config string provided by your administrator.</div>
        </div>
      </div>`;
    document.getElementById('cfg-paste').addEventListener('input', () => {
      const p = parseFirebaseConfig(document.getElementById('cfg-paste').value);
      if (p.apiKey)    document.getElementById('cfg-apiKey').value    = p.apiKey;
      if (p.projectId) document.getElementById('cfg-projectId').value = p.projectId;
      if (p.appId)     document.getElementById('cfg-appId').value     = p.appId;
    });
    document.getElementById('btn-connect').addEventListener('click', () => this.saveConfig());
    document.getElementById('btn-cancel-test')?.addEventListener('click', () => { FirebaseConfig.setTestMode(false); location.reload(); });
  },

  async saveConfig() {
    const paste = document.getElementById('cfg-paste')?.value || '';
    if (paste.trim()) {
      const p = parseFirebaseConfig(paste);
      if (p.apiKey)    document.getElementById('cfg-apiKey').value    = p.apiKey;
      if (p.projectId) document.getElementById('cfg-projectId').value = p.projectId;
      if (p.appId)     document.getElementById('cfg-appId').value     = p.appId;
    }
    const device = document.getElementById('cfg-device').value.trim();
    const apiKey = document.getElementById('cfg-apiKey').value.trim();
    const projectId = document.getElementById('cfg-projectId').value.trim();
    const appId = document.getElementById('cfg-appId').value.trim();
    if (!device) { alert('Please enter a device name.'); return; }
    if (!apiKey || !projectId || !appId) { alert('Please fill in all Firebase fields.'); return; }
    ConsumablesDeviceName.save(device);
    const cfg = { apiKey, projectId, appId, authDomain:`${projectId}.firebaseapp.com`, storageBucket:`${projectId}.appspot.com`, messagingSenderId:'000000000000' };
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Connection failed. Check your config.'); return; }
    FirebaseConfig.save(cfg);
    this.consumables = await Data.loadConsumables('./consumables.csv');
    this.renderShell();
    this.startStockListening();
    this.startConnectionStatus();
    this.startVersionCheck();
  },

  renderShell() {
    const deviceName = ConsumablesDeviceName.get();
    document.getElementById('root').innerHTML = `
      <div class="app-root" id="app-root">
        <div class="header">
          <div class="col"><div class="header-inner">
            <div class="header-left">
              <div class="header-title">Consumables Checkout</div>
              <div class="header-ref"><span class="live-dot" id="live-dot"></span><span id="live-label">Live</span> &nbsp;·&nbsp; <span id="app-version" style="opacity:0.6;font-family:var(--mono)"></span></div>
            </div>
            <div class="header-actions">
              ${deviceName ? `<span class="device-chip"><i class="ti ti-device-ipad" style="font-size:12px"></i> ${esc(deviceName)}</span>` : ''}
              <button class="icon-btn" id="btn-settings" title="Settings"><i class="ti ti-settings"></i></button>
            </div>
          </div></div>
        </div>

        <div id="update-banner-wrap"></div>
        ${FirebaseConfig.isTestMode() ? '<div class="test-mode-banner"><i class="ti ti-flask"></i> Test mode — connected to test database</div>' : ''}

        <!-- CATEGORY TABS -->
        <div id="cons-tabs-wrap"></div>

        <!-- SEARCH -->
        <div class="search-bar"><div class="col"><div class="search-wrap">
          <i class="ti ti-search"></i>
          <input type="search" id="cons-search" placeholder="Search consumables…" autocomplete="off">
        </div></div></div>

        <!-- LIST -->
        <div class="app-scroll" id="cons-scroll">
          <div class="col"><div class="mat-list" id="cons-mat-list"></div></div>
        </div>

        <!-- ACTION BAR -->
        <div class="action-bar"><div class="action-bar-inner">
          <button class="btn btn-danger" id="btn-cons-clear-main">
            <i class="ti ti-x"></i> Clear selection
          </button>
          <button class="btn btn-primary" id="btn-cons-review" style="margin-top:2px">
            <i class="ti ti-clipboard-check"></i>Review &amp; Sign Out Items
            <span class="sidebar-count zero" id="cons-badge" style="margin-left:4px">0</span>
          </button>
        </div></div>

        <div class="panel" id="settings-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-settings"><i class="ti ti-chevron-left"></i>Back</button>
            <div class="panel-title">Settings</div>
            <button class="btn-sm btn-sm-save" id="btn-save-settings">Save</button>
          </div>
          <div class="panel-scroll"><div class="panel-col" style="gap:20px" id="settings-body"></div></div>
        </div>
      </div>
      <div id="overlay-wrap"></div>`;

    // Listeners
    const tabs = document.getElementById('cons-tabs-wrap');
    tabs.addEventListener('click', e => {
      const c = e.target.closest('[data-cat-idx]');
      const s = e.target.closest('[data-sub-idx]');
      if (c) { const i=+c.dataset.catIdx; this.setCat(i===-1?null:this._cats[i]); }
      else if (s) { const i=+s.dataset.subIdx; this.setSub(i===-1?null:this._subs[i]); }
    });
    document.getElementById('cons-mat-list').addEventListener('click', e => {
      const dec=e.target.closest('[data-dec]'), inc=e.target.closest('[data-inc]');
      const box=e.target.closest('[data-box]');
      if (dec) { this.adj(+dec.dataset.dec, -1); return; }
      if (inc) { this.adj(+inc.dataset.inc,  1); return; }
      if (box) { this.addBox(+box.dataset.box); return; }
      if (e.target.closest('.qty-input')) return; // typing an exact qty — don't also add one
      // Tap anywhere else on a tile adds one: the fast path for walking the shelf.
      const tile = e.target.closest('[data-tile]');
      if (tile) this.adj(+tile.dataset.tile, 1);
    });
    document.getElementById('cons-mat-list').addEventListener('change', e => {
      const inp = e.target.closest('[data-qid]'); if (inp) this.setQty(+inp.dataset.qid, inp.value);
    });
    // A tile photo that 404s: remember its key so it's not requested again, and drop the
    // <img> so the category icon beneath shows through. Error events don't bubble — capture.
    document.getElementById('cons-mat-list').addEventListener('error', e => {
      const img = e.target;
      if (img.tagName === 'IMG' && img.dataset.sid) { this._noImage.add(img.dataset.sid); img.remove(); }
    }, true);
    document.getElementById('cons-search').addEventListener('input', () => this.renderList());
    document.getElementById('btn-cons-review').addEventListener('click', () => this.openSignOutOverlay());
    document.getElementById('btn-cons-clear-main').addEventListener('click', () => {
      if (!confirm('Clear selected items?')) return;
      this._items = {};
      this._changed();
    });
    document.getElementById('btn-settings')      .addEventListener('click', () => { this._populateSettings(); this.openPanel('settings-panel'); });
    document.getElementById('btn-close-settings').addEventListener('click', () => this.closePanel('settings-panel'));
    document.getElementById('btn-save-settings') .addEventListener('click', () => this.saveSettings());

    this._activeCat = null; this._activeSub = null;
    this._cats = []; this._subs = [];
    this.renderTabs();
    this.renderList();

    const verEl = document.getElementById('app-version');
    if (verEl) verEl.textContent = APP_VERSION;
  },

  // ── LIVE STATUS DOT (3-state: Live / Update Available / Offline) ──
  // Single source of truth so the dot and the update banner never disagree.
  // connected starts null (= not yet known) — the sign-out guard must only block on
  // an explicit false, or signing out right after page load gets wrongly refused.
  _connState: { connected: null, latestVersion: null },

  _renderLiveStatus() {
    const dot = document.getElementById('live-dot');
    const lbl = document.getElementById('live-label');
    const wrap = document.getElementById('update-banner-wrap');
    const { connected, latestVersion } = this._connState;
    const outdated = connected && latestVersion && isVersionNewer(latestVersion, APP_VERSION);

    if (dot && lbl) {
      dot.classList.remove('disconnected', 'update-available');
      if (!connected)      { dot.classList.add('disconnected'); lbl.textContent = 'Offline'; }
      else if (outdated)   { dot.classList.add('update-available'); lbl.textContent = 'Update Available'; }
      else                 { lbl.textContent = 'Live'; }
    }
    if (wrap) {
      wrap.innerHTML = outdated ? `<div class="update-banner">
          <i class="ti ti-refresh"></i>
          <span>A newer version (${esc(latestVersion)}) is available — you're on ${esc(APP_VERSION)}.</span>
          <button id="btn-refresh-update">Refresh</button>
        </div>` : '';
      document.getElementById('btn-refresh-update')?.addEventListener('click', () => location.reload());
    }
  },

  // Live connection indicator — reflects actual Firestore connection state.
  startConnectionStatus() {
    DB.listenConnectionStatus(connected => {
      this._connState.connected = connected;
      this._renderLiveStatus();
    });
  },

  // Version staleness check — see firebase-sync.js announceVersionIfNewer
  // for the rollback caveat (manually edit meta/version in Firebase
  // console if you ever revert to an older build).
  startVersionCheck() {
    DB.announceVersionIfNewer(APP_VERSION, isVersionNewer);
    DB.listenAppVersion(latest => {
      this._connState.latestVersion = latest;
      this._renderLiveStatus();
    });
  },

  startStockListening() {
    if (this._unsubStock) this._unsubStock();
    this._unsubStock = DB.listenStock(records => {
      this._stock = records;
      this._stockReady = true;
      // Tabs are computed from TRACKED items, which need stock data — the initial
      // renderShell ran before any stock arrived, so they must be re-rendered here
      // too or the category bar stays stuck on just "All".
      this.renderTabs();
      this.renderList();
      // Re-render the sign-out overlay if it's currently open, so live stock changes reflect there too
      if (document.getElementById('signout-item-list')) this._refreshSignOutItemsOnly();
    });
  },

  _stockFor(sid)   { return this._stock.find(r => r._id === sid) || null; },
  _availableQty(m) {
    const rec = this._stockFor(stockId(m));
    if (!rec?.tracked) return null;   // null = not tracked
    return rec.qty || 0;
  },
  _stockStatus(m) {
    const rec = this._stockFor(stockId(m));
    if (!rec?.tracked) return 'untracked';
    const qty = rec.qty || 0;
    if (qty <= 0) return 'zero';
    if (rec.warningQty > 0 && qty <= rec.warningQty) return 'low';
    return 'ok';
  },

  // Cart helpers
  get(id)        { return this._items[id]||0; },
  set(id,qty)    {
    const m = this.consumables.find(x=>x.id==id);
    const avail = m ? this._availableQty(m) : null;
    if (avail !== null) qty = Math.min(qty, avail);
    if (qty <= 0) delete this._items[id]; else this._items[id]=qty;
  },
  adj(id,d)      { this.set(id, this.get(id)+d); this._changed(); },
  setQty(id,v)   { this.set(id, parseInt(v)||0); this._changed(); },
  // Secondary "take a box" action for boxed items — adds a whole box's worth of
  // individual units (clamped to available stock by set()). Individual +/− stays primary.
  addBox(id)     { const m = this.consumables.find(x=>x.id==id); if (!hasBoxTracking(m)) return; this.set(id, this.get(id) + m.boxSize); this._changed(); },
  zero(id)       { delete this._items[id]; this._changed(); },
  count()        { return Object.keys(this._items).length; },
  items()        {
    return Object.keys(this._items).map(id => {
      const m = this.consumables.find(x=>x.id==id);
      return m ? {...m, qty:this._items[id]} : null;
    }).filter(Boolean);
  },

  _changed() {
    this._updateBadge(); this.renderList();
  },
  _updateBadge() {
    const b = document.getElementById('cons-badge'); if (!b) return;
    const n = this.count(); b.textContent = n; b.classList.toggle('zero', n===0);
  },

  renderTabs() {
    const wrap = document.getElementById('cons-tabs-wrap'); if (!wrap) return;
    // Only show tracked items in tabs
    const tracked = this.consumables.filter(m => this._stockFor(stockId(m))?.tracked);
    this._cats = Data.categories(tracked);
    this._subs = this._activeCat ? Data.subcategories(tracked, this._activeCat) : [];
    const catBtns = this._cats.map((c,i)=>`<button class="tab ${this._activeCat===c?'active':''}" data-cat-idx="${i}">${esc(c)}</button>`).join('');
    let subHtml = '';
    if (this._activeCat && this._subs.length) {
      const subBtns = this._subs.map((s,i)=>`<button class="tab ${this._activeSub===s?'active':''}" data-sub-idx="${i}">${esc(s)}</button>`).join('');
      subHtml = `<div class="tabs-bar sub-bar"><div class="tabs-inner"><button class="tab ${!this._activeSub?'active':''}" data-sub-idx="-1">All</button>${subBtns}</div></div>`;
    }
    wrap.innerHTML = `<div class="tabs-bar"><div class="tabs-inner"><button class="tab ${!this._activeCat?'active':''}" data-cat-idx="-1">All</button>${catBtns}</div></div>${subHtml}`;
  },

  setCat(cat) { this._activeCat=cat; this._activeSub=null; this.renderTabs(); this.renderList(); const s=document.getElementById('cons-scroll'); if(s)s.scrollTop=0; },
  setSub(sub) { this._activeSub=sub; this.renderTabs(); this.renderList(); },

  renderList() {
    const list = document.getElementById('cons-mat-list'); if (!list) return;
    const q = (document.getElementById('cons-search')?.value||'').toLowerCase();

    // Only show tracked consumables on the worker page
    const tracked = this.consumables.filter(m => this._stockFor(stockId(m))?.tracked);
    let filtered = Data.filter(tracked, this._activeCat, this._activeSub, q);

    // Sort: in-stock first (by status), then zero/out
    const order = {ok:0, low:1, zero:2};
    filtered.sort((a,b)=>(order[this._stockStatus(a)]??0)-(order[this._stockStatus(b)]??0)||descCompare(a.description,b.description));

    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><i class="ti ti-package-off"></i><p>${this._stockReady ? 'No consumables in stock.' : 'Loading stock levels…'}</p></div>`;
      return;
    }

    const tiles = filtered.map(m => {
      const qty    = this.get(m.id);
      const inOrder= qty > 0;
      const avail  = this._availableQty(m);
      const status = this._stockStatus(m);
      const ci     = CAT_ICONS[m.category] || CAT_ICONS.default;
      const isZero = status === 'zero';
      const isBoxed = hasBoxTracking(m);
      const sid    = stockId(m);

      const stockBadgeClass = status==='low' ? 'low' : status==='zero' ? 'zero' : 'ok';
      const stockLabel = avail === null ? '' : isZero ? 'Out of stock' : `${avail} in stock`;
      const stockBadge = avail !== null
        ? `<span class="cons-stock-badge ${stockBadgeClass} cons-tile-badge">${stockLabel}</span>`
        : '';

      // Photo if present (images/consumables/<key>.jpg); the category icon sits beneath
      // and shows through if the photo is missing. A failed photo is remembered for the
      // session (_noImage) so it isn't re-requested on every re-render.
      const imgTag = this._noImage.has(sid) ? ''
        : `<img src="images/consumables/${esc(sid)}.jpg" alt="" loading="lazy" data-sid="${esc(sid)}">`;
      // The whole tile is the tap target — tap adds one, so you can walk the shelf and
      // tap what you need. The stepper/box controls below opt out of that (they stop the
      // click), and the count bubble shows what's picked at a glance.
      return `<div class="cons-tile ${inOrder?'in-order':''} ${isZero?'out-of-stock':''}" data-tile="${m.id}">
        <div class="cons-tile-img">
          <div class="cons-tile-icon" style="background:${ci.bg}"><i class="ti ${ci.icon}" style="color:${ci.color}"></i></div>
          ${imgTag}
          ${stockBadge}
          ${qty > 0 ? `<span class="cons-tile-qty">${qty}</span>` : ''}
        </div>
        <div class="cons-tile-body">
          <div class="cons-tile-name">${esc(m.description)}</div>
          <div class="cons-tile-controls">
            <button class="qty-btn" data-dec="${m.id}">−</button>
            <input class="qty-input" type="number" min="0" ${avail!==null?`max="${avail}"`:''} step="1" value="${qty}" data-qid="${m.id}">
            <button class="qty-btn" data-inc="${m.id}">+</button>
          </div>
          ${isBoxed ? `<button class="cons-box-btn" data-box="${m.id}"><i class="ti ti-box-seam"></i> Take a ${esc(m.boxUnit||'Box')} (${m.boxSize})</button>` : ''}
        </div>
      </div>`;
    }).join('');
    list.innerHTML = `<div class="cons-grid">${tiles}</div>`;
  },

  openPanel(id)  { document.getElementById(id)?.classList.add('open'); },
  closePanel(id) { document.getElementById(id)?.classList.remove('open'); },

  _populateSettings() {
    const s = Settings.get();
    const el = document.getElementById('settings-body'); if (!el) return;
    const isTest = FirebaseConfig.isTestMode();
    el.innerHTML = `
      <div class="settings-section">
        <div class="settings-label">Search &amp; Sort</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">Numeric-aware sorting</div><div class="settings-row-sub">e.g. 8mm lists before 10mm, rather than alphabetically</div></div>
            <input type="checkbox" id="s-natural-sort" ${s.naturalSort!==false?'checked':''} style="width:20px;height:20px">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Unit-aware search</div><div class="settings-row-sub">"1 inch", "25.4mm", "1\"" etc. all find the same item</div></div>
            <input type="checkbox" id="s-unit-search" ${s.unitAwareSearch!==false?'checked':''} style="width:20px;height:20px">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Typo-tolerant search</div><div class="settings-row-sub">Finds close matches even with spelling mistakes</div></div>
            <input type="checkbox" id="s-fuzzy-search" ${s.fuzzySearch!==false?'checked':''} style="width:20px;height:20px">
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Database</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">Test mode</div><div class="settings-row-sub">Use a separate test Firebase database — shared across all pages on this server</div></div>
            <button class="btn-sm ${isTest?'btn-sm-danger':''}" id="btn-toggle-test-mode">${isTest?'On — tap to exit':'Off'}</button>
          </div>
        </div>
      </div>`;
    document.getElementById('btn-toggle-test-mode').addEventListener('click', () => {
      FirebaseConfig.setTestMode(!FirebaseConfig.isTestMode());
      location.reload();
    });
  },

  saveSettings() {
    Settings.save({
      naturalSort:     document.getElementById('s-natural-sort')?.checked ?? true,
      unitAwareSearch: document.getElementById('s-unit-search')?.checked ?? true,
      fuzzySearch:     document.getElementById('s-fuzzy-search')?.checked ?? true,
    });
    this.renderList();
    const btn = document.getElementById('btn-save-settings');
    if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => btn.textContent = 'Save', 1500); }
  },

  // Combined sign-out overlay: name field + small editable item list, all in one step.
  // Replaces the old separate review panel — most sign-outs are a single line,
  // so this keeps it to one screen rather than review-panel → name-popup.
  openSignOutOverlay() {
    if (this.count() === 0) { alert('No items selected.'); return; }
    this._renderSignOutOverlay();
  },

  _renderSignOutOverlay() {
    const items = this.items();
    if (!items.length) { document.getElementById('overlay-wrap').innerHTML = ''; return; }

    const warnings = items.filter(i => {
      const avail = this._availableQty(i);
      return avail !== null && i.qty > avail;
    });

    const itemRows = items.map(i => {
      const avail     = this._availableQty(i);
      const overLimit = avail !== null && i.qty > avail;
      return `<div class="signout-item-row${overLimit?' over-limit':''}">
        <div class="signout-item-info">
          <div class="signout-item-name">${esc(i.description)}</div>
          <div class="signout-item-unit">${esc(i.qtyType||'')}${avail!==null?` · ${avail} in stock`:''}</div>
        </div>
        <div class="signout-item-controls">
          <button class="qty-btn" data-so-dec="${i.id}">−</button>
          <input class="qty-input" type="number" min="1" ${avail!==null?`max="${avail}"`:''} step="1" value="${i.qty}" data-so-qid="${i.id}">
          <button class="qty-btn" data-so-inc="${i.id}">+</button>
          <button class="remove-btn" data-so-rem="${i.id}"><i class="ti ti-x"></i></button>
        </div>
      </div>`;
    }).join('');

    const ow = document.getElementById('overlay-wrap');
    ow.innerHTML = `
      <div class="success-overlay">
        <div class="success-card signout-card">
          <div class="success-icon blue"><i class="ti ti-user"></i></div>
          <h3>Sign out items</h3>
          <input class="checkout-name-input" type="text" id="overlay-tradesman-name" placeholder="Your name" autocomplete="off" style="margin:10px 0">
          ${warnings.length ? `
            <div style="background:var(--amber-bg);border:1px solid var(--amber-text);border-radius:var(--radius);padding:8px 10px;font-size:12px;color:var(--amber-text);margin-bottom:8px;text-align:left">
              <i class="ti ti-alert-triangle"></i> Some quantities exceed current stock.
            </div>` : ''}
          <div class="signout-item-list" id="signout-item-list">${itemRows}</div>
          <button class="btn btn-primary" id="btn-overlay-confirm" style="width:100%;margin-top:12px">
            <i class="ti ti-check"></i> Confirm Item Sign Out
          </button>
          <button class="btn btn-danger" id="btn-overlay-cancel" style="width:100%;margin-top:8px">
            <i class="ti ti-x"></i> Cancel
          </button>
        </div>
      </div>`;

    const nameInput = document.getElementById('overlay-tradesman-name');
    nameInput.focus();

    document.getElementById('signout-item-list').addEventListener('click', e => {
      const dec = e.target.closest('[data-so-dec]');
      const inc = e.target.closest('[data-so-inc]');
      const rem = e.target.closest('[data-so-rem]');
      if (dec) { this.adj(+dec.dataset.soDec, -1); this._refreshSignOutItemsOnly(); }
      if (inc) { this.adj(+inc.dataset.soInc,  1); this._refreshSignOutItemsOnly(); }
      if (rem) { this.zero(+rem.dataset.soRem); this._refreshSignOutOrClose(); }
    });
    document.getElementById('signout-item-list').addEventListener('change', e => {
      const inp = e.target.closest('[data-so-qid]');
      if (inp) { this.setQty(+inp.dataset.soQid, inp.value); this._refreshSignOutItemsOnly(); }
    });

    const confirm = () => this._doCheckout(nameInput.value.trim());
    document.getElementById('btn-overlay-confirm').addEventListener('click', confirm);
    document.getElementById('btn-overlay-cancel').addEventListener('click', () => { ow.innerHTML = ''; });
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') confirm(); });
  },

  // Re-render just the item list + name value preserved, after a qty change inside the overlay
  _refreshSignOutItemsOnly() {
    const nameVal = document.getElementById('overlay-tradesman-name')?.value || '';
    this._renderSignOutOverlay();
    const nameInput = document.getElementById('overlay-tradesman-name');
    if (nameInput) nameInput.value = nameVal;
  },

  // If removing the last item empties the cart, close the overlay entirely; otherwise refresh
  _refreshSignOutOrClose() {
    if (this.count() === 0) { document.getElementById('overlay-wrap').innerHTML = ''; this._changed(); return; }
    this._refreshSignOutItemsOnly();
    this._changed();
  },

  // Writes the stock adjustments once a name has been entered
  async _doCheckout(tradesmanName) {
    // Double-submit guard: the confirm button gets disabled below, but the Enter key
    // on the name field calls this directly — without the flag, a second Enter during
    // the awaits would deduct every item's stock a second time.
    if (this._checkoutBusy) return;
    if (!tradesmanName) { alert('Please enter your name to confirm.'); return; }
    const items = this.items();
    if (!items.length) { document.getElementById('overlay-wrap').innerHTML=''; return; }
    if (this._connState.connected === false) {
      alert("You're currently offline — sign outs can't be recorded without a connection. Please reconnect and try again.");
      return;
    }
    for (const item of items) {
      const avail = this._availableQty(item);
      if (avail !== null && item.qty > avail) {
        alert(`Not enough stock for "${item.description}". Only ${avail} available.`);
        return;
      }
    }

    this._checkoutBusy = true;
    try {
      const deviceName = ConsumablesDeviceName.get();
      const by = deviceName ? `${deviceName} — ${tradesmanName}` : tradesmanName;
      const sessionId = genRef();

      const btn = document.getElementById('btn-overlay-confirm');
      if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Processing…'; }

      const errors = [];
      const failedIds = new Set();
      for (const item of items) {
        try {
          await DB.adjustStock(stockId(item), item.description, -item.qty, 'checkout', by, sessionId);
        } catch(e) {
          failedIds.add(item.id);
          if (e.message === 'INSUFFICIENT_STOCK') errors.push(`${item.description}: insufficient stock`);
          else errors.push(`${item.description}: ${e.message}`);
        }
      }

      // Clear only what went through — failed items stay selected so they can be
      // adjusted and retried instead of having to be found and re-added from scratch.
      for (const item of items) if (!failedIds.has(item.id)) delete this._items[item.id];
      this._changed();

      const ow = document.getElementById('overlay-wrap');
      if (errors.length) {
        ow.innerHTML = '';
        alert(`Some items could not be signed out:\n\n${errors.join('\n')}\n\nThose items are still selected — adjust the quantities and try again.`);
        return;
      }

      ow.innerHTML = `
        <div class="success-overlay">
          <div class="success-card">
            <div class="success-icon green"><i class="ti ti-circle-check"></i></div>
            <h3>Item sign out complete!</h3>
            <p>Stock levels have been updated. Thank you, ${esc(tradesmanName)}.</p>
            <button class="btn btn-primary" id="btn-done-checkout">Done</button>
          </div>
        </div>`;
      document.getElementById('btn-done-checkout').addEventListener('click', () => { ow.innerHTML=''; });
    } finally {
      this._checkoutBusy = false;
    }
  },
};

document.addEventListener('DOMContentLoaded', () => ConsApp.init());
</script>
</body>
</html>
