<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Material Orders — Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .qty-row { display:flex; align-items:center; }
    .qty-row .qty-btn {
      width:28px; height:28px; font-size:15px;
      background:var(--bg); border:1px solid var(--border); color:var(--text);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .qty-row .qty-btn:first-child { border-radius:var(--radius) 0 0 var(--radius); }
    .qty-row .qty-btn:last-child  { border-radius:0 var(--radius) var(--radius) 0; border-left:none; }
    .qty-row .qty-edit {
      width:44px; height:28px;
      border:1px solid var(--border); border-left:none; border-right:none;
      background:var(--surface); font-size:12px; font-family:var(--mono);
      text-align:center; outline:none; color:var(--text);
      -moz-appearance:textfield;
    }
    .qty-row .qty-edit::-webkit-inner-spin-button,
    .qty-row .qty-edit::-webkit-outer-spin-button { -webkit-appearance:none; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/shared.js"></script>
<script src="js/firebase-sync.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
}

const Manager = {
  orders:        [],
  activeView:    'pending',
  unsubscribe:   null,
  _emailOrderId: null,

  async init() {
    const cfg = FirebaseConfig.get();
    if (!cfg) { this.showSetup(); return; }
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Could not connect. Check your Firebase config.'); return; }
    this.renderShell();
    this.startListening();
  },

  showSetup(err) {
    document.getElementById('root').innerHTML = `
      <div class="setup-screen">
        <div class="setup-card">
          <h2><i class="ti ti-flame" style="color:#ea580c;vertical-align:-2px"></i> Connect to Firebase</h2>
          <p>Enter your Firebase project config to receive orders from the iPad.</p>
          ${err ? `<div style="background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);
            padding:10px 12px;font-size:13px;margin-bottom:12px">${esc(err)}</div>` : ''}
          <div class="setup-field"><label>API Key</label><input id="cfg-apiKey" autocomplete="off" placeholder="AIzaSy..."></div>
          <div class="setup-field"><label>Project ID</label><input id="cfg-projectId" autocomplete="off" placeholder="my-project-id"></div>
          <div class="setup-field"><label>App ID</label><input id="cfg-appId" autocomplete="off" placeholder="1:123456:web:abc..."></div>
          <button id="btn-connect" class="btn btn-primary" style="margin-top:8px">
            <i class="ti ti-plug"></i> Connect
          </button>
          <div class="setup-note" style="margin-top:14px">Same config as the iPad. See README.md.</div>
        </div>
      </div>`;
    document.getElementById('btn-connect').addEventListener('click', () => this.saveConfig());
  },

  async saveConfig() {
    const apiKey    = document.getElementById('cfg-apiKey').value.trim();
    const projectId = document.getElementById('cfg-projectId').value.trim();
    const appId     = document.getElementById('cfg-appId').value.trim();
    if (!apiKey || !projectId || !appId) { alert('Please fill in all fields.'); return; }
    const cfg = { apiKey, projectId, appId,
      authDomain:`${projectId}.firebaseapp.com`,
      storageBucket:`${projectId}.appspot.com`,
      messagingSenderId:'000000000000' };
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Connection failed. Double-check your config values.'); return; }
    FirebaseConfig.save(cfg);
    this.renderShell();
    this.startListening();
  },

  // ── SHELL — rendered once, all listeners attached here ──
  renderShell() {
    document.getElementById('root').innerHTML = `
      <div class="app-root manager-root" id="app-root">
        <div class="header manager-hdr">
          <div class="col"><div class="header-inner">
            <div class="header-left">
              <div class="header-title">Material Orders — Manager</div>
              <div class="header-ref"><span class="live-dot"></span>Live</div>
            </div>
            <div class="header-actions">
              <span class="role-pill">Production Manager</span>
              <button class="icon-btn" id="btn-settings" title="Settings">
                <i class="ti ti-settings"></i>
              </button>
            </div>
          </div></div>
        </div>

        <div class="mobile-tabs" id="mobile-tabs">
          <button class="tab active" data-view="pending">
            Pending <span class="sidebar-count zero" id="mob-pending-count" style="margin-left:4px">0</span>
          </button>
          <button class="tab" data-view="sent">Sent</button>
          <button class="tab" data-view="all">All</button>
        </div>

        <div class="manager-body">
          <div class="manager-sidebar">
            <div class="sidebar-section">
              <div class="sidebar-title">Orders</div>
              <button class="sidebar-btn active" data-sb="pending">
                <i class="ti ti-clock"></i> Pending
                <span class="sidebar-count zero" id="pending-count">0</span>
              </button>
              <button class="sidebar-btn" data-sb="sent">
                <i class="ti ti-mail-check"></i> Sent
              </button>
              <button class="sidebar-btn" data-sb="all">
                <i class="ti ti-list"></i> All
              </button>
            </div>
            <div class="sidebar-section">
              <div class="sidebar-title">Settings</div>
              <button class="sidebar-btn" id="sb-settings">
                <i class="ti ti-adjustments"></i> Email &amp; preferences
              </button>
              <button class="sidebar-btn" id="sb-reset">
                <i class="ti ti-plug-x"></i> Reset connection
              </button>
            </div>
          </div>

          <div class="manager-main">
            <!-- order-queue innerHTML is replaced by renderQueue(); the listener is on this element -->
            <div class="order-queue" id="order-queue"></div>
          </div>
        </div>

        <div class="panel" id="email-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-email">
              <i class="ti ti-chevron-left"></i> Back
            </button>
            <div class="panel-title">Order Email</div>
            <button class="btn-green btn" id="btn-send-email" style="width:auto;padding:7px 14px;font-size:13px">
              <i class="ti ti-send"></i> Send
            </button>
          </div>
          <div class="email-fields">
            <div class="email-field"><label>To</label><input type="email" id="email-to"></div>
            <div class="email-field"><label>CC</label><input type="email" id="email-cc"></div>
            <div class="email-field"><label>Subject</label><input type="text" id="email-subject"></div>
          </div>
          <div class="email-body-wrap"><textarea id="email-body"></textarea></div>
        </div>

        <div class="panel" id="settings-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-settings">
              <i class="ti ti-chevron-left"></i> Back
            </button>
            <div class="panel-title">Settings</div>
            <button class="btn-sm btn-sm-save" id="btn-save-settings">Save</button>
          </div>
          <div class="panel-scroll">
            <div class="panel-col" style="gap:20px" id="settings-body"></div>
          </div>
        </div>
      </div>
      <div id="overlay-wrap"></div>`;

    // ── ALL LISTENERS ATTACHED ONCE ──

    document.getElementById('btn-settings')      .addEventListener('click', () => this.openPanel('settings-panel'));
    document.getElementById('sb-settings')       .addEventListener('click', () => this.openPanel('settings-panel'));
    document.getElementById('sb-reset')          .addEventListener('click', () => this.clearFirebase());
    document.getElementById('btn-close-email')   .addEventListener('click', () => this.closePanel('email-panel'));
    document.getElementById('btn-send-email')    .addEventListener('click', () => this.sendEmail());
    document.getElementById('btn-close-settings').addEventListener('click', () => this.closePanel('settings-panel'));
    document.getElementById('btn-save-settings') .addEventListener('click', () => this.saveSettings());

    document.querySelectorAll('[data-sb]').forEach(btn =>
      btn.addEventListener('click', () => this.setView(btn.dataset.sb))
    );
    document.getElementById('mobile-tabs').addEventListener('click', e => {
      const btn = e.target.closest('[data-view]');
      if (btn) this.setView(btn.dataset.view);
    });

    // ── ORDER QUEUE — single permanent delegated listener ──
    // renderQueue() only sets innerHTML of #order-queue.
    // This listener is on #order-queue itself and is attached exactly once.
    // stopPropagation is called in JS for qty/action buttons so they don't
    // bubble to the card header toggle handler.
    const queue = document.getElementById('order-queue');
    queue.addEventListener('click', e => {
      // Check from most-specific to least-specific
      const dec     = e.target.closest('[data-qdec]');
      const inc     = e.target.closest('[data-qinc]');
      const approve = e.target.closest('[data-approve]');
      const del     = e.target.closest('[data-delete]');
      const header  = e.target.closest('.order-card-header');

      if (dec)     { e.stopPropagation(); this.stepQty(dec.dataset.qdec,     +dec.dataset.idx,    -1); return; }
      if (inc)     { e.stopPropagation(); this.stepQty(inc.dataset.qinc,     +inc.dataset.idx,     1); return; }
      if (approve) { e.stopPropagation(); this.prepareEmail(approve.dataset.approve);                  return; }
      if (del)     { e.stopPropagation(); this.deleteOrder(del.dataset.delete);                        return; }
      if (header)  { this.toggleCard(header.dataset.cardId); }
    });
    queue.addEventListener('change', e => {
      const inp = e.target.closest('[data-qchange]');
      if (inp) {
        e.stopPropagation();
        this.editQty(inp.dataset.qchange, +inp.dataset.idx, inp.value);
      }
    });

    this._populateSettings();
    this.renderQueue();
  },

  openPanel(id)  { document.getElementById(id)?.classList.add('open'); },
  closePanel(id) { document.getElementById(id)?.classList.remove('open'); },

  _populateSettings() {
    const s  = Settings.get();
    const el = document.getElementById('settings-body');
    if (!el) return;
    el.innerHTML = `
      <div class="settings-section">
        <div class="settings-label">Email</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">To (purchasing)</div>
              <div class="settings-row-sub">Auto-filled in To: field</div></div>
            <input type="email" id="s-supplier" value="${esc(s.supplierEmail)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">CC email</div>
              <div class="settings-row-sub">Always CC'd on orders</div></div>
            <input type="email" id="s-cc" value="${esc(s.ccEmail)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Closing note</div>
              <div class="settings-row-sub">Added at end of email</div></div>
            <input type="text" id="s-delivery" value="${esc(s.deliveryNote)}">
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Materials catalogue</div>
        <div class="settings-card">
          <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:6px">
            <div class="settings-row-sub">
              Edit <strong>materials.csv</strong> in the GitHub repository and commit.
              Both devices reload automatically on next open.
            </div>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Connection</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">Firebase config</div>
              <div class="settings-row-sub">Clear to re-enter connection details</div></div>
            <button class="btn-sm btn-sm-danger" id="btn-clear-firebase">Clear</button>
          </div>
        </div>
      </div>`;
    document.getElementById('btn-clear-firebase').addEventListener('click', () => this.clearFirebase());
  },

  saveSettings() {
    Settings.save({
      supplierEmail: document.getElementById('s-supplier')?.value.trim(),
      ccEmail:       document.getElementById('s-cc')?.value.trim(),
      deliveryNote:  document.getElementById('s-delivery')?.value.trim(),
    });
    const btn = document.getElementById('btn-save-settings');
    if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => btn.textContent = 'Save', 1500); }
  },

  clearFirebase() {
    if (!confirm('Clear Firebase config? You will need to re-enter it.')) return;
    FirebaseConfig.clear(); location.reload();
  },

  setView(v) {
    this.activeView = v;
    document.querySelectorAll('[data-sb]').forEach(b =>
      b.classList.toggle('active', b.dataset.sb === v));
    document.querySelectorAll('#mobile-tabs [data-view]').forEach(b =>
      b.classList.toggle('active', b.dataset.view === v));
    this.renderQueue();
  },

  startListening() {
    if (this.unsubscribe) this.unsubscribe();
    this.unsubscribe = DB.listenOrders(orders => {
      this.orders = orders;
      const n = orders.filter(o => o.status === 'pending').length;
      ['pending-count','mob-pending-count'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.textContent = n; el.classList.toggle('zero', n === 0); }
      });
      this.renderQueue();
    });
  },

  // ── RENDER QUEUE — only sets innerHTML, no listeners ──
  renderQueue() {
    const wrap = document.getElementById('order-queue');
    if (!wrap) return;
    let list = this.orders;
    if (this.activeView === 'pending') list = list.filter(o => o.status === 'pending');
    if (this.activeView === 'sent')    list = list.filter(o => o.status === 'sent');

    if (!list.length) {
      const msgs = {
        pending: ['ti-clock','No pending orders yet.<br>Waiting for the worker to submit.'],
        sent:    ['ti-mail-check','No sent orders yet.'],
        all:     ['ti-inbox','No orders yet.'],
      };
      const [ic, msg] = msgs[this.activeView] || msgs.all;
      wrap.innerHTML = `<div class="empty-queue"><i class="ti ${ic}"></i><p>${msg}</p></div>`;
      return;
    }
    wrap.innerHTML = list.map(o => this._orderCard(o)).join('');
  },

  _orderCard(o) {
    const ts        = o.submittedAt?.toDate ? fmtTime(o.submittedAt.toDate()) : fmtTime(o.submittedAt);
    const isPending = o.status === 'pending';
    const isSent    = o.status === 'sent';
    const items     = o.items || [];
    const statusLabel = isPending ? 'Pending review' : isSent ? 'Sent' : o.status;
    const statusClass = isPending ? 'status-pending' : 'status-sent';

    const rows = items.map((item, idx) => `
      <div class="order-line">
        <div class="order-line-info">
          <div class="order-line-name">${esc(item.description)}</div>
          <div class="order-line-code">${esc(item.partCode)}</div>
        </div>
        <div class="order-line-right">
          ${isPending ? `
            <div class="qty-row">
              <button class="qty-btn" data-qdec="${o._id}" data-idx="${idx}">−</button>
              <input class="qty-edit" type="number" min="0" step="1" value="${item.qty}"
                data-qchange="${o._id}" data-idx="${idx}" id="qinp-${o._id}-${idx}">
              <button class="qty-btn" data-qinc="${o._id}" data-idx="${idx}">+</button>
            </div>` : `<span class="order-line-qty">× ${item.qty}</span>`}
          <span style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:6px">
            ${esc(item.qtyType||'')}</span>
        </div>
      </div>`).join('');

    const actions = isPending ? `
      <button class="btn btn-green" data-approve="${o._id}">
        <i class="ti ti-mail"></i> Approve &amp; send email
      </button>
      <button class="btn btn-danger" data-delete="${o._id}">
        <i class="ti ti-x"></i> Reject
      </button>` : isSent ? `
      <span class="sent-stamp"><i class="ti ti-circle-check"></i> Email sent</span>
      <button class="btn btn-outline" data-delete="${o._id}" style="margin-top:8px">
        <i class="ti ti-trash"></i> Delete record
      </button>` : '';

    return `<div class="order-card" id="card-${o._id}">
      <div class="order-card-header" data-card-id="${o._id}">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%">
          <div>
            <div class="order-ref-text">${esc(o.ref||o._id)}</div>
            <div class="order-meta">${ts} · ${items.length} line${items.length!==1?'s':''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="status-pill ${statusClass}">${statusLabel}</span>
            <i class="ti ti-chevron-right chevron" id="chev-${o._id}"></i>
          </div>
        </div>
      </div>
      <div class="order-card-body" id="body-${o._id}">
        ${isPending ? '<div class="edit-note">You can edit quantities before approving.</div>' : ''}
        ${rows}
        <div class="order-card-actions">${actions}</div>
      </div>
    </div>`;
  },

  toggleCard(id) {
    document.getElementById(`body-${id}`)?.classList.toggle('open');
    document.getElementById(`chev-${id}`)?.classList.toggle('open');
  },

  async stepQty(orderId, idx, delta) {
    const order = this.orders.find(o => o._id === orderId);
    if (!order) return;
    const items  = [...order.items];
    const newQty = Math.max(0, (items[idx].qty||0) + delta);
    items[idx]   = { ...items[idx], qty: newQty };
    const inp = document.getElementById(`qinp-${orderId}-${idx}`);
    if (inp) inp.value = newQty;
    try { await DB.updateItems(orderId, items); }
    catch(e) { alert('Update failed: ' + e.message); }
  },

  async editQty(orderId, idx, val) {
    const order = this.orders.find(o => o._id === orderId);
    if (!order) return;
    const items = [...order.items];
    items[idx]  = { ...items[idx], qty: Math.max(0, parseInt(val)||0) };
    try { await DB.updateItems(orderId, items); }
    catch(e) { alert('Update failed: ' + e.message); }
  },

  async deleteOrder(id) {
    if (!confirm('Delete this order?')) return;
    try { await DB.deleteOrder(id); }
    catch(e) { alert('Delete failed: ' + e.message); }
  },

  prepareEmail(orderId) {
    const order = this.orders.find(o => o._id === orderId);
    if (!order) return;
    this._emailOrderId = orderId;
    const s = Settings.get();
    document.getElementById('email-to').value      = s.supplierEmail;
    document.getElementById('email-cc').value      = s.ccEmail;
    document.getElementById('email-subject').value = `Material Order — ${order.ref||order._id}`;
    document.getElementById('email-body').value    = buildEmailBody(order.ref||order._id, order.items||[]);
    this.openPanel('email-panel');
  },

  async sendEmail() {
    const to      = document.getElementById('email-to').value;
    const cc      = document.getElementById('email-cc').value;
    const subject = document.getElementById('email-subject').value;
    const body    = document.getElementById('email-body').value;
    const mailto  = `mailto:${to}?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    if (this._emailOrderId) {
      try { await DB.updateStatus(this._emailOrderId, 'sent'); } catch {}
    }
    this.closePanel('email-panel');
    const ow = document.getElementById('overlay-wrap');
    ow.innerHTML = `
      <div class="success-overlay">
        <div class="success-card">
          <div class="success-icon blue"><i class="ti ti-mail-forward"></i></div>
          <h3>Opening mail client…</h3>
          <p>Order marked as sent. Outlook will open with the order pre-filled.</p>
          <button class="btn btn-primary" id="btn-done-email">Done</button>
        </div>
      </div>`;
    document.getElementById('btn-done-email').addEventListener('click', () => { ow.innerHTML = ''; });
    setTimeout(() => { window.location.href = mailto; }, 400);
  },
};

document.addEventListener('DOMContentLoaded', () => Manager.init());
</script>
</body>
</html>
