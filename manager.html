<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material Orders — Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="root"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/shared.js"></script>
<script src="js/firebase-sync.js"></script>
<script>
const Manager = {
  orders: [],
  activeView: 'pending',
  unsubscribe: null,

  async init() {
    const cfg = FirebaseConfig.get();
    if (!cfg) { this.showSetup(); return; }
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Could not connect. Check your Firebase config.'); return; }
    this.renderShell();
    this.startListening();
  },

  // ── SETUP ──
  showSetup(err) {
    document.getElementById('root').innerHTML = `
      <div class="setup-screen">
        <div class="setup-card">
          <h2><i class="ti ti-flame" style="color:#ea580c;vertical-align:-2px"></i> Connect to Firebase</h2>
          <p>Enter your Firebase project config to receive orders from the iPad.</p>
          ${err?`<div style="background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:12px">${esc(err)}</div>`:''}
          <div class="setup-field"><label>API Key</label><input id="cfg-apiKey" autocomplete="off" placeholder="AIzaSy..."></div>
          <div class="setup-field"><label>Project ID</label><input id="cfg-projectId" autocomplete="off" placeholder="my-project-id"></div>
          <div class="setup-field"><label>App ID</label><input id="cfg-appId" autocomplete="off" placeholder="1:123456:web:abc..."></div>
          <button class="btn btn-primary" style="margin-top:8px" onclick="Manager.saveConfig()">
            <i class="ti ti-plug"></i> Connect
          </button>
          <div class="setup-note" style="margin-top:14px">
            Same config as the iPad. See README.md for full guide.
          </div>
        </div>
      </div>`;
  },

  async saveConfig() {
    const apiKey    = document.getElementById('cfg-apiKey').value.trim();
    const projectId = document.getElementById('cfg-projectId').value.trim();
    const appId     = document.getElementById('cfg-appId').value.trim();
    if (!apiKey||!projectId||!appId) { alert('Please fill in all fields.'); return; }
    const cfg = { apiKey, projectId, appId,
      authDomain:`${projectId}.firebaseapp.com`,
      storageBucket:`${projectId}.appspot.com`,
      messagingSenderId:'000000000000' };
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Connection failed. Double-check your config values.'); return; }
    FirebaseConfig.save(cfg);
    this.renderShell();
    this.startListening();
  },

  // ── SHELL ──
  renderShell() {
    document.getElementById('root').innerHTML = `
      <div class="app-root manager-root" id="app-root">
        <div class="header manager">
          <div class="header-left">
            <div class="header-title">Material Orders — Manager</div>
            <div class="header-ref"><span class="live-dot"></span>Live</div>
          </div>
          <div class="header-actions">
            <span class="role-pill">Production Manager</span>
            <button class="icon-btn" onclick="Manager.openPanel('settings-panel')" title="Settings">
              <i class="ti ti-settings"></i>
            </button>
          </div>
        </div>

        <!-- Mobile tab strip (hidden on desktop) -->
        <div class="mobile-manager-tabs tabs">
          <button class="tab active" id="mtab-pending" onclick="Manager.setView('pending')">
            Pending <span class="sidebar-count zero" id="mob-pending-count" style="margin-left:4px">0</span>
          </button>
          <button class="tab" id="mtab-sent" onclick="Manager.setView('sent')">Sent</button>
          <button class="tab" id="mtab-all"  onclick="Manager.setView('all')">All</button>
        </div>

        <div class="manager-columns">
          <!-- Sidebar (desktop only) -->
          <div class="manager-sidebar">
            <div class="sidebar-section">
              <div class="sidebar-title">Orders</div>
              <button class="sidebar-btn active" id="sb-pending" onclick="Manager.setView('pending')">
                <i class="ti ti-clock"></i> Pending
                <span class="sidebar-count zero" id="pending-count">0</span>
              </button>
              <button class="sidebar-btn" id="sb-sent" onclick="Manager.setView('sent')">
                <i class="ti ti-mail-check"></i> Sent
              </button>
              <button class="sidebar-btn" id="sb-all" onclick="Manager.setView('all')">
                <i class="ti ti-list"></i> All
              </button>
            </div>
            <div class="sidebar-section">
              <div class="sidebar-title">Settings</div>
              <button class="sidebar-btn" onclick="Manager.openPanel('settings-panel')">
                <i class="ti ti-adjustments"></i> Email &amp; preferences
              </button>
              <button class="sidebar-btn" onclick="Manager.clearFirebase()">
                <i class="ti ti-plug-x"></i> Reset connection
              </button>
            </div>
          </div>

          <!-- Main content -->
          <div class="manager-main">
            <div class="order-queue" id="order-queue">
              <div class="empty-queue">
                <i class="ti ti-loader" style="animation:spin 1s linear infinite"></i>
                <p>Loading orders…</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Panels — inside app-root so they clip and size correctly -->
        <div class="panel" id="email-panel">
          <div class="panel-header">
            <button class="back-btn" onclick="Manager.closePanel('email-panel')">
              <i class="ti ti-chevron-left"></i> Back
            </button>
            <div class="panel-title">Order Email</div>
            <button class="btn-green btn" style="width:auto;padding:7px 14px;font-size:13px"
              id="send-btn" onclick="Manager.sendEmail()">
              <i class="ti ti-send"></i> Send
            </button>
          </div>
          <div class="email-field"><label>To</label><input type="email" id="email-to"></div>
          <div class="email-field"><label>CC</label><input type="email" id="email-cc"></div>
          <div class="email-field"><label>Subject</label><input type="text" id="email-subject"></div>
          <div class="email-body-wrap"><textarea id="email-body"></textarea></div>
        </div>

        <div class="panel" id="settings-panel">
          <div class="panel-header">
            <button class="back-btn" onclick="Manager.closePanel('settings-panel')">
              <i class="ti ti-chevron-left"></i> Back
            </button>
            <div class="panel-title">Settings</div>
            <button class="btn-sm btn-sm-save" onclick="Manager.saveSettings()">Save</button>
          </div>
          <div class="settings-scroll" id="settings-content"></div>
        </div>
      </div>
      <div id="overlay-wrap"></div>`;

    this.populateSettings();
  },

  populateSettings() {
    const s = Settings.get();
    const el = document.getElementById('settings-content');
    if (!el) return;
    el.innerHTML = `
      <div class="settings-section">
        <div class="settings-label">Email</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">To (purchasing)</div><div class="settings-row-sub">Auto-filled in To: field</div></div>
            <input type="email" id="s-supplier" value="${esc(s.supplierEmail)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">CC email</div><div class="settings-row-sub">Always CC'd on orders</div></div>
            <input type="email" id="s-cc" value="${esc(s.ccEmail)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Sender name</div></div>
            <input type="text" id="s-sender" value="${esc(s.senderName)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Closing note</div><div class="settings-row-sub">Added at end of email body</div></div>
            <input type="text" id="s-delivery" value="${esc(s.deliveryNote)}">
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Materials catalogue</div>
        <div class="settings-card">
          <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:6px">
            <div class="settings-row-sub">
              To update materials, edit <strong>materials.csv</strong> in your GitHub repository and push.
              Both devices reload from the CSV automatically on next open.
            </div>
          </div>
        </div>
      </div>`;
  },

  saveSettings() {
    Settings.save({
      supplierEmail: document.getElementById('s-supplier')?.value.trim(),
      ccEmail:       document.getElementById('s-cc')?.value.trim(),
      senderName:    document.getElementById('s-sender')?.value.trim(),
      deliveryNote:  document.getElementById('s-delivery')?.value.trim(),
    });
    const btn = document.querySelector('[onclick="Manager.saveSettings()"]');
    if (btn) { btn.textContent='✓ Saved'; setTimeout(()=>btn.textContent='Save',1500); }
  },

  clearFirebase() {
    if (!confirm('Clear Firebase config? You will need to re-enter it.')) return;
    FirebaseConfig.clear(); location.reload();
  },

  // ── PANEL MANAGEMENT ──
  openPanel(id) { document.getElementById(id)?.classList.add('open'); },
  closePanel(id) { document.getElementById(id)?.classList.remove('open'); },

  // ── LIVE ORDERS ──
  setView(v) {
    this.activeView = v;
    ['pending','sent','all'].forEach(x=>{
      document.getElementById(`sb-${x}`)?.classList.toggle('active', x===v);
      document.getElementById(`mtab-${x}`)?.classList.toggle('active', x===v);
    });
    this.renderQueue();
  },

  startListening() {
    if (this.unsubscribe) this.unsubscribe();
    this.unsubscribe = DB.listenOrders(orders => {
      this.orders = orders;
      const n = orders.filter(o=>o.status==='pending').length;
      ['pending-count','mob-pending-count'].forEach(id=>{
        const el=document.getElementById(id);
        if(el){ el.textContent=n; el.classList.toggle('zero',n===0); }
      });
      this.renderQueue();
    });
  },

  renderQueue() {
    const wrap = document.getElementById('order-queue');
    if (!wrap) return;
    let list = this.orders;
    if (this.activeView==='pending') list=list.filter(o=>o.status==='pending');
    if (this.activeView==='sent')    list=list.filter(o=>o.status==='sent');
    if (!list.length) {
      const msgs={pending:['ti-clock','No pending orders yet.'],sent:['ti-mail-check','No sent orders yet.'],all:['ti-inbox','No orders yet.']};
      const [ic,msg]=msgs[this.activeView]||msgs.all;
      wrap.innerHTML=`<div class="empty-queue"><i class="ti ${ic}"></i><p>${msg}</p></div>`;
      return;
    }
    wrap.innerHTML = list.map(o=>this.orderCardHtml(o)).join('');
  },

  orderCardHtml(o) {
    const ts = o.submittedAt?.toDate ? fmtTime(o.submittedAt.toDate()) : fmtTime(o.submittedAt);
    const isPending = o.status==='pending';
    const isSent    = o.status==='sent';
    const items = o.items||[];
    const statusLabel = isPending?'Pending review':isSent?'Sent':o.status;
    const statusClass = isPending?'status-pending':'status-sent';

    const rows = items.map((item,idx)=>`
      <div class="order-line">
        <div class="order-line-info">
          <div class="order-line-name">${esc(item.description)}</div>
          <div class="order-line-code">${esc(item.partCode)}</div>
        </div>
        <div class="order-line-right">
          ${isPending
            ?`<input class="qty-edit" type="number" min="0" step="1" value="${item.qty}"
                onchange="Manager.editQty('${o._id}',${idx},this.value)">`
            :`<span class="order-line-qty">× ${item.qty}</span>`}
          <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${esc(item.qtyType||'')}</span>
        </div>
      </div>`).join('');

    const actions = isPending ? `
      <button class="btn btn-green" onclick="Manager.prepareEmail('${o._id}')">
        <i class="ti ti-mail"></i> Approve &amp; send email
      </button>
      <button class="btn btn-danger" onclick="Manager.deleteOrder('${o._id}')">
        <i class="ti ti-x"></i> Reject
      </button>` : isSent ? `
      <span class="sent-stamp"><i class="ti ti-circle-check"></i> Email sent</span>
      <button class="btn btn-outline" style="margin-top:8px" onclick="Manager.deleteOrder('${o._id}')">
        <i class="ti ti-trash"></i> Delete record
      </button>` : '';

    return `<div class="order-card" id="card-${o._id}">
      <div class="order-card-header" onclick="Manager.toggleCard('${o._id}')">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%">
          <div>
            <div class="order-ref-text">${esc(o.ref||o._id)}</div>
            <div class="order-meta">${ts} · ${items.length} line${items.length!==1?'s':''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="status-pill ${statusClass}">${statusLabel}</span>
            <i class="ti ti-chevron-right chevron" id="chev-${o._id}"></i>
          </div>
        </div>
      </div>
      <div class="order-card-body" id="body-${o._id}">
        ${isPending?'<div class="edit-note">You can edit quantities before approving.</div>':''}
        ${rows}
        <div class="order-card-actions">${actions}</div>
      </div>
    </div>`;
  },

  toggleCard(id) {
    document.getElementById(`body-${id}`)?.classList.toggle('open');
    document.getElementById(`chev-${id}`)?.classList.toggle('open');
  },

  async editQty(orderId, idx, val) {
    const order = this.orders.find(o=>o._id===orderId);
    if (!order) return;
    const items = [...order.items];
    items[idx] = {...items[idx], qty: Math.max(0,parseInt(val)||0)};
    try { await DB.updateItems(orderId, items); }
    catch(e) { alert('Update failed: '+e.message); }
  },

  async deleteOrder(id) {
    if (!confirm('Delete this order?')) return;
    try { await DB.deleteOrder(id); }
    catch(e) { alert('Delete failed: '+e.message); }
  },

  // ── EMAIL ──
  _currentOrderId: null,

  prepareEmail(orderId) {
    const order = this.orders.find(o=>o._id===orderId);
    if (!order) return;
    this._currentOrderId = orderId;
    const s = Settings.get();
    document.getElementById('email-to').value      = s.supplierEmail;
    document.getElementById('email-cc').value      = s.ccEmail;
    document.getElementById('email-subject').value = `Material Order — ${order.ref||order._id}`;
    document.getElementById('email-body').value    = buildEmailBody(order.ref||order._id, order.items||[]);
    this.openPanel('email-panel');
  },

  async sendEmail() {
    const to      = document.getElementById('email-to').value;
    const cc      = document.getElementById('email-cc').value;
    const subject = document.getElementById('email-subject').value;
    const body    = document.getElementById('email-body').value;
    const mailto  = `mailto:${to}?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    if (this._currentOrderId) {
      try { await DB.updateStatus(this._currentOrderId,'sent'); } catch {}
    }
    this.closePanel('email-panel');
    document.getElementById('overlay-wrap').innerHTML = `
      <div class="success-overlay">
        <div class="success-card">
          <div class="success-icon blue"><i class="ti ti-mail-forward"></i></div>
          <h3>Opening mail client…</h3>
          <p>Order marked as sent. Outlook will open with the order pre-filled.</p>
          <button class="btn btn-primary" onclick="document.getElementById('overlay-wrap').innerHTML=''">Done</button>
        </div>
      </div>`;
    setTimeout(()=>{ window.location.href=mailto; }, 400);
  },
};

document.addEventListener('DOMContentLoaded', ()=>Manager.init());
</script>
</body>
</html>
