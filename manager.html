  async receiveSubmit() {
    const items = this.receiveItems();
    if (!items.length) { alert('Select at least one item received.'); return; }
    const reference = document.getElementById('receive-reference')?.value.trim();
    const s = Settings.get();
    const fallbackBy = (s.managerName || 'Manager').trim() || 'Manager';
    const by = reference || fallbackBy;
    const sessionId = genRef();

    const btn = document.getElementById('btn-receive-submit');
    if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 1s linear infinite"></i> Processing…'; }

    const errors = [];
    for (const item of items) {
      const sid = stockId(item);
      if (!this._stockFor(sid)?.tracked) {
        try { await DB.enableTracking(sid); } catch(e) { errors.push(`${item.description}: ${e.message}`); continue; }
      }
      // For boxed items, the quantity entered represents whole boxes received —
      // convert to individual units before writing to stock.
      const delta = hasBoxTracking(item) ? item.qty * item.boxSize : item.qty;
      try {
        await DB.adjustStock(sid, item.description, delta, 'intake', by, sessionId);
      } catch(e) { errors.push(`${item.description}: ${e.message}`); }
    }

    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-truck-delivery"></i>Confirm Stock Received <span class="sidebar-count zero" id="receive-badge" style="margin-left:4px">0</span>'; }

    if (errors.length) alert(`Some items failed:\n\n${errors.join('\n')}`);

    this._receive._items = {};
    this._updateReceiveBadge();
    this.renderReceiveList();
    this.closePanel('receive-panel');

    const ow = document.getElementById('overlay-wrap');
    ow.innerHTML = `
      <div class="success-overlay">
        <div class="success-card">
          <div class="success-icon green"><i class="ti ti-circle-check"></i></div>
          <h3>Stock received!</h3>
          <p>Stock levels have been updated${reference ? ` and recorded under "${esc(reference)}"` : ''}.</p>
          <button class="btn btn-primary" id="btn-done-receive">Done</button>
        </div>
      </div>`;
    document.getElementById('btn-done-receive').addEventListener('click', () => { ow.innerHTML=''; });
  },

  // ══════════════════════════════════════════
  // STOCK TAB
  // ══════════════════════════════════════════
  startStockListening() {
    if (this._unsubStock) this._unsubStock();
    this._unsubStock = DB.listenStock(records => {
      this._stock = records;
      this.renderStockTabs();
      this.renderStockList();
      this._updateStockBadge();
      // These panels grey/sort items by tracked status, so they need to refresh
      // whenever stock data changes too — not just the Stock tab itself.
      this.renderCoList();
      this.renderReceiveList();
    });
  },

  // Returns the stock record for a given stockId, or null
  _stockFor(sid) { return this._stock.find(r => r._id === sid) || null; },

  // Classify a tracked item: 'ok' | 'warning' | 'critical' | 'zero'
  _stockStatus(rec) {
    if (!rec || !rec.tracked) return 'untracked';
    const qty = rec.qty || 0;
    if (qty <= 0) return 'zero';
    if (rec.warningQty > 0 && qty <= rec.warningQty) return qty <= (rec.reorderQty||0) ? 'critical' : 'warning';
    return 'ok';
  },

  _updateStockBadge() {
    const low = this.consumables.filter(m => {
      const rec = this._stockFor(stockId(m));
      if (!rec || !rec.tracked) return false;
      return rec.warningQty > 0 && (rec.qty||0) <= rec.warningQty;
    }).length;
    const badge = document.getElementById('stock-low-badge');
    if (badge) { badge.textContent = low; badge.classList.toggle('zero', low === 0); }
    const banner = document.getElementById('stock-low-banner');
    const bannerText = document.getElementById('stock-low-text');
    if (banner && bannerText) {
      banner.style.display = low > 0 ? 'flex' : 'none';
      bannerText.textContent = `${low} item${low!==1?'s':''} at or below warning quantity`;
    }
  },

  renderStockTabs() {
    const wrap = document.getElementById('stock-tabs-wrap'); if (!wrap) return;
    const cats = Data.categories(this.consumables);
    const lowItems = this.consumables.filter(m => {
      const rec = this._stockFor(stockId(m));
      return rec?.tracked && rec.warningQty > 0 && (rec.qty||0) <= rec.warningQty;
    });
    const lowCount = lowItems.length;
    const catBtns = cats.map(c => `<button class="tab ${this._stockActiveCat===c?'active':''}" data-stock-cat="${esc(c)}">${esc(c)}</button>`).join('');
    wrap.innerHTML = `<div class="tabs-bar"><div class="tabs-inner">
      <button class="tab ${!this._stockActiveCat?'active':''}" data-stock-cat="__all__">All</button>
      <button class="tab ${this._stockActiveCat==='__low__'?'active':''}" data-stock-cat="__low__" style="${lowCount>0?'color:var(--amber-text)':''}">
        <i class="ti ti-alert-triangle" style="font-size:12px"></i> Low Stock${lowCount>0?` (${lowCount})`:''}
      </button>
      ${catBtns}
    </div></div>`;

    // Subcategory tabs — only when a real category (not All/Low Stock) is selected
    let subHtml = '';
    if (this._stockActiveCat && this._stockActiveCat !== '__low__') {
      this._stockSubs = Data.subcategories(this.consumables, this._stockActiveCat);
      if (this._stockSubs.length) {
        const subBtns = this._stockSubs.map(s => `<button class="tab ${this._stockActiveSub===s?'active':''}" data-stock-sub="${esc(s)}">${esc(s)}</button>`).join('');
        subHtml = `<div class="tabs-bar sub-bar"><div class="tabs-inner"><button class="tab ${!this._stockActiveSub?'active':''}" data-stock-sub="__all__">All</button>${subBtns}</div></div>`;
      }
    } else {
      this._stockSubs = [];
    }
    wrap.innerHTML += subHtml;

    // Reorder All button — only visible on the Low Stock tab, and only when at least one item has a reorder qty set
    const reorderBtn = document.getElementById('btn-reorder-all');
    if (reorderBtn) {
      const canReorder = this._stockActiveCat === '__low__' && lowItems.some(m => (this._stockFor(stockId(m))?.reorderQty||0) > 0);
      reorderBtn.style.display = canReorder ? '' : 'none';
    }
  },

  renderStockList() {
    const list = document.getElementById('stock-list'); if (!list) return;
    const q = (document.getElementById('stock-search')?.value || '').toLowerCase();
    let items = [...this.consumables];

    if (this._stockActiveCat === '__low__') {
      items = items.filter(m => {
        const rec = this._stockFor(stockId(m));
        return rec?.tracked && rec.warningQty > 0 && (rec.qty||0) <= rec.warningQty;
      });
    } else if (this._stockActiveCat) {
      items = items.filter(m => m.category === this._stockActiveCat);
      if (this._stockActiveSub) items = items.filter(m => m.subcategory === this._stockActiveSub);
    }
    if (q) items = items.filter(m => m.description.toLowerCase().includes(q) || m.partCode.toLowerCase().includes(q));

    // Sort: critical → warning → zero → ok → untracked
    const order = { critical:0, warning:1, zero:2, ok:3, untracked:4 };
    items.sort((a, b) => {
      const ra = this._stockFor(stockId(a)), rb = this._stockFor(stockId(b));
      const sa = this._stockStatus(ra), sb = this._stockStatus(rb);
      return (order[sa]??4) - (order[sb]??4) || a.description.localeCompare(b.description);
    });

    if (!items.length) { list.innerHTML = `<div class="empty-state"><i class="ti ti-package-off"></i><p>No consumables found.</p></div>`; return; }

    // Group by tracked / untracked with section headers (skip grouping on the Low Stock tab — already filtered)
    let html = '';
    if (this._stockActiveCat === '__low__') {
      html = items.map(m => this._stockCard(m)).join('');
    } else {
      const tracked   = items.filter(m => { const r=this._stockFor(stockId(m)); return r?.tracked; });
      const untracked = items.filter(m => { const r=this._stockFor(stockId(m)); return !r?.tracked; });
      if (tracked.length) {
        html += `<div class="stock-section-header">Tracked (${tracked.length})</div>`;
        html += tracked.map(m => this._stockCard(m)).join('');
      }
      if (untracked.length) {
        html += `<div class="stock-section-header" style="margin-top:8px">Not yet tracked (${untracked.length})</div>`;
        html += untracked.map(m => this._stockCard(m)).join('');
      }
    }
    list.innerHTML = html;

    // Re-apply open state
    for (const sid of this._openStockCards) {
      const body = document.getElementById(`stock-body-${sid}`);
      const chev = document.getElementById(`stock-chev-${sid}`);
      if (body) { body.classList.add('open'); chev?.classList.add('open'); }
    }
  },

  _stockCard(m) {
    const sid  = stockId(m);
    const rec  = this._stockFor(sid);
    const tracked = rec?.tracked || false;
    const status  = this._stockStatus(rec);
    const qty     = rec?.qty ?? 0;
    const ci      = CAT_ICONS[m.category] || CAT_ICONS.default;
    const showCode = m.partCode && !Data.isDummyCode(m.partCode);
    const isOpen  = this._openStockCards.has(sid);
    const isBoxed = hasBoxTracking(m);

    const badgeClass = status === 'ok' ? '' : status === 'zero' ? ' zero' : status === 'warning' ? ' warning' : status === 'critical' ? ' critical' : ' zero';
    const cardClass  = status === 'untracked' ? ' untracked' : status === 'warning' ? ' warning' : status === 'critical' ? ' critical' : status === 'zero' ? ' zero' : '';

    const qtyBadge = tracked
      ? `<span class="stock-qty-badge${badgeClass}">${esc(boxDisplay(m, qty))}</span>`
      : `<span style="font-size:11px;color:var(--text3);font-family:var(--mono)">Not tracked</span>`;

    // Boxed items get a box-centric workflow (add whole boxes, override by boxes+loose,
    // and a quick "open new box" stocktake action) since that's how warehouse stock is
    // actually handled — tracking individual units one at a time is rare in practice.
    const wholeBoxes  = isBoxed ? Math.floor(qty / m.boxSize) : 0;
    const looseUnits  = isBoxed ? qty % m.boxSize : 0;

    const boxedIntakeRow = `
          <div class="stock-action-row">
            <span class="stock-action-label">Add stock</span>
            <input class="stock-delta-input" type="number" min="1" step="1" placeholder="${esc(m.boxUnit||'Box')}es" id="si-intake-box-${esc(sid)}">
            <span style="font-size:11px;color:var(--text3)">${esc(m.boxUnit||'Box')}(es)</span>
            <button class="btn-sm btn-sm-save" data-stock-intake-boxn="${esc(sid)}" style="font-size:11px"><i class="ti ti-plus"></i> Intake</button>
            <button class="btn-sm" data-stock-hist="${esc(sid)}" data-stock-name="${esc(m.description)}" style="font-size:11px;margin-left:auto"><i class="ti ti-history"></i></button>
          </div>
          <div class="stock-action-row">
            <button class="btn-sm" data-stock-open-box="${esc(sid)}" style="font-size:11px" title="Round down to whole boxes — use when a box runs low and you're opening a fresh one">
              <i class="ti ti-box-seam"></i> Open New Box (round down to whole ${esc((m.boxUnit||'Box').toLowerCase())}es)
            </button>
          </div>
          <div class="stock-action-row">
            <span class="stock-action-label">Set absolute</span>
            <input class="stock-delta-input" type="number" min="0" step="1" placeholder="${esc(m.boxUnit||'Box')}es" id="si-set-boxes-${esc(sid)}" style="width:56px">
            <span style="font-size:10px;color:var(--text3)">${esc(m.boxUnit||'Box')}(es) +</span>
            <input class="stock-delta-input" type="number" min="0" step="1" placeholder="loose" id="si-set-loose-${esc(sid)}" style="width:56px">
            <span style="font-size:10px;color:var(--text3)">loose</span>
            <button class="btn-sm" data-stock-set-boxed="${esc(sid)}" style="font-size:11px">Override</button>
          </div>`;

    const simpleIntakeRow = `
          <div class="stock-action-row">
            <span class="stock-action-label">Add stock</span>
            <input class="stock-delta-input" type="number" min="1" step="1" placeholder="Qty" id="si-intake-${esc(sid)}">
            <button class="btn-sm btn-sm-save" data-stock-intake="${esc(sid)}" style="font-size:11px"><i class="ti ti-plus"></i> Intake</button>
            <button class="btn-sm" data-stock-hist="${esc(sid)}" data-stock-name="${esc(m.description)}" style="font-size:11px;margin-left:auto"><i class="ti ti-history"></i></button>
          </div>
          <div class="stock-action-row">
            <span class="stock-action-label">Set absolute</span>
            <input class="stock-delta-input" type="number" min="0" step="1" placeholder="Qty" id="si-set-${esc(sid)}">
            <button class="btn-sm" data-stock-set="${esc(sid)}" style="font-size:11px"><i class="ti ti-pencil"></i> Override</button>
          </div>`;

    const body = tracked ? `
      <div class="stock-card-body" id="stock-body-${esc(sid)}">
        <div class="stock-actions">
          ${isBoxed ? `<div style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:2px">${wholeBoxes} whole ${esc((m.boxUnit||'Box').toLowerCase())}${wholeBoxes!==1?'es':''}${looseUnits?` + ${looseUnits} loose`:''} · 1 ${esc(m.boxUnit||'Box')} = ${m.boxSize} ${esc(m.qtyType||'Each')}</div>` : ''}
          ${isBoxed ? boxedIntakeRow : simpleIntakeRow}
          <div class="stock-threshold-row">
            <span class="stock-threshold-label">Warning ≤</span>
            <input class="stock-threshold-input" type="number" min="0" step="1" value="${rec?.warningQty||0}" id="si-warn-${esc(sid)}">
            <span class="stock-threshold-label" style="margin-left:8px">Reorder:</span>
            <input class="stock-threshold-input" type="number" min="0" step="1" value="${rec?.reorderQty||0}" id="si-reorder-${esc(sid)}">
            <button class="btn-sm btn-sm-save" data-stock-thresh="${esc(sid)}" style="font-size:11px;margin-left:auto">Save</button>
          </div>
          <div class="stock-action-row" style="border-top:1px solid var(--border);padding-top:8px;margin-top:2px">
            <button class="btn-sm btn-sm-danger" data-stock-disable="${esc(sid)}" style="font-size:11px;margin-left:auto">Disable tracking</button>
          </div>
        </div>
      </div>` : `
      <div class="stock-card-body" id="stock-body-${esc(sid)}">
        <div class="stock-actions">
          <div class="stock-action-row">
            <span style="font-size:12px;color:var(--text2);flex:1">Enable tracking to manage stock levels for this item.</span>
            <input class="stock-delta-input" type="number" min="0" step="1" placeholder="Initial qty" id="si-init-${esc(sid)}" style="width:80px">
            <button class="btn-sm btn-sm-save" data-stock-enable="${esc(sid)}" style="font-size:11px"><i class="ti ti-check"></i> Enable</button>
          </div>
        </div>
      </div>`;

    return `<div class="stock-card${cardClass}" id="stock-card-${esc(sid)}">
      <div class="stock-card-header" data-stock-hdr="${esc(sid)}">
        <div class="stock-card-icon" style="background:${ci.bg}"><i class="ti ${ci.icon}" style="color:${ci.color}"></i></div>
        <div class="stock-card-info">
          <div class="stock-card-name">${esc(m.description)}</div>
          <div class="stock-card-meta">${showCode ? esc(m.partCode)+' · ' : ''}${esc(m.category)} · ${esc(m.subcategory)}</div>
        </div>
        ${qtyBadge}
        <i class="ti ti-chevron-right chevron ${isOpen?'open':''}" id="stock-chev-${esc(sid)}"></i>
      </div>
      ${body}
    </div>`;
  },

  toggleStockCard(sid) {
    const body = document.getElementById(`stock-body-${sid}`);
    const chev = document.getElementById(`stock-chev-${sid}`);
    if (!body) return;
    const opening = !body.classList.contains('open');
    body.classList.toggle('open', opening);
    chev?.classList.toggle('open', opening);
    if (opening) this._openStockCards.add(sid); else this._openStockCards.delete(sid);
  },

  async stockEnable(sid) {
    const initEl = document.getElementById(`si-init-${sid}`);
    const initQty = parseInt(initEl?.value || '0') || 0;
    try {
      await DB.enableTracking(sid);
      if (initQty > 0) {
        const item = this.consumables.find(m => stockId(m) === sid);
        const s = Settings.get();
        const by = (s.managerName || 'Manager').trim() || 'Manager';
        await DB.adjustStock(sid, item?.description || sid, initQty, 'intake', by, genRef());
      }
    } catch(e) { alert('Failed to enable tracking: ' + e.message); }
  },

  async stockDisable(sid) {
    await new Promise(r => setTimeout(r, 0));
    if (!confirm('Disable tracking for this item? Stock history will be preserved.')) return;
    try { await DB.disableTracking(sid); } catch(e) { alert('Failed: ' + e.message); }
  },

  async stockIntake(sid) {
    const el = document.getElementById(`si-intake-${sid}`);
    const delta = parseInt(el?.value || '0');
    if (!delta || delta <= 0) { alert('Enter a quantity to add.'); return; }
    const item = this.consumables.find(m => stockId(m) === sid);
    const s = Settings.get();
    const by = (s.managerName || 'Manager').trim() || 'Manager';
    try {
      await DB.adjustStock(sid, item?.description || sid, delta, 'intake', by, genRef());
      if (el) el.value = '';
    } catch(e) { alert('Intake failed: ' + e.message); }
  },

  // Intake N whole boxes (default workflow for boxed items — adds boxSize * N units)
  async stockIntakeBoxes(sid) {
    const el = document.getElementById(`si-intake-box-${sid}`);
    const numBoxes = parseInt(el?.value || '0');
    if (!numBoxes || numBoxes <= 0) { alert(`Enter a number of boxes received.`); return; }
    const item = this.consumables.find(m => stockId(m) === sid);
    if (!hasBoxTracking(item)) return;
    const delta = numBoxes * item.boxSize;
    const s = Settings.get();
    const by = (s.managerName || 'Manager').trim() || 'Manager';
    try {
      await DB.adjustStock(sid, item?.description || sid, delta, 'intake', by, genRef());
      if (el) el.value = '';
    } catch(e) { alert('Intake failed: ' + e.message); }
  },

  // Stocktake-style correction: rounds the recorded qty down to the nearest whole box.
  // Use when a box runs low/out and a fresh one is opened — corrects drift from
  // not tracking every individual unit taken out day to day.
  async stockOpenNewBox(sid) {
    const item = this.consumables.find(m => stockId(m) === sid);
    if (!hasBoxTracking(item)) return;
    const rec = this._stockFor(sid);
    const currentQty = rec?.qty || 0;
    const roundedQty = Math.floor(currentQty / item.boxSize) * item.boxSize;
    if (roundedQty === currentQty) { alert('Already at a whole number of boxes — nothing to round down.'); return; }
    await new Promise(r => setTimeout(r, 0));
    if (!confirm(`Round stock down from ${currentQty} to ${roundedQty} ${item.qtyType||'units'} (${roundedQty / item.boxSize} whole ${(item.boxUnit||'Box').toLowerCase()}(es))?`)) return;
    const s = Settings.get();
    const by = (s.managerName || 'Manager').trim() || 'Manager';
    try {
      await DB.setStock(sid, item?.description || sid, roundedQty, by, genRef());
    } catch(e) { alert('Failed: ' + e.message); }
  },

  // Boxed-item override: whole boxes + optional loose units in an opened box
  async stockSetAbsoluteBoxed(sid) {
    const item = this.consumables.find(m => stockId(m) === sid);
    if (!hasBoxTracking(item)) return;
    const boxesEl = document.getElementById(`si-set-boxes-${sid}`);
    const looseEl = document.getElementById(`si-set-loose-${sid}`);
    const boxes = parseInt(boxesEl?.value || '0') || 0;
    const loose = looseEl?.value ? (parseInt(looseEl.value) || 0) : 0;
    if (!boxesEl?.value && !looseEl?.value) { alert('Enter a number of boxes (and loose units if applicable).'); return; }
    const newQty = boxes * item.boxSize + loose;
    await new Promise(r => setTimeout(r, 0));
    if (!confirm(`Set stock to ${boxes} ${(item.boxUnit||'Box').toLowerCase()}(es)${loose?` + ${loose} loose`:''} = ${newQty} ${item.qtyType||'units'} total?`)) return;
    const s = Settings.get();
    const by = (s.managerName || 'Manager').trim() || 'Manager';
    try {
      await DB.setStock(sid, item?.description || sid, newQty, by, genRef());
      if (boxesEl) boxesEl.value = '';
      if (looseEl) looseEl.value = '';
    } catch(e) { alert('Override failed: ' + e.message); }
  },

  async stockSetAbsolute(sid) {
    const el = document.getElementById(`si-set-${sid}`);
    const newQty = parseInt(el?.value ?? '');
    if (isNaN(newQty) || newQty < 0) { alert('Enter a valid quantity.'); return; }
    await new Promise(r => setTimeout(r, 0));
    if (!confirm(`Set stock to ${newQty}?`)) return;
    const item = this.consumables.find(m => stockId(m) === sid);
    const s = Settings.get();
    const by = (s.managerName || 'Manager').trim() || 'Manager';
    try {
      await DB.setStock(sid, item?.description || sid, newQty, by, genRef());
      if (el) el.value = '';
    } catch(e) { alert('Override failed: ' + e.message); }
  },

  async stockSaveThresholds(sid) {
    const warnEl   = document.getElementById(`si-warn-${sid}`);
    const reordEl  = document.getElementById(`si-reorder-${sid}`);
    const warnQty  = parseInt(warnEl?.value  || '0') || 0;
    const reordQty = parseInt(reordEl?.value || '0') || 0;
    try {
      await DB.updateThresholds(sid, reordQty, warnQty);
      const btn = document.querySelector(`[data-stock-thresh="${sid}"]`);
      if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => btn.textContent = 'Save', 1500); }
    } catch(e) { alert('Failed to save thresholds: ' + e.message); }
  },

  stockOpenHistory(sid, itemName) {
    this._historyFilter = { stockId: sid, itemName };
    this._historyRecords = [];
    this._historyLastDoc = null;
    this.renderHistoryFilter();
    this.setMainTab('history');
    this._loadHistory();
  },

  // Loads every low-stock item (that has a reorder qty set) into the Consumables Order
  // cart at its configured reorder quantity, then opens the order panel for review.
  stockReorderAll() {
    const lowItems = this.consumables.filter(m => {
      const rec = this._stockFor(stockId(m));
      return rec?.tracked && rec.warningQty > 0 && (rec.qty||0) <= rec.warningQty && (rec.reorderQty||0) > 0;
    });
    if (!lowItems.length) { alert('No low-stock items have a reorder quantity set.'); return; }
    for (const m of lowItems) {
      const rec = this._stockFor(stockId(m));
      this.coSet(m.id, rec.reorderQty);
    }
    this._updateCoBadge();
    this.renderCoList();
    this.openPanel('cons-order-panel');
  },

  // ══════════════════════════════════════════
  // HISTORY TAB
  // ══════════════════════════════════════════
  renderHistoryFilter() {
    const chip  = document.getElementById('history-clear-filter');
    const label = document.getElementById('history-filter-label');
    if (!chip || !label) return;
    if (this._historyFilter) {
      chip.style.display = 'flex';
      label.textContent  = this._historyFilter.itemName || this._historyFilter.stockId;
    } else {
      chip.style.display = 'none';
    }
  },

  async _loadHistory(append) {
    if (this._historyLoading) return;
    this._historyLoading = true;
    const list = document.getElementById('history-list'); if (!list) { this._historyLoading=false; return; }
    if (!append) {
      this._historyRecords = [];
      this._historyLastDoc = null;
      list.innerHTML = `<div class="empty-state"><i class="ti ti-loader" style="animation:spin 1s linear infinite"></i><p>Loading…</p></div>`;
    }
    try {
      const { records, lastDoc, hasMore } = await DB.fetchHistory(
        this._historyFilter?.stockId || null, 50, append ? this._historyLastDoc : null
      );
      if (append) this._historyRecords.push(...records);
      else        this._historyRecords = records;
      this._historyLastDoc = lastDoc;
      this._historyHasMore = hasMore;
      this.renderHistoryList();
    } catch(e) {
      if (list) list.innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><p>Failed to load history: ${esc(e.message)}</p></div>`;
    } finally { this._historyLoading = false; }
  },

  renderHistoryList() {
    const list = document.getElementById('history-list'); if (!list) return;
    if (!this._historyRecords.length) {
      list.innerHTML = `<div class="empty-state"><i class="ti ti-history"></i><p>No history yet.</p></div>`;
      return;
    }
    const nameFilter = (document.getElementById('history-person-search')?.value || '').toLowerCase().trim();
    const itemFilter = (document.getElementById('history-item-search')?.value || '').toLowerCase().trim();
    let records = this._historyRecords;
    if (nameFilter) records = records.filter(r => (r.by||'').toLowerCase().includes(nameFilter));
    if (itemFilter) records = records.filter(r => (r.itemName||'').toLowerCase().includes(itemFilter));

    if (!records.length) {
      list.innerHTML = `<div class="empty-state"><i class="ti ti-history"></i><p>No matching history.</p></div>`;
      return;
    }

    // Group consecutive-ish records by sessionId (preserving overall newest-first order)
    const groups = [];
    const seenSessions = new Map();
    for (const r of records) {
      if (r.sessionId && seenSessions.has(r.sessionId)) {
        groups[seenSessions.get(r.sessionId)].push(r);
      } else if (r.sessionId) {
        seenSessions.set(r.sessionId, groups.length);
        groups.push([r]);
      } else {
        groups.push([r]);
      }
    }

    const rows = groups.map(group => {
      if (group.length === 1 && !group[0].sessionId) {
        return this._historyRowHtml(group[0]);
      }
      // Session group — show a summary row, expandable
      const sessId  = group[0].sessionId;
      const ts      = group[0].timestamp?.toDate ? fmtTime(group[0].timestamp.toDate()) : fmtTime(group[0].timestamp);
      const by      = group[0].by || '';
      const action  = group[0].action || 'adjustment';
      const totalAbs= group.reduce((s,r)=>s+Math.abs(r.delta||0),0);
      const allReverted = group.every(r => r.reverted);
      const isOpen  = this._openHistorySessions.has(sessId);
      return `<div class="history-session-group${allReverted?' reverted':''}">
        <div class="history-row" data-hist-session="${esc(sessId)}" style="cursor:pointer">
          <span class="history-action-pill ${action}">${action} · order</span>
          <span class="history-delta" style="color:var(--text2)">${group.length} item${group.length!==1?'s':''}</span>
          <div style="flex:1;min-width:0">
            <div class="history-item-name">${esc(by)}</div>
            <div class="history-meta">${ts} · ${totalAbs} total units</div>
          </div>
          ${allReverted
            ? `<button class="btn-sm" data-hist-session-unrevert="${esc(sessId)}" style="font-size:10px;padding:2px 7px">Unrevert all</button>
               <button class="btn-sm btn-sm-danger" data-hist-session-delete="${esc(sessId)}" style="font-size:10px;padding:2px 7px">Delete</button>`
            : `<button class="btn-sm btn-sm-danger" data-hist-session-revert="${esc(sessId)}" style="font-size:10px;padding:2px 7px">Revert all</button>`}
          <i class="ti ti-chevron-right chevron ${isOpen?'open':''}" style="margin-right:2px"></i>
        </div>
        <div class="history-session-body ${isOpen?'open':''}" id="hist-sess-${esc(sessId)}">
          ${group.map(r => this._historyRowHtml(r, true)).join('')}
        </div>
      </div>`;
    }).join('');

    const moreBtn = this._historyHasMore
      ? `<div style="padding:12px;text-align:center"><button class="btn-sm" data-hist-more="1">Load more</button></div>`
      : '';
    list.innerHTML = rows + moreBtn;
    // Re-apply open session state
    for (const sessId of this._openHistorySessions) {
      document.getElementById(`hist-sess-${sessId}`)?.classList.add('open');
    }
  },

  _historyRowHtml(r, nested) {
    const ts     = r.timestamp?.toDate ? fmtTime(r.timestamp.toDate()) : fmtTime(r.timestamp);
    const delta  = r.delta >= 0 ? `+${r.delta}` : `${r.delta}`;
    const dClass = r.delta >= 0 ? 'positive' : 'negative';
    const action = r.action || 'adjustment';
    const revertBtn = r.reverted
      ? `<button class="btn-sm" data-hist-unrevert="${esc(r._id)}" style="font-size:10px;padding:2px 7px">Unrevert</button>
         <button class="btn-sm btn-sm-danger" data-hist-delete="${esc(r._id)}" style="font-size:10px;padding:2px 7px">Delete</button>`
      : `<button class="btn-sm btn-sm-danger" data-hist-revert="${esc(r._id)}" style="font-size:10px;padding:2px 7px">Revert</button>`;
    return `<div class="history-row${r.reverted?' reverted':''}${nested?' nested':''}">
      <span class="history-action-pill ${action}">${action}</span>
      <span class="history-delta ${dClass}">${delta}</span>
      <div style="flex:1;min-width:0">
        <div class="history-item-name">${esc(r.itemName||r.stockId||'')}</div>
        <div class="history-meta">${esc(r.by||'')}${ts ? ' · '+ts : ''} · now: ${r.newQty??'?'}${r.reverted?' · reverted':''}</div>
      </div>
      ${revertBtn}
    </div>`;
  },

  toggleHistorySession(sessId) {
    if (this._openHistorySessions.has(sessId)) this._openHistorySessions.delete(sessId);
    else this._openHistorySessions.add(sessId);
    this.renderHistoryList();
  },

  async historyRevert(historyId) {
    await new Promise(r => setTimeout(r, 0));
    if (!confirm('Revert this stock change? The quantity it caused will be reversed.')) return;
    try {
      await DB.revertHistoryRecord(historyId);
      this._loadHistory(); // refresh to reflect reverted flag
    } catch(e) { alert('Revert failed: ' + e.message); }
  },

  async historyUnrevert(historyId) {
    await new Promise(r => setTimeout(r, 0));
    if (!confirm('Re-apply this stock change?')) return;
    try {
      await DB.unrevertHistoryRecord(historyId);
      this._loadHistory();
    } catch(e) { alert('Unrevert failed: ' + e.message); }
  },

  async historyDelete(historyId) {
    await new Promise(r => setTimeout(r, 0));
    if (!confirm('Permanently delete this reverted entry? This cannot be undone.')) return;
    try {
      await DB.deleteHistoryRecord(historyId);
      this._loadHistory();
    } catch(e) { alert('Delete failed: ' + e.message); }
  },

  // Session-level operations: fetch all records for the session, then act on each
  async historySessionRevert(sessId) {
    await new Promise(r => setTimeout(r, 0));
    if (!confirm('Revert all stock changes in this order session?')) return;
    try {
      const records = await DB.fetchSessionRecords(sessId);
      for (const r of records) {
        if (!r.reverted) await DB.revertHistoryRecord(r._id);
      }
      this._loadHistory();
    } catch(e) { alert('Session revert failed: ' + e.message); }
  },

  async historySessionUnrevert(sessId) {
    await new Promise(r => setTimeout(r, 0));
    if (!confirm('Re-apply all stock changes in this order session?')) return;
    try {
      const records = await DB.fetchSessionRecords(sessId);
      for (const r of records) {
        if (r.reverted) await DB.unrevertHistoryRecord(r._id);
      }
      this._loadHistory();
    } catch(e) { alert('Session unrevert failed: ' + e.message); }
  },

  async historySessionDelete(sessId) {
    await new Promise(r => setTimeout(r, 0));
    if (!confirm('Permanently delete all entries in this reverted order session? This cannot be undone.')) return;
    try {
      const records = await DB.fetchSessionRecords(sessId);
      for (const r of records) {
        if (r.reverted) await DB.deleteHistoryRecord(r._id);
      }
      this._loadHistory();
    } catch(e) { alert('Session delete failed: ' + e.message); }
  },

  // ══════════════════════════════════════════
  // SETTINGS
  // ══════════════════════════════════════════
  _populateSettings() {
    const s = Settings.get();
    const el = document.getElementById('settings-body'); if (!el) return;
    el.innerHTML = `
      <div class="settings-section">
        <div class="settings-label">Manager</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">Manager name</div><div class="settings-row-sub">Used as device name on orders added to queue</div></div>
            <input type="text" id="s-manager-name" value="${esc(s.managerName||'Manager')}" placeholder="Manager">
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Email</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">To (purchasing)</div><div class="settings-row-sub">Auto-filled in To: field</div></div>
            <input type="email" id="s-supplier" value="${esc(s.supplierEmail)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">CC email</div><div class="settings-row-sub">Always CC'd</div></div>
            <input type="email" id="s-cc" value="${esc(s.ccEmail)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Subject template</div><div class="settings-row-sub">{category} {date} available</div></div>
            <input type="text" id="s-subject" value="${esc(s.emailSubject||DEFAULT_SETTINGS.emailSubject)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Bulk consumables subject</div><div class="settings-row-sub">Used when emailing all consumables at once</div></div>
            <input type="text" id="s-bulk-subject" value="${esc(s.bulkConsumablesSubject||DEFAULT_SETTINGS.bulkConsumablesSubject)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Closing note</div><div class="settings-row-sub">Added after items</div></div>
            <input type="text" id="s-delivery" value="${esc(s.deliveryNote)}">
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Email signature</div>
        <div class="settings-card">
          <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:8px">
            <div class="settings-row-sub">
              Appended to every email body. Use this to include your sign-off since Outlook Classic does not auto-insert signatures into mailto-generated emails.
            </div>
            <textarea id="s-signature" rows="5"
              style="width:100%;border:1px solid var(--border);background:var(--bg);border-radius:var(--radius);
              padding:8px 10px;font-size:13px;color:var(--text);font-family:var(--font);line-height:1.6;
              resize:vertical;outline:none" placeholder="Kind regards,&#10;Your Name&#10;Your Company">${esc(s.emailSignature||'')}</textarea>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Email template</div>
        <div class="settings-card">
          <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:8px">
            <div class="settings-row-sub">
              Placeholders:
              <code style="font-family:var(--mono);font-size:11px;background:var(--bg2);padding:1px 4px;border-radius:3px">{orderType}</code>
              <code style="font-family:var(--mono);font-size:11px;background:var(--bg2);padding:1px 4px;border-radius:3px">{date}</code>
              <code style="font-family:var(--mono);font-size:11px;background:var(--bg2);padding:1px 4px;border-radius:3px">{category}</code>
              <code style="font-family:var(--mono);font-size:11px;background:var(--bg2);padding:1px 4px;border-radius:3px">{items}</code>
              <code style="font-family:var(--mono);font-size:11px;background:var(--bg2);padding:1px 4px;border-radius:3px">{closingNote}</code>
              — all work in subject and body. <code style="font-family:var(--mono);font-size:11px;background:var(--bg2);padding:1px 4px;border-radius:3px">{orderType}</code> resolves to "Material Order" or "Consumables Order" automatically.
            </div>
            <textarea id="s-template" rows="10"
              style="width:100%;border:1px solid var(--border);background:var(--bg);border-radius:var(--radius);
              padding:8px 10px;font-size:12px;color:var(--text);font-family:var(--mono);line-height:1.6;
              resize:vertical;outline:none">${esc(s.emailTemplate||DEFAULT_SETTINGS.emailTemplate)}</textarea>
            <button class="btn-sm" id="btn-reset-template" style="align-self:flex-end">Reset to default</button>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Materials catalogue</div>
        <div class="settings-card">
          <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:6px">
            <div class="settings-row-sub">Edit <strong>materials.csv</strong> in GitHub and commit. Both devices reload automatically.</div>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Connection</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">Firebase config</div><div class="settings-row-sub">Clear to re-enter</div></div>
            <button class="btn-sm btn-sm-danger" id="btn-clear-firebase">Clear</button>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Testing</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">Clear all orders</div><div class="settings-row-sub">Permanently deletes all orders from Firebase</div></div>
            <button class="btn-sm btn-sm-danger" id="btn-clear-orders">Clear all</button>
          </div>
        </div>
      </div>`;

    document.getElementById('btn-clear-firebase').addEventListener('click', () => this.clearFirebase());
    document.getElementById('btn-reset-template').addEventListener('click', () => {
      const ta = document.getElementById('s-template'); if (ta) ta.value = DEFAULT_SETTINGS.emailTemplate;
    });
    document.getElementById('btn-clear-orders').addEventListener('click', async () => {
      if (!confirm('Delete ALL orders from Firebase? This cannot be undone.')) return;
      try { await DB.deleteAllOrders(); alert('All orders cleared.'); } catch(e) { alert('Failed: '+e.message); }
    });
  },

  saveSettings() {
    Settings.save({
      managerName:            document.getElementById('s-manager-name')?.value.trim(),
      supplierEmail:          document.getElementById('s-supplier')?.value.trim(),
      ccEmail:                document.getElementById('s-cc')?.value.trim(),
      emailSubject:           document.getElementById('s-subject')?.value.trim(),
      bulkConsumablesSubject: document.getElementById('s-bulk-subject')?.value.trim(),
      deliveryNote:           document.getElementById('s-delivery')?.value.trim(),
      emailSignature:         document.getElementById('s-signature')?.value,
      emailTemplate:          document.getElementById('s-template')?.value,
    });
    const btn = document.getElementById('btn-save-settings');
    if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => btn.textContent = 'Save', 1500); }
  },

  clearFirebase() {
    if (!confirm('Clear Firebase config?')) return;
    FirebaseConfig.clear(); location.reload();
  },
};

document.addEventListener('DOMContentLoaded', () => Manager.init());
</script>
</body>
</html>
