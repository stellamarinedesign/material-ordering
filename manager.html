<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Material Orders — Manager</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="fonts/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/shared.js"></script>
<script src="js/firebase-sync.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
}

const Manager = {
  orders:            [],
  activeView:        'pending',
  unsubscribe:       null,
  _openCards:        new Set(),
  _openCombinedCats: new Set(),
  // Local-only exclusions: Set of "category|partCode|orderId" strings
  _combExcluded: new Set(),
  // Local-only merges: Map of "category|partCode" -> {qty, deviceNames, orderId}
  // When a merge key exists, that partCode is shown as a single merged row
  _combMerged: new Map(),

  mainTab:   'queue',
  materials:    [],
  consumables:  [],
  activeType: 'materials',   // 'materials' | 'consumables'
  activeCat: null,
  activeSub: null,
  orderRef:  '',
  _cats:     [],
  _subs:     [],
  _no:       { _items: {} },  // materials cart
  _noC:      { _items: {} },  // consumables cart
  _pendingEmailMeta: null,
  _noEmailCategory:  null,
  _noEmailOrderType: null,

  // Stock tab state
  _stock:           [],       // live array from Firestore onSnapshot
  _unsubStock:      null,
  _openStockCards:  new Set(),

  // History tab state
  _historyRecords:  [],
  _historyLastDoc:  null,
  _historyHasMore:  false,
  _historyFilter:   null,     // null = all, or { stockId, itemName }
  _historyLoading:  false,

  async init() {
    const cfg = FirebaseConfig.get();
    if (!cfg) { this.showSetup(); return; }
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Could not connect. Check your Firebase config.'); return; }
    this.materials    = await Data.load('./materials.csv');
    this.consumables  = await Data.loadConsumables('./consumables.csv');
    this.orderRef  = genRef();
    this.renderShell();
    const verEl = document.getElementById('app-version');
    if (verEl) verEl.textContent = APP_VERSION;
    this.startListening();
    this.startStockListening();
  },

  showSetup(err) {
    document.getElementById('root').innerHTML = `
      <div class="setup-screen">
        <div class="setup-card">
          <h2><i class="ti ti-flame" style="color:#ea580c;vertical-align:-2px"></i> Connect to Firebase</h2>
          <p>Enter your Firebase project config to receive orders from the iPad.</p>
          ${err?`<div style="background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:12px">${esc(err)}</div>`:''}
          <div class="setup-field"><label>API Key</label><input id="cfg-apiKey" autocomplete="off" placeholder="AIzaSy..."></div>
          <div class="setup-field"><label>Project ID</label><input id="cfg-projectId" autocomplete="off" placeholder="my-project-id"></div>
          <div class="setup-field"><label>App ID</label><input id="cfg-appId" autocomplete="off" placeholder="1:123456:web:abc..."></div>
          <button id="btn-connect" class="btn btn-primary" style="margin-top:8px"><i class="ti ti-plug"></i> Connect</button>
          <div class="setup-note" style="margin-top:14px">Same config as the iPad. See README.md.</div>
        </div>
      </div>`;
    document.getElementById('btn-connect').addEventListener('click', () => this.saveConfig());
  },

  async saveConfig() {
    const apiKey=document.getElementById('cfg-apiKey').value.trim();
    const projectId=document.getElementById('cfg-projectId').value.trim();
    const appId=document.getElementById('cfg-appId').value.trim();
    if (!apiKey||!projectId||!appId) { alert('Please fill in all fields.'); return; }
    const cfg={apiKey,projectId,appId,authDomain:`${projectId}.firebaseapp.com`,storageBucket:`${projectId}.appspot.com`,messagingSenderId:'000000000000'};
    const ok=await DB.init(cfg);
    if (!ok) { this.showSetup('Connection failed.'); return; }
    FirebaseConfig.save(cfg);
    this.materials    = await Data.load('./materials.csv');
    this.consumables  = await Data.loadConsumables('./consumables.csv');
    this.orderRef=genRef();
    this.renderShell();
    const verEl=document.getElementById('app-version'); if(verEl) verEl.textContent=APP_VERSION;
    this.startListening();
    this.startStockListening();
  },

  // ══════════════════════════════════════════
  // SHELL
  // ══════════════════════════════════════════
  renderShell() {
    document.getElementById('root').innerHTML = `
      <div class="app-root manager-root" id="app-root">

        <div class="header manager-hdr">
          <div class="col"><div class="header-inner">
            <div class="header-left">
              <div class="header-title">Material Orders — Manager</div>
              <div class="header-ref"><span class="live-dot"></span>Live &nbsp;·&nbsp; <span id="app-version" style="opacity:0.6;font-family:var(--mono)"></span></div>
            </div>
            <div class="header-actions">
              <span class="role-pill">Production Manager</span>
              <button class="icon-btn" id="btn-settings" title="Settings"><i class="ti ti-settings"></i></button>
            </div>
          </div></div>
        </div>

        <!-- MAIN TABS -->
        <div style="background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0">
          <div class="col" style="padding:0">
            <div style="display:flex;overflow-x:auto;scrollbar-width:none">
              <button class="main-tab active" id="main-tab-queue">
                <i class="ti ti-inbox"></i>Order Queue
                <span class="sidebar-count zero" id="queue-pending-badge">0</span>
              </button>
              <button class="main-tab" id="main-tab-new">
                <i class="ti ti-plus"></i>New Order
                <span class="sidebar-count zero" id="new-order-badge">0</span>
              </button>
              <button class="main-tab" id="main-tab-stock">
                <i class="ti ti-package"></i>Stock
                <span class="sidebar-count zero" id="stock-low-badge">0</span>
              </button>
              <button class="main-tab" id="main-tab-history">
                <i class="ti ti-history"></i>History
              </button>
            </div>
          </div>
        </div>

        <!-- QUEUE VIEW: flex column → mobile-tabs (optional) + manager-columns -->
        <div id="view-queue" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;height:0">
          <!-- Mobile sub-tabs -->
          <div class="mobile-tabs" id="mobile-tabs">
            <button class="tab active" data-view="pending">Pending <span class="sidebar-count zero" id="mob-pending-count" style="margin-left:4px">0</span></button>
            <button class="tab" data-view="sent">Sent</button>
            <button class="tab" data-view="rejected">Rejected</button>
            <button class="tab" data-view="all">All</button>
          </div>
          <!-- Two-column area: sidebar + scrollable main -->
          <div class="manager-columns" style="flex:1;display:flex;overflow:hidden;min-height:0">
            <div class="manager-sidebar">
              <div class="sidebar-section">
                <div class="sidebar-title">Orders</div>
                <button class="sidebar-btn active" data-sb="pending"><i class="ti ti-clock"></i>Pending<span class="sidebar-count zero" id="pending-count">0</span></button>
                <button class="sidebar-btn" data-sb="sent"><i class="ti ti-mail-check"></i>Sent</button>
                <button class="sidebar-btn" data-sb="rejected"><i class="ti ti-ban"></i>Rejected</button>
                <button class="sidebar-btn" data-sb="all"><i class="ti ti-list"></i>All</button>
              </div>
              <div class="sidebar-section">
                <div class="sidebar-title">Settings</div>
                <button class="sidebar-btn" id="sb-settings"><i class="ti ti-adjustments"></i>Email &amp; preferences</button>
                <button class="sidebar-btn" id="sb-reset"><i class="ti ti-plug-x"></i>Reset connection</button>
              </div>
            </div>
            <div class="manager-main">
              <div class="order-queue" id="order-queue"></div>
            </div>
          </div>
        </div>

        <!-- NEW ORDER VIEW -->
        <div id="view-new-order" style="display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0">
          <div id="no-type-wrap"></div>
          <div id="no-tabs-wrap"></div>
          <div class="search-bar"><div class="col"><div class="search-wrap">
            <i class="ti ti-search"></i>
            <input type="search" id="no-search" placeholder="Search part code or description…" autocomplete="off">
          </div></div></div>
          <div class="app-scroll" id="no-scroll"><div class="col"><div class="mat-list" id="no-mat-list"></div></div></div>
          <div class="action-bar"><div class="action-bar-inner">
            <button class="btn btn-primary" id="btn-no-review"><i class="ti ti-clipboard-list"></i><span id="btn-no-review-label">Review &amp; compose email</span></button>
          </div></div>
        </div>

        <!-- STOCK VIEW -->
        <div id="view-stock" style="display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0">
          <div id="stock-low-banner" style="display:none" class="low-stock-banner">
            <i class="ti ti-alert-triangle"></i>
            <span id="stock-low-text"></span>
          </div>
          <div class="search-bar"><div class="col"><div class="search-wrap">
            <i class="ti ti-search"></i>
            <input type="search" id="stock-search" placeholder="Search consumables…" autocomplete="off">
          </div></div></div>
          <div class="app-scroll" id="stock-scroll">
            <div id="stock-list" class="stock-list"></div>
          </div>
        </div>

        <!-- HISTORY VIEW -->
        <div id="view-history" style="display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0">
          <div class="history-filter-bar" id="history-filter-bar">
            <span style="font-size:12px;color:var(--text2);font-weight:500">Filter:</span>
            <div class="history-filter-chip" id="history-clear-filter" style="display:none">
              <i class="ti ti-x"></i><span id="history-filter-label">All items</span>
            </div>
            <span id="history-filter-all" style="font-size:12px;color:var(--text3)">All items</span>
          </div>
          <div class="app-scroll" id="history-scroll">
            <div id="history-list" class="history-list"></div>
          </div>
        </div>

        <!-- EMAIL PANEL -->        <div class="panel" id="email-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-email"><i class="ti ti-chevron-left"></i>Back</button>
            <div class="panel-title" id="email-panel-title">Order Email</div>
            <button class="btn-green btn" id="btn-send-email" style="width:auto;padding:7px 14px;font-size:13px"><i class="ti ti-send"></i>Send</button>
          </div>
          <div class="email-fields">
            <div class="email-field"><label>To</label><input type="email" id="email-to"></div>
            <div class="email-field"><label>CC</label><input type="email" id="email-cc"></div>
            <div class="email-field"><label>Subject</label><input type="text" id="email-subject"></div>
          </div>
          <div class="email-body-wrap"><textarea id="email-body"></textarea></div>
        </div>

        <!-- NEW ORDER REVIEW PANEL -->
        <div class="panel" id="no-review-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-no-review"><i class="ti ti-chevron-left"></i>Back</button>
            <div class="panel-title">Order Confirmation</div>
            <div class="panel-spacer"></div>
          </div>
          <div class="panel-scroll"><div class="panel-col" id="no-review-contents"></div></div>
          <div class="action-bar"><div class="action-bar-inner">
            <div id="no-email-buttons"></div>
            <button class="btn btn-orange" id="btn-no-add-to-orders" style="margin-top:2px">
              <i class="ti ti-send"></i> Add to order queue
            </button>
          </div></div>
        </div>

        <!-- SETTINGS PANEL -->
        <div class="panel" id="settings-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-settings"><i class="ti ti-chevron-left"></i>Back</button>
            <div class="panel-title">Settings</div>
            <button class="btn-sm btn-sm-save" id="btn-save-settings">Save</button>
          </div>
          <div class="panel-scroll"><div class="panel-col" style="gap:20px" id="settings-body"></div></div>
        </div>

      </div>
      <div id="overlay-wrap"></div>`;

    // ── ALL LISTENERS ONCE ──
    document.getElementById('btn-settings')       .addEventListener('click', () => this.openPanel('settings-panel'));
    document.getElementById('sb-settings')        .addEventListener('click', () => this.openPanel('settings-panel'));
    document.getElementById('sb-reset')           .addEventListener('click', () => this.clearFirebase());
    document.getElementById('btn-close-settings') .addEventListener('click', () => this.closePanel('settings-panel'));
    document.getElementById('btn-save-settings')  .addEventListener('click', () => this.saveSettings());
    document.getElementById('btn-close-email')    .addEventListener('click', () => this.closePanel('email-panel'));
    document.getElementById('btn-send-email')     .addEventListener('click', () => this.sendEmail());
    document.getElementById('main-tab-queue')  .addEventListener('click', () => this.setMainTab('queue'));
    document.getElementById('main-tab-new')    .addEventListener('click', () => this.setMainTab('new-order'));
    document.getElementById('main-tab-stock')  .addEventListener('click', () => this.setMainTab('stock'));
    document.getElementById('main-tab-history').addEventListener('click', () => this.setMainTab('history'));
    document.getElementById('btn-no-review')      .addEventListener('click', () => this.noOpenReview());
    document.getElementById('btn-close-no-review').addEventListener('click', () => this.closePanel('no-review-panel'));
    document.getElementById('btn-no-add-to-orders').addEventListener('click', () => this.noAddToOrders());

    document.querySelectorAll('[data-sb]').forEach(b => b.addEventListener('click', () => this.setView(b.dataset.sb)));
    document.getElementById('mobile-tabs').addEventListener('click', e => {
      const b = e.target.closest('[data-view]'); if (b) this.setView(b.dataset.view);
    });

    // Queue: single permanent delegated listener
    const queue = document.getElementById('order-queue');
    queue.addEventListener('click', e => {
      const dec     = e.target.closest('[data-qdec]');
      const inc     = e.target.closest('[data-qinc]');
      const catEmail= e.target.closest('[data-cat-email]');
      const del     = e.target.closest('[data-delete]');
      const combHdr = e.target.closest('[data-comb-cat]');
      const combDel = e.target.closest('[data-comb-del]');
      const combMrg = e.target.closest('[data-comb-merge]');
      const header  = e.target.closest('.order-card-header');
      const resetItem  = e.target.closest('[data-reset-item]');
      const resetOrder = e.target.closest('[data-reset-order]');
      if (dec)        { e.stopPropagation(); this.stepQty(dec.dataset.qdec, +dec.dataset.idx, -1); return; }
      if (inc)        { e.stopPropagation(); this.stepQty(inc.dataset.qinc, +inc.dataset.idx,  1); return; }
      if (catEmail)   { e.stopPropagation(); this.openCategoryEmail(catEmail.dataset.catEmail); return; }
      if (del)        { e.stopPropagation(); this.deleteOrder(del.dataset.delete); return; }
      const rejectOrd = e.target.closest('[data-reject-order]');
      if (rejectOrd)  { e.stopPropagation(); this.rejectOrder(rejectOrd.dataset.rejectOrder); return; }
      if (combHdr)    { e.stopPropagation(); this.toggleCombinedCat(combHdr.dataset.combCat); return; }
      if (combDel)    { e.stopPropagation(); this.excludeCombinedLine(combDel.dataset.combDel, combDel.dataset.orderId, combDel.dataset.partcode); return; }
      if (combMrg)    { e.stopPropagation(); this.localMergeLines(combMrg.dataset.combMerge, combMrg.dataset.partcode); return; }
      if (resetItem)  { e.stopPropagation(); this.resetItemEmailed(resetItem.dataset.resetItem, resetItem.dataset.category, resetItem.dataset.partcode); return; }
      if (resetOrder) { e.stopPropagation(); this.resetOrderToPending(resetOrder.dataset.resetOrder); return; }
      const unexclude = e.target.closest('[data-unexclude]');
      const unmerge   = e.target.closest('[data-unmerge]');
      if (unexclude)  { e.stopPropagation(); this.unexcludeLine(unexclude.dataset.unexclude, unexclude.dataset.orderId, unexclude.dataset.partcode); return; }
      if (unmerge)    { e.stopPropagation(); this.unmergeLines(unmerge.dataset.unmerge, unmerge.dataset.partcode); return; }
      if (header)     { this.toggleCard(header.dataset.cardId); }
    });
    queue.addEventListener('change', e => {
      const inp  = e.target.closest('[data-qchange]');
      const cinp = e.target.closest('[data-cqchange]');
      if (inp)  { e.stopPropagation(); this.editQty(inp.dataset.qchange, +inp.dataset.idx, inp.value); }
      if (cinp) { e.stopPropagation(); this.editCombinedSubQty(cinp.dataset.cqchange, cinp.dataset.orderId, cinp.dataset.partcode, cinp.value); }
    });
    // Capture phase for combined +/- so they fire before the header toggle check
    queue.addEventListener('click', e => {
      const cinc = e.target.closest('[data-cqinc]');
      const cdec = e.target.closest('[data-cqdec]');
      if (cinc) { e.stopPropagation(); this.stepCombinedSubQty(cinc.dataset.cqinc, cinc.dataset.orderId, cinc.dataset.partcode, +1); }
      if (cdec) { e.stopPropagation(); this.stepCombinedSubQty(cdec.dataset.cqdec, cdec.dataset.orderId, cdec.dataset.partcode, -1); }
    }, true);

    // New order type switcher (Materials / Consumables)
    document.getElementById('no-type-wrap').addEventListener('click', e => {
      const t = e.target.closest('[data-type]');
      if (t && t.dataset.type !== this.activeType) {
        this.activeType = t.dataset.type;
        this.activeCat  = null;
        this.activeSub  = null;
        this.renderNoType();
        this.renderNoTabs();
        this.renderNoList();
        this._updateNoBadge();
        this._updateNoReviewBtn();
        const s = document.getElementById('no-scroll'); if (s) s.scrollTop = 0;
      }
    });
    // New order tab
    document.getElementById('no-tabs-wrap').addEventListener('click', e => {
      const c = e.target.closest('[data-cat-idx]');
      const s = e.target.closest('[data-sub-idx]');
      if (c) { const i=+c.dataset.catIdx; this.noSetCat(i===-1?null:this._cats[i]); }
      else if (s) { const i=+s.dataset.subIdx; this.noSetSub(i===-1?null:this._subs[i]); }
    });
    document.getElementById('no-mat-list').addEventListener('click', e => {
      const dec=e.target.closest('[data-dec]'), inc=e.target.closest('[data-inc]');
      const add=e.target.closest('[data-add]'), bin=e.target.closest('[data-bin]');
      if (dec) { e.stopPropagation(); this.noAdj(+dec.dataset.dec, -1); }
      if (inc) { e.stopPropagation(); this.noAdj(+inc.dataset.inc,  1); }
      if (add) { e.stopPropagation(); this.noQuickAdd(+add.dataset.add); }
      if (bin) { e.stopPropagation(); this.noZero(+bin.dataset.bin); }
    });
    document.getElementById('no-mat-list').addEventListener('change', e => {
      const inp = e.target.closest('[data-qid]'); if (inp) this.noSetQty(+inp.dataset.qid, inp.value);
    });
    document.getElementById('no-search').addEventListener('input', () => this.renderNoList());
    document.getElementById('no-review-contents').addEventListener('click', e => {
      const dec=e.target.closest('[data-rdec]'), inc=e.target.closest('[data-rinc]'), rem=e.target.closest('[data-rrem]');
      if (dec) this.noRevAdj(+dec.dataset.rdec, -1);
      if (inc) this.noRevAdj(+inc.dataset.rinc,  1);
      if (rem) this.noZero(+rem.dataset.rrem);
    });
    document.getElementById('no-review-contents').addEventListener('change', e => {
      const inp = e.target.closest('[data-rqid]'); if (inp) this.noRevSet(+inp.dataset.rqid, inp.value);
    });
    document.getElementById('no-email-buttons').addEventListener('click', e => {
      const btn = e.target.closest('[data-no-cat]'); if (btn) this.noOpenCategoryEmail(btn.dataset.noCat);
    });

    // Stock list delegated listener
    document.getElementById('stock-list').addEventListener('click', e => {
      const hdr      = e.target.closest('[data-stock-hdr]');
      const enableBtn= e.target.closest('[data-stock-enable]');
      const disBtn   = e.target.closest('[data-stock-disable]');
      const intakeBtn= e.target.closest('[data-stock-intake]');
      const setBtn   = e.target.closest('[data-stock-set]');
      const histBtn  = e.target.closest('[data-stock-hist]');
      const saveThresh = e.target.closest('[data-stock-thresh]');
      if (enableBtn) { e.stopPropagation(); this.stockEnable(enableBtn.dataset.stockEnable); return; }
      if (disBtn)    { e.stopPropagation(); this.stockDisable(disBtn.dataset.stockDisable); return; }
      if (intakeBtn) { e.stopPropagation(); this.stockIntake(intakeBtn.dataset.stockIntake); return; }
      if (setBtn)    { e.stopPropagation(); this.stockSetAbsolute(setBtn.dataset.stockSet); return; }
      if (histBtn)   { e.stopPropagation(); this.stockOpenHistory(histBtn.dataset.stockHist, histBtn.dataset.stockName); return; }
      if (saveThresh){ e.stopPropagation(); this.stockSaveThresholds(saveThresh.dataset.stockThresh); return; }
      if (hdr)       { this.toggleStockCard(hdr.dataset.stockHdr); }
    });
    document.getElementById('stock-search').addEventListener('input', () => this.renderStockList());

    // History delegated listener
    document.getElementById('history-list').addEventListener('click', e => {
      const more = e.target.closest('[data-hist-more]');
      if (more) { this._loadHistory(true); }
    });
    document.getElementById('history-clear-filter').addEventListener('click', () => {
      this._historyFilter = null;
      this._historyRecords = [];
      this._historyLastDoc = null;
      this.renderHistoryFilter();
      this._loadHistory();
    });

    this._populateSettings();
    this.renderQueue();
    this.renderNoType();
    this.renderNoTabs();
    this.renderNoList();
    this._updateNoReviewBtn();
  },

  openPanel(id)  { document.getElementById(id)?.classList.add('open'); },
  closePanel(id) { document.getElementById(id)?.classList.remove('open'); },

  setMainTab(tab) {
    this.mainTab = tab;
    const views = { queue: 'view-queue', 'new-order': 'view-new-order', stock: 'view-stock', history: 'view-history' };
    const tabs  = { queue: 'main-tab-queue', 'new-order': 'main-tab-new', stock: 'main-tab-stock', history: 'main-tab-history' };
    Object.entries(views).forEach(([key, id]) => {
      const el = document.getElementById(id); if (!el) return;
      el.style.display = key === tab ? 'flex' : 'none';
    });
    Object.entries(tabs).forEach(([key, id]) => {
      document.getElementById(id)?.classList.toggle('active', key === tab);
    });
    if (tab === 'history') this._loadHistory();
  },

  // ══════════════════════════════════════════
  // QUEUE
  // ══════════════════════════════════════════
  setView(v) {
    this.activeView = v;
    document.querySelectorAll('[data-sb]').forEach(b => b.classList.toggle('active', b.dataset.sb === v));
    document.querySelectorAll('#mobile-tabs [data-view]').forEach(b => b.classList.toggle('active', b.dataset.view === v));
    this.renderQueue();
  },

  startListening() {
    if (this.unsubscribe) this.unsubscribe();
    this.unsubscribe = DB.listenOrders(orders => {
      this.orders = orders;
      const n = orders.filter(o => o.status === 'pending').length;
      ['pending-count','mob-pending-count','queue-pending-badge'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.textContent = n; el.classList.toggle('zero', n === 0); }
      });
      this.renderQueue();
    });
  },

  renderQueue() {
    const wrap = document.getElementById('order-queue'); if (!wrap) return;
    // Preserve open card state
    wrap.querySelectorAll('.order-card-body.open').forEach(el => this._openCards.add(el.id.replace('body-', '')));
    let list = this.orders;
    if (this.activeView === 'pending')  list = list.filter(o => o.status === 'pending');
    if (this.activeView === 'sent')     list = list.filter(o => o.status === 'sent');
    if (this.activeView === 'rejected') list = list.filter(o => o.status === 'rejected');
    const listIds = new Set(list.map(o => o._id));
    for (const id of this._openCards) { if (!listIds.has(id)) this._openCards.delete(id); }

    if (!list.length) {
      const msgs = { pending:['ti-clock','No pending orders yet.'], sent:['ti-mail-check','No sent orders yet.'], rejected:['ti-ban','No rejected orders.'], all:['ti-inbox','No orders yet.'] };
      const [ic, msg] = msgs[this.activeView] || msgs.all;
      wrap.innerHTML = `<div class="empty-queue"><i class="ti ${ic}"></i><p>${msg}</p></div>`;
      return;
    }

    // Combined section
    const pendingOrders = this.orders.filter(o => o.status === 'pending');
    let combinedHtml = '';
    if (this.activeView === 'pending' && pendingOrders.length >= 1) {
      const groups = this._groupByCatKeepSeparate(pendingOrders);
      const cats = Object.keys(groups);
      if (cats.length) {
        const catSections = cats.map(cat => {
          const g = groups[cat];
          const isOpen = this._openCombinedCats.has(cat);
          const catKey = cat.replace(/\s/g, '_');

          // Build per-item rows — respects local _combExcluded and _combMerged state
          const itemRows = Object.values(g.byPartCode).map(pGroup => {
            const pcSafe = pGroup.partCode.replace(/[^a-zA-Z0-9]/g,'_');
            const mergeKey = `${cat}|${pGroup.partCode}`;
            const merged = this._combMerged.get(mergeKey);

            // Filter out excluded lines for display purposes
            const visibleLines = pGroup.lines.filter(
              line => !this.isExcluded(cat, line.orderId, pGroup.partCode)
            );
            const excludedLines = pGroup.lines.filter(
              line => this.isExcluded(cat, line.orderId, pGroup.partCode)
            );

            // If merged locally, show as a single merged row
            if (merged) {
              return `<div class="combined-main-row">
                <div class="combined-main-info">
                  <div class="combined-main-name">${esc(pGroup.description)}</div>
                  <div class="combined-main-code" style="display:flex;align-items:center;gap:4px">
                    <span>${esc(pGroup.partCode)}</span>
                    <span style="opacity:0.4">·</span>
                    <span style="font-size:10px;color:var(--green-text);font-family:var(--mono);background:var(--green-bg);padding:1px 6px;border-radius:20px">Merged${merged.deviceLabel && merged.deviceLabel !== 'Merged' ? ' · ' + esc(merged.deviceLabel) : ''}</span>
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                  <span style="font-size:12px;color:var(--text3);font-family:var(--mono)">${merged.qty} ${esc(pGroup.qtyType||'')}</span>
                  <button class="btn-sm" data-unmerge="${esc(cat)}" data-partcode="${esc(pGroup.partCode)}" style="font-size:10px;padding:3px 8px">
                    <i class="ti ti-git-branch"></i> Unmerge
                  </button>
                </div>
              </div>
              ${excludedLines.map(line => `
                <div class="combined-sub-row" style="opacity:0.35">
                  <div class="combined-sub-device"><i class="ti ti-device-ipad" style="font-size:11px"></i><span>${esc(line.deviceName||line.orderRef||'Unknown')}</span><span style="margin-left:4px;opacity:0.6;font-size:10px">${line.submittedAt?fmtTime(line.submittedAt):''}</span><span style="font-size:10px;color:var(--text3);margin-left:4px">(excluded)</span></div>
                  <button class="btn-sm" data-unexclude="${esc(cat)}" data-order-id="${esc(line.orderId)}" data-partcode="${esc(pGroup.partCode)}" style="font-size:10px;padding:2px 6px">Restore</button>
                </div>`).join('')}`;
            }

            // originallyHadSingleLine: this partCode came from exactly one order
            // We use pGroup.lines.length (all lines, not just visible) so the layout
            // stays as a top-level row even after that one line is excluded.
            const originallyHadSingleLine = pGroup.lines.length === 1;
            const singleLine = pGroup.lines[0];  // only used in the single-line branch
            const totalQty = visibleLines.reduce((s,l)=>s+l.qty,0);

            if (originallyHadSingleLine) {
              // Single-order item — render as one top-level row.
              // If excluded, grey the whole row and swap controls for a Restore button.
              const isExc = excludedLines.length === 1;
              const line = singleLine;
              const mergedDev = line.mergedDeviceName;
              const displayDevice = mergedDev === '__merged__'
                ? '<span style="font-size:10px;color:var(--green-text);font-family:var(--mono);background:var(--green-bg);padding:1px 6px;border-radius:20px">Merged</span>'
                : line.deviceName
                  ? `<span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${esc(line.deviceName)}</span>${line.submittedAt ? `<span style="opacity:0.6;margin-left:4px;font-size:11px;font-family:var(--mono)">${fmtTime(line.submittedAt)}</span>` : ''}`
                  : '';
              return `<div class="combined-main-row"${isExc ? ' style="opacity:0.35"' : ''}>
                <div class="combined-main-info">
                  <div class="combined-main-name">${esc(pGroup.description)}</div>
                  <div class="combined-main-code" style="display:flex;align-items:center;gap:4px">
                    <span>${esc(pGroup.partCode)}</span>
                    ${isExc ? `<span style="opacity:0.4">·</span><span style="font-size:10px;color:var(--text3);font-family:var(--mono)">(excluded)</span>` : displayDevice ? `<span style="opacity:0.4">·</span>${displayDevice}` : ''}
                  </div>
                </div>
                ${isExc
                  ? `<button class="btn-sm" data-unexclude="${esc(cat)}" data-order-id="${esc(line.orderId)}" data-partcode="${esc(pGroup.partCode)}" style="font-size:10px;padding:2px 6px;flex-shrink:0">Restore</button>`
                  : `<div class="qty-row" style="flex-shrink:0">
                      <button class="qty-btn" data-cqdec="${esc(cat)}" data-order-id="${esc(line.orderId)}" data-partcode="${esc(pGroup.partCode)}">−</button>
                      <input class="qty-edit" type="number" min="0" step="1" value="${line.qty}"
                        id="cqi-${catKey}-${pcSafe}-${esc(line.orderId)}"
                        data-cqchange="${esc(cat)}" data-order-id="${esc(line.orderId)}" data-partcode="${esc(pGroup.partCode)}">
                      <button class="qty-btn" data-cqinc="${esc(cat)}" data-order-id="${esc(line.orderId)}" data-partcode="${esc(pGroup.partCode)}">+</button>
                    </div>
                    <span style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:4px;min-width:40px">${esc(pGroup.qtyType||'')}</span>
                    <button class="btn-sm btn-sm-danger" data-comb-del="${esc(cat)}" data-order-id="${esc(line.orderId)}" data-partcode="${esc(pGroup.partCode)}" style="font-size:11px;padding:3px 6px" title="Exclude from email">
                      <i class="ti ti-eye-off"></i>
                    </button>`
                }
              </div>`;
            } else {
              // Multiple orders for this partCode — show parent row + visible sub-rows + excluded sub-rows
              const mainRow = `<div class="combined-main-row">
                <div class="combined-main-info">
                  <div class="combined-main-name">${esc(pGroup.description)}</div>
                  <div class="combined-main-code">${esc(pGroup.partCode)}</div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
                  <span style="font-size:12px;color:var(--text3);font-family:var(--mono)">Total: ${totalQty} ${esc(pGroup.qtyType||'')}</span>
                  <button class="btn-sm btn-sm-save" data-comb-merge="${esc(cat)}" data-partcode="${esc(pGroup.partCode)}" style="font-size:10px;padding:3px 8px;white-space:nowrap">
                    <i class="ti ti-git-merge"></i> Merge
                  </button>
                </div>
              </div>`;
              const subRows = visibleLines.map(line => `
                <div class="combined-sub-row">
                  <div class="combined-sub-device">
                    <i class="ti ti-device-ipad" style="font-size:11px;color:var(--text3)"></i>
                    <span>${esc(line.deviceName || 'Unknown')}</span>
                    ${line.submittedAt ? `<span style="opacity:0.6;margin-left:4px">${fmtTime(line.submittedAt)}</span>` : ''}
                  </div>
                  <div class="qty-row" style="flex-shrink:0">
                    <button class="qty-btn" data-cqdec="${esc(cat)}" data-order-id="${esc(line.orderId)}" data-partcode="${esc(pGroup.partCode)}">−</button>
                    <input class="qty-edit" type="number" min="0" step="1" value="${line.qty}"
                      id="cqi-${catKey}-${pcSafe}-${esc(line.orderId)}"
                      data-cqchange="${esc(cat)}" data-order-id="${esc(line.orderId)}" data-partcode="${esc(pGroup.partCode)}">
                    <button class="qty-btn" data-cqinc="${esc(cat)}" data-order-id="${esc(line.orderId)}" data-partcode="${esc(pGroup.partCode)}">+</button>
                  </div>
                  <span style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:4px;min-width:40px">${esc(line.qtyType||'')}</span>
                  <button class="btn-sm btn-sm-danger" data-comb-del="${esc(cat)}" data-order-id="${esc(line.orderId)}" data-partcode="${esc(pGroup.partCode)}" style="font-size:11px;padding:3px 6px" title="Exclude from email">
                    <i class="ti ti-eye-off"></i>
                  </button>
                </div>`).join('');
              const excludedRowsHtml = excludedLines.map(line => `
                <div class="combined-sub-row" style="opacity:0.35">
                  <div class="combined-sub-device">
                    <i class="ti ti-eye-off" style="font-size:11px"></i>
                    <span>${esc(line.deviceName||line.orderRef||'Unknown')}</span>
                    ${line.submittedAt ? `<span style="margin-left:4px;opacity:0.6;font-size:10px">${fmtTime(line.submittedAt)}</span>` : ''}
                    <span style="font-size:10px;color:var(--text3);margin-left:4px">(excluded)</span>
                  </div>
                  <button class="btn-sm" data-unexclude="${esc(cat)}" data-order-id="${esc(line.orderId)}" data-partcode="${esc(pGroup.partCode)}" style="font-size:10px;padding:2px 6px">Restore</button>
                </div>`).join('');
              return mainRow + subRows + excludedRowsHtml;
            }
          }).join('');

          return `<div style="border-bottom:2px solid var(--border)">
            <div class="combined-header" data-comb-cat="${esc(cat)}">
              <div style="display:flex;align-items:center;gap:8px">
                <i class="ti ${CAT_ICONS[cat]?.icon||'ti-package'}" style="color:${CAT_ICONS[cat]?.color||'#6b7280'}"></i>
                <span style="font-size:13px;font-weight:500">${esc(cat)}</span>
                <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${Object.keys(g.byPartCode).length} item${Object.keys(g.byPartCode).length!==1?'s':''}</span>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <button class="btn-sm btn-sm-save" data-cat-email="${esc(cat)}" style="font-size:11px;padding:4px 10px">
                  <i class="ti ti-mail"></i> Email
                </button>
                <i class="ti ti-chevron-right chevron ${isOpen?'open':''}" id="comb-chev-${catKey}"></i>
              </div>
            </div>
            <div class="combined-cat-body ${isOpen?'open':''}" id="comb-body-${catKey}">${itemRows}</div>
          </div>`;
        }).join('');

        combinedHtml = `<div class="combined-card">
          <div style="padding:12px 14px;border-bottom:1px solid var(--border);background:var(--bg)">
            <div style="font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px">
              <i class="ti ti-layers-union"></i> Send all pending by category
            </div>
            <div style="font-size:11px;color:var(--text3);margin-top:2px">Expand a category to review quantities and device sources before emailing.</div>
          </div>
          ${catSections}
        </div>`;
      }
    }

    wrap.innerHTML = combinedHtml + list.map(o => this._orderCard(o)).join('');
    for (const id of this._openCards) {
      document.getElementById(`body-${id}`)?.classList.add('open');
      document.getElementById(`chev-${id}`)?.classList.add('open');
    }
  },

  // Group pending items by category, then by partCode, keeping separate sub-lines per order
  _groupByCatKeepSeparate(orders) {
    const groups = {};
    for (const order of orders) {
      for (const item of (order.items || [])) {
        if (item.emailed) continue;
        const cat = item.category || 'Uncategorised';
        if (!groups[cat]) groups[cat] = { byPartCode: {} };
        const pc = item.partCode;
        if (!groups[cat].byPartCode[pc]) {
          groups[cat].byPartCode[pc] = {
            partCode: pc,
            description: item.description,
            qtyType: item.qtyType || '',
            lines: [],
          };
        }
        const existing = groups[cat].byPartCode[pc].lines.find(l => l.orderId === order._id);
        if (existing) {
          existing.qty += item.qty;
        } else {
          groups[cat].byPartCode[pc].lines.push({
            orderId:           order._id,
            orderRef:          order.ref || order._id,
            deviceName:        order.deviceName || '',
            mergedDeviceName:  item.mergedDeviceName || null,  // set on item after a merge
            submittedAt:       order.submittedAt?.toDate ? order.submittedAt.toDate() : (order.submittedAt || null),
            qty:               item.qty,
            qtyType:           item.qtyType || '',
          });
        }
      }
    }
    return groups;
  },

  toggleCombinedCat(cat) {
    const key = cat.replace(/\s/g, '_');
    const body = document.getElementById(`comb-body-${key}`);
    const chev = document.getElementById(`comb-chev-${key}`);
    if (!body) return;
    const opening = !body.classList.contains('open');
    body.classList.toggle('open', opening);
    chev?.classList.toggle('open', opening);
    if (opening) this._openCombinedCats.add(cat); else this._openCombinedCats.delete(cat);
  },

  // ── LOCAL-ONLY combined view operations (never write to Firebase) ──

  // Exclude a line from the email view (greyed out, still in Firebase)
  excludeCombinedLine(cat, orderId, partCode) {
    const key = `${cat}|${partCode}|${orderId}`;
    this._combExcluded.add(key);
    this.renderQueue();
  },

  unexcludeLine(cat, orderId, partCode) {
    const key = `${cat}|${partCode}|${orderId}`;
    this._combExcluded.delete(key);
    this.renderQueue();
  },

  isExcluded(cat, orderId, partCode) {
    return this._combExcluded.has(`${cat}|${partCode}|${orderId}`);
  },

  // Merge lines locally — store merged qty/device in _combMerged, don't touch Firebase
  localMergeLines(cat, partCode) {
    if (!cat || !partCode) return;
    const pendingOrders = this.orders.filter(o => o.status === 'pending');
    const key = `${cat}|${partCode}`;
    // Collect all non-excluded lines for this partCode
    const lines = [];
    for (const order of pendingOrders) {
      for (const item of (order.items || [])) {
        if (item.emailed) continue;
        if (item.category !== cat || item.partCode !== partCode) continue;
        if (this.isExcluded(cat, order._id, partCode)) continue;
        lines.push({ orderId: order._id, qty: item.qty, deviceName: order.deviceName || '' });
      }
    }
    if (lines.length < 2) return;
    const totalQty = lines.reduce((s, l) => s + l.qty, 0);
    const deviceNames = [...new Set(lines.map(l => l.deviceName).filter(Boolean))];
    this._combMerged.set(key, {
      qty: totalQty,
      deviceLabel: deviceNames.length > 1 ? 'Merged' : (deviceNames[0] || ''),
      orderId: lines[0].orderId,  // representative order for qty editing
    });
    this.renderQueue();
  },

  unmergeLines(cat, partCode) {
    this._combMerged.delete(`${cat}|${partCode}`);
    this.renderQueue();
  },

  isMerged(cat, partCode) {
    return this._combMerged.has(`${cat}|${partCode}`);
  },

  async rejectOrder(id) {
    try { await DB.rejectOrder(id); } catch(e) { alert('Failed: ' + e.message); }
  },

  async stepCombinedSubQty(cat, orderId, partCode, delta) {
    if (!partCode) return;
    const order = this.orders.find(o => o._id === orderId); if (!order) return;
    const items = [...order.items];
    const idx = items.findIndex(i => i.category === cat && i.partCode === partCode && !i.emailed);
    if (idx < 0) return;
    const newQty = Math.max(0, (items[idx].qty || 0) + delta);
    items[idx] = { ...items[idx], qty: newQty };
    const catKey = cat.replace(/\s/g, '_');
    const pcSafe = partCode.replace(/[^a-zA-Z0-9]/g,'_');
    const inp = document.getElementById(`cqi-${catKey}-${pcSafe}-${orderId}`);
    if (inp) inp.value = newQty;
    try { await DB.updateItems(orderId, items); } catch (e) { console.error(e); }
  },

  async editCombinedSubQty(cat, orderId, partCode, val) {
    if (!partCode) return;
    const order = this.orders.find(o => o._id === orderId); if (!order) return;
    const items = [...order.items];
    const idx = items.findIndex(i => i.category === cat && i.partCode === partCode && !i.emailed);
    if (idx < 0) return;
    items[idx] = { ...items[idx], qty: Math.max(0, parseInt(val) || 0) };
    try { await DB.updateItems(orderId, items); } catch (e) { console.error(e); }
  },

  async deleteCombinedLine(cat, orderId, partCode) {
    if (!partCode) return;
    // Defer confirm out of the click handler to avoid long-task violation
    await new Promise(r => setTimeout(r, 0));
    if (!confirm(`Remove ${partCode} from this order?`)) return;
    const order = this.orders.find(o => o._id === orderId); if (!order) return;
    const items = order.items.filter(i => !(i.category === cat && i.partCode === partCode && !i.emailed));
    try { await DB.updateItems(orderId, items); } catch (e) { alert('Failed: ' + e.message); }
  },

  async mergeCombinedLines(cat, partCode) {
    if (!cat || !partCode) { console.error('merge: missing params', cat, partCode); return; }
    const pendingOrders = this.orders.filter(o => o.status === 'pending');
    const linesWithItem = pendingOrders.filter(o =>
      o.items?.some(i => i.category === cat && i.partCode === partCode && !i.emailed)
    );
    if (linesWithItem.length < 2) return;
    const deviceNames = [...new Set(linesWithItem.map(o => o.deviceName).filter(Boolean))];
    const mergedDeviceName = deviceNames.length > 1 ? '__merged__' : (deviceNames[0] || '');
    const totalQty = linesWithItem.reduce((sum, o) => {
      const item = o.items.find(i => i.category === cat && i.partCode === partCode && !i.emailed);
      return sum + (item?.qty || 0);
    }, 0);
    const first = linesWithItem[0];
    const firstItems = [...first.items];
    const firstIdx = firstItems.findIndex(i => i.category === cat && i.partCode === partCode && !i.emailed);
    if (firstIdx >= 0) {
      firstItems[firstIdx] = { ...firstItems[firstIdx], qty: totalQty, mergedDeviceName };
    }
    try { await DB.updateItems(first._id, firstItems); } catch (e) { alert('Merge failed: ' + e.message); return; }
    for (const order of linesWithItem.slice(1)) {
      const items = order.items.filter(i => !(i.category === cat && i.partCode === partCode && !i.emailed));
      try { await DB.updateItems(order._id, items); } catch (e) { console.error(e); }
    }
  },

  _orderCard(o) {
    const ts = o.submittedAt?.toDate ? fmtTime(o.submittedAt.toDate()) : fmtTime(o.submittedAt);
    const isPending = o.status === 'pending';
    const isSent    = o.status === 'sent';
    const items     = o.items || [];
    const isRejected = o.status === 'rejected';
    const statusLabel = isPending ? 'Pending review' : isSent ? 'Sent' : isRejected ? 'Rejected' : o.status;
    const statusClass = isPending ? 'status-pending' : isSent ? 'status-sent' : isRejected ? 'status-rejected' : 'status-pending';

    const allRows = items.map((item, idx) => `
      <div class="order-line ${item.emailed ? 'emailed' : ''}">
        <div class="order-line-info">
          <div class="order-line-name">${esc(item.description)}</div>
          <div class="order-line-code">${esc(item.partCode)}</div>
        </div>
        <div class="order-line-right">
          ${item.emailed
            ? `<span class="emailed-badge"><i class="ti ti-mail-check"></i> Emailed</span>
               <button class="btn-sm" data-reset-item="${o._id}" data-category="${esc(item.category)}" data-partcode="${esc(item.partCode)}"
                 style="font-size:10px;padding:2px 6px;color:var(--amber-text);border-color:var(--amber-text);background:var(--amber-bg)" title="Reset to pending so it can be re-emailed">
                 <i class="ti ti-refresh"></i>
               </button>`
            : isPending
              ? `<div class="qty-row">
                  <button class="qty-btn" data-qdec="${o._id}" data-idx="${idx}">−</button>
                  <input class="qty-edit" type="number" min="0" step="1" value="${item.qty}"
                    data-qchange="${o._id}" data-idx="${idx}" id="qinp-${o._id}-${idx}">
                  <button class="qty-btn" data-qinc="${o._id}" data-idx="${idx}">+</button>
                </div>`
              : `<span class="order-line-qty">× ${item.qty}</span>`}
          <span style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:6px">${esc(item.qtyType||'')}</span>
        </div>
      </div>`).join('');

    const pendingItems = items.filter(i => !i.emailed);
    const emailedItems = items.filter(i =>  i.emailed);
    const pendingCats  = [...new Set(pendingItems.map(i => i.category))];
    // Always show reject/delete for empty orders or rejected orders
    const catEmailBtns = isRejected ? `
      <span class="status-pill status-rejected"><i class="ti ti-ban"></i> Rejected</span>
      <button class="btn btn-outline" data-reset-order="${o._id}" style="margin-top:8px">
        <i class="ti ti-refresh"></i> Restore to pending
      </button>
      <button class="btn btn-outline" data-delete="${o._id}" style="margin-top:4px">
        <i class="ti ti-trash"></i> Delete record
      </button>` : isPending && pendingCats.length ? `
      <div style="margin-bottom:6px;font-size:12px;color:var(--text2)">Send email per category:</div>
      ${pendingCats.map(cat => `
        <button class="btn btn-green" data-cat-email="${esc(cat)}" style="margin-bottom:6px">
          <i class="ti ti-mail"></i> ${esc(cat)}
        </button>`).join('')}
      ${emailedItems.length > 0 ? `
        <button class="btn btn-outline" data-reset-order="${o._id}" style="margin-bottom:4px">
          <i class="ti ti-refresh"></i> Reset emailed items to pending
        </button>` : ''}
      <button class="btn btn-danger" data-reject-order="${o._id}" style="margin-top:2px">
        <i class="ti ti-ban"></i> Reject order
      </button>` : isPending && items.length === 0 ? `
      <button class="btn btn-danger" data-reject-order="${o._id}">
        <i class="ti ti-ban"></i> Reject order

      <button class="btn btn-outline" data-delete="${o._id}" style="margin-top:4px">

      <span class="status-pill" style="background:var(--red-bg);color:var(--red-text)"><i class="ti ti-ban"></i> Rejected</span>
      <button class="btn btn-outline" data-reset-order="${o._id}" style="margin-top:8px">
        <i class="ti ti-refresh"></i> Restore to pending
      </button>
      <button class="btn btn-outline" data-delete="${o._id}" style="margin-top:4px">
        <i class="ti ti-trash"></i> Delete record
      </button>` : '';

    return `<div class="order-card" id="card-${o._id}">
      <div class="order-card-header" data-card-id="${o._id}">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%">
          <div>
            <div class="order-ref-text">${esc(o.ref||o._id)}</div>
            <div class="order-meta">${ts}${o.deviceName ? ' · ' + esc(o.deviceName) : ''} · ${items.length} line${items.length!==1?'s':''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="status-pill ${statusClass}">${statusLabel}</span>
            <i class="ti ti-chevron-right chevron" id="chev-${o._id}"></i>
          </div>
        </div>
      </div>
      <div class="order-card-body" id="body-${o._id}">
        ${isPending ? '<div class="edit-note">Edit quantities before sending.</div>' : ''}
        ${allRows}
        <div class="order-card-actions">${catEmailBtns}</div>
      </div>
    </div>`;
  },

  toggleCard(id) {
    const body = document.getElementById(`body-${id}`);
    const chev = document.getElementById(`chev-${id}`);
    if (!body) return;
    const opening = !body.classList.contains('open');
    body.classList.toggle('open', opening);
    chev?.classList.toggle('open', opening);
    if (opening) this._openCards.add(id); else this._openCards.delete(id);
  },

  async stepQty(orderId, idx, delta) {
    const order = this.orders.find(o => o._id === orderId); if (!order) return;
    const items = [...order.items];
    const newQty = Math.max(0, (items[idx].qty||0) + delta);
    items[idx] = { ...items[idx], qty: newQty };
    const inp = document.getElementById(`qinp-${orderId}-${idx}`);
    if (inp) inp.value = newQty;
    try { await DB.updateItems(orderId, items); } catch(e) { alert('Update failed: '+e.message); }
  },

  async editQty(orderId, idx, val) {
    const order = this.orders.find(o => o._id === orderId); if (!order) return;
    const items = [...order.items];
    items[idx] = { ...items[idx], qty: Math.max(0, parseInt(val)||0) };
    try { await DB.updateItems(orderId, items); } catch(e) { alert('Update failed: '+e.message); }
  },

  async deleteOrder(id) {
    if (!confirm('Delete this order?')) return;
    try { await DB.deleteOrder(id); } catch(e) { alert('Delete failed: '+e.message); }
  },

  async resetItemEmailed(orderId, category, partCode) {
    try { await DB.resetItemEmailed(orderId, category, partCode); }
    catch(e) { alert('Reset failed: ' + e.message); }
  },

  async resetOrderToPending(orderId) {
    try { await DB.resetOrderToPending(orderId); }
    catch(e) { alert('Reset failed: ' + e.message); }
  },

  // ══════════════════════════════════════════
  // EMAIL
  // ══════════════════════════════════════════
  openCategoryEmail(category) {
    const pendingOrders = this.orders.filter(o => o.status === 'pending');
    // Collect all non-emailed items for this category across all orders
    // Merge items with same partCode into one line for the email
    const mergedItems = {};
    const orderIds = new Set();
    for (const order of pendingOrders) {
      for (const item of (order.items || [])) {
        if (item.emailed || item.category !== category) continue;
        // Respect local exclusions
        if (this.isExcluded(category, order._id, item.partCode)) continue;
        orderIds.add(order._id);
        // Respect local merges — use merged qty if set
        const mergeKey = `${category}|${item.partCode}`;
        const localMerge = this._combMerged.get(mergeKey);
        if (localMerge) {
          // Only add once (first occurrence), use local merged qty
          if (!mergedItems[item.partCode]) {
            mergedItems[item.partCode] = { ...item, qty: localMerge.qty };
          }
          continue;
        }
        if (!mergedItems[item.partCode]) {
          mergedItems[item.partCode] = { ...item, qty: 0 };
        }
        mergedItems[item.partCode].qty += item.qty;
      }
    }
    const items = Object.values(mergedItems);
    if (!items.length) { alert('No pending items for ' + category); return; }
    const { subject, body } = buildCategoryEmail(items, category, 'Material Order');
    const s = Settings.get();
    document.getElementById('email-panel-title').textContent = category;
    document.getElementById('email-to').value      = s.supplierEmail;
    document.getElementById('email-cc').value      = s.ccEmail;
    document.getElementById('email-subject').value = subject;
    document.getElementById('email-body').value    = body;
    this._pendingEmailMeta = { category, orderIds: [...orderIds] };
    this._noEmailCategory  = null;
    this.openPanel('email-panel');
  },

  async sendEmail() {
    const to      = document.getElementById('email-to').value.trim();
    const cc      = document.getElementById('email-cc').value.trim();
    const subject = document.getElementById('email-subject').value.trim();
    const body    = document.getElementById('email-body').value;

    if (this._pendingEmailMeta) {
      const { category, orderIds } = this._pendingEmailMeta;
      for (const id of orderIds) {
        try { await DB.markCategoryEmailed(id, category); } catch(e) { console.error(e); }
      }
      this._pendingEmailMeta = null;
    }

    // Clear new-order items for this category if applicable
    const nocat = this._noEmailCategory;
    if (nocat) {
      const cart = this._noEmailOrderType === 'consumables' ? this._noC : this._no;
      const mats  = this._noEmailOrderType === 'consumables' ? this.consumables : this.materials;
      if (nocat === '__all__') {
        cart._items = {};  // clear entire consumables cart
      } else {
        Object.keys(cart._items).forEach(id => {
          const m = mats.find(x => x.id == id);
          if (m && m.category === nocat) delete cart._items[id];
        });
      }
      this._noEmailCategory  = null;
      this._noEmailOrderType = null;
      this._updateNoBadge();
      this.renderNoList();
      this.renderNoType();
      this.orderRef = genRef();
    }

    this.closePanel('email-panel');

    const ow = document.getElementById('overlay-wrap');
    ow.innerHTML = `
      <div class="success-overlay">
        <div class="success-card">
          <div class="success-icon blue"><i class="ti ti-mail-forward"></i></div>
          <h3>Opening Outlook…</h3>
          <p>Outlook will open with the order pre-filled. Your email signature should appear automatically in your default account.</p>
          <button class="btn btn-primary" id="btn-done-email">Done</button>
        </div>
      </div>`;
    document.getElementById('btn-done-email').addEventListener('click', () => { ow.innerHTML = ''; });
    setTimeout(() => { openMailto(to, cc, subject, body); }, 300);
  },

  // Helpers — operate on whichever cart is active
  _cart()         { return this.activeType === 'consumables' ? this._noC : this._no; },
  _activeMats()   { return this.activeType === 'consumables' ? this.consumables : this.materials; },
  _orderType()    { return this.activeType === 'consumables' ? 'Consumables Order' : 'Material Order'; },

  noGet(id)       { return this._cart()._items[id]||0; },
  noSet(id,qty)   { if(qty<=0) delete this._cart()._items[id]; else this._cart()._items[id]=qty; },
  noAdj(id,d)     { this.noSet(id, this.noGet(id)+d); this._noChanged(); },
  noSetQty(id,v)  { this.noSet(id, parseInt(v)||0);   this._noChanged(); },
  noQuickAdd(id)  { if(!this.noGet(id)) this.noSet(id,1); this._noChanged(); },
  noZero(id)      { delete this._cart()._items[id]; this._noChanged(); },
  noRevAdj(id,d)  { this.noAdj(id,d); },
  noRevSet(id,v)  { this.noSetQty(id,v); },
  noCount()       { return Object.keys(this._cart()._items).length; },
  noItems()       {
    const cart = this._cart();
    const mats  = this._activeMats();
    return Object.keys(cart._items).map(id => {
      const m = mats.find(x => x.id == id);
      return m ? { ...m, qty: cart._items[id] } : null;
    }).filter(Boolean);
  },

    this._updateNoBadge(); this.renderNoList();

  _updateNoBadge() {

  // ══════════════════════════════════════════
  // STOCK TAB
  // ══════════════════════════════════════════
  startStockListening() {
    if (this._unsubStock) this._unsubStock();
    this._unsubStock = DB.listenStock(records => {
      this._stock = records;
      this.renderStockList();
      this._updateStockBadge();
    });
  },

  // Returns the stock record for a given stockId, or null
  _stockFor(sid) { return this._stock.find(r => r._id === sid) || null; },

  // Classify a tracked item: 'ok' | 'warning' | 'critical' | 'zero'
  _stockStatus(rec) {
    if (!rec || !rec.tracked) return 'untracked';
    const qty = rec.qty || 0;
    if (qty <= 0) return 'zero';
    if (rec.warningQty > 0 && qty <= rec.warningQty) return qty <= (rec.reorderQty||0) ? 'critical' : 'warning';
    return 'ok';
  },

  _updateStockBadge() {
    const low = this.consumables.filter(m => {
      const rec = this._stockFor(stockId(m));
      if (!rec || !rec.tracked) return false;
      return rec.warningQty > 0 && (rec.qty||0) <= rec.warningQty;
    }).length;
    const badge = document.getElementById('stock-low-badge');
    if (badge) { badge.textContent = low; badge.classList.toggle('zero', low === 0); }
    const banner = document.getElementById('stock-low-banner');
    const bannerText = document.getElementById('stock-low-text');
    if (banner && bannerText) {
      banner.style.display = low > 0 ? 'flex' : 'none';
      bannerText.textContent = `${low} item${low!==1?'s':''} at or below warning quantity`;
    }
  },

  renderStockList() {
    const list = document.getElementById('stock-list'); if (!list) return;
    const q = (document.getElementById('stock-search')?.value || '').toLowerCase();
    let items = [...this.consumables];
    if (q) items = items.filter(m => m.description.toLowerCase().includes(q) || m.partCode.toLowerCase().includes(q));

    // Sort: critical → warning → zero → ok → untracked
    const order = { critical:0, warning:1, zero:2, ok:3, untracked:4 };
    items.sort((a, b) => {
      const ra = this._stockFor(stockId(a)), rb = this._stockFor(stockId(b));
      const sa = this._stockStatus(ra), sb = this._stockStatus(rb);
      return (order[sa]??4) - (order[sb]??4) || a.description.localeCompare(b.description);
    });

    if (!items.length) { list.innerHTML = `<div class="empty-state"><i class="ti ti-package-off"></i><p>No consumables found.</p></div>`; return; }

    // Group by tracked / untracked with section headers
    const tracked   = items.filter(m => { const r=this._stockFor(stockId(m)); return r?.tracked; });
    const untracked = items.filter(m => { const r=this._stockFor(stockId(m)); return !r?.tracked; });

    let html = '';
    if (tracked.length) {
      html += `<div class="stock-section-header">Tracked (${tracked.length})</div>`;
      html += tracked.map(m => this._stockCard(m)).join('');
    }
    if (untracked.length) {
      html += `<div class="stock-section-header" style="margin-top:8px">Not yet tracked (${untracked.length})</div>`;
      html += untracked.map(m => this._stockCard(m)).join('');
    }
    list.innerHTML = html;

    // Re-apply open state
    for (const sid of this._openStockCards) {
      const body = document.getElementById(`stock-body-${sid}`);
      const chev = document.getElementById(`stock-chev-${sid}`);
      if (body) { body.classList.add('open'); chev?.classList.add('open'); }
    }
  },

  _stockCard(m) {
    const sid  = stockId(m);
    const rec  = this._stockFor(sid);
    const tracked = rec?.tracked || false;
    const status  = this._stockStatus(rec);
    const qty     = rec?.qty ?? 0;
    const ci      = CAT_ICONS[m.category] || CAT_ICONS.default;
    const showCode = m.partCode && !Data.isDummyCode(m.partCode);
    const isOpen  = this._openStockCards.has(sid);

    const badgeClass = status === 'ok' ? '' : status === 'zero' ? ' zero' : status === 'warning' ? ' warning' : status === 'critical' ? ' critical' : ' zero';
    const cardClass  = status === 'untracked' ? ' untracked' : status === 'warning' ? ' warning' : status === 'critical' ? ' critical' : status === 'zero' ? ' zero' : '';

    const qtyBadge = tracked
      ? `<span class="stock-qty-badge${badgeClass}">${qty} ${esc(m.qtyType||'')}</span>`
      : `<span style="font-size:11px;color:var(--text3);font-family:var(--mono)">Not tracked</span>`;

    const body = tracked ? `
      <div class="stock-card-body" id="stock-body-${esc(sid)}">
        <div class="stock-actions">
          <div class="stock-action-row">
            <span class="stock-action-label">Add stock</span>
            <input class="stock-delta-input" type="number" min="1" step="1" placeholder="Qty" id="si-intake-${esc(sid)}">
            <button class="btn-sm btn-sm-save" data-stock-intake="${esc(sid)}" style="font-size:11px"><i class="ti ti-plus"></i> Intake</button>
            <button class="btn-sm" data-stock-hist="${esc(sid)}" data-stock-name="${esc(m.description)}" style="font-size:11px;margin-left:auto"><i class="ti ti-history"></i></button>
          </div>
          <div class="stock-action-row">
            <span class="stock-action-label">Set absolute</span>
            <input class="stock-delta-input" type="number" min="0" step="1" placeholder="Qty" id="si-set-${esc(sid)}">
            <button class="btn-sm" data-stock-set="${esc(sid)}" style="font-size:11px"><i class="ti ti-pencil"></i> Override</button>
          </div>
          <div class="stock-threshold-row">
            <span class="stock-threshold-label">Warning ≤</span>
            <input class="stock-threshold-input" type="number" min="0" step="1" value="${rec?.warningQty||0}" id="si-warn-${esc(sid)}">
            <span class="stock-threshold-label" style="margin-left:8px">Reorder ≤</span>
            <input class="stock-threshold-input" type="number" min="0" step="1" value="${rec?.reorderQty||0}" id="si-reorder-${esc(sid)}">
            <button class="btn-sm btn-sm-save" data-stock-thresh="${esc(sid)}" style="font-size:11px;margin-left:auto">Save</button>
          </div>
          <div class="stock-action-row" style="border-top:1px solid var(--border);padding-top:8px;margin-top:2px">
            <button class="btn-sm btn-sm-danger" data-stock-disable="${esc(sid)}" style="font-size:11px;margin-left:auto">Disable tracking</button>
          </div>
        </div>
      </div>` : `
      <div class="stock-card-body" id="stock-body-${esc(sid)}">
        <div class="stock-actions">
          <div class="stock-action-row">
            <span style="font-size:12px;color:var(--text2);flex:1">Enable tracking to manage stock levels for this item.</span>
            <input class="stock-delta-input" type="number" min="0" step="1" placeholder="Initial qty" id="si-init-${esc(sid)}" style="width:80px">
            <button class="btn-sm btn-sm-save" data-stock-enable="${esc(sid)}" style="font-size:11px"><i class="ti ti-check"></i> Enable</button>
          </div>
        </div>
      </div>`;

    return `<div class="stock-card${cardClass}" id="stock-card-${esc(sid)}">
      <div class="stock-card-header" data-stock-hdr="${esc(sid)}">
        <div class="stock-card-icon" style="background:${ci.bg}"><i class="ti ${ci.icon}" style="color:${ci.color}"></i></div>
        <div class="stock-card-info">
          <div class="stock-card-name">${esc(m.description)}</div>
          <div class="stock-card-meta">${showCode ? esc(m.partCode)+' · ' : ''}${esc(m.category)} · ${esc(m.subcategory)}</div>
        </div>
        ${qtyBadge}
        <i class="ti ti-chevron-right chevron ${isOpen?'open':''}" id="stock-chev-${esc(sid)}"></i>
      </div>
      ${body}
    </div>`;
  },

  toggleStockCard(sid) {
    const body = document.getElementById(`stock-body-${sid}`);
    const chev = document.getElementById(`stock-chev-${sid}`);
    if (!body) return;
    const opening = !body.classList.contains('open');
    body.classList.toggle('open', opening);
    chev?.classList.toggle('open', opening);
    if (opening) this._openStockCards.add(sid); else this._openStockCards.delete(sid);
  },

  async stockEnable(sid) {
    const initEl = document.getElementById(`si-init-${sid}`);
    const initQty = parseInt(initEl?.value || '0') || 0;
    try {
      await DB.enableTracking(sid, initQty);
      if (initQty > 0) {
        const item = this.consumables.find(m => stockId(m) === sid);
        const s = Settings.get();
        const by = (s.managerName || 'Manager').trim() || 'Manager';
        await DB.adjustStock(sid, item?.description || sid, initQty, 'intake', by);
      }
    } catch(e) { alert('Failed to enable tracking: ' + e.message); }
  },

  async stockDisable(sid) {
    await new Promise(r => setTimeout(r, 0));
    if (!confirm('Disable tracking for this item? Stock history will be preserved.')) return;
    try { await DB.disableTracking(sid); } catch(e) { alert('Failed: ' + e.message); }
  },

  async stockIntake(sid) {
    const el = document.getElementById(`si-intake-${sid}`);
    const delta = parseInt(el?.value || '0');
    if (!delta || delta <= 0) { alert('Enter a quantity to add.'); return; }
    const item = this.consumables.find(m => stockId(m) === sid);
    const s = Settings.get();
    const by = (s.managerName || 'Manager').trim() || 'Manager';
    try {
      await DB.adjustStock(sid, item?.description || sid, delta, 'intake', by);
      if (el) el.value = '';
    } catch(e) { alert('Intake failed: ' + e.message); }
  },

  async stockSetAbsolute(sid) {
    const el = document.getElementById(`si-set-${sid}`);
    const newQty = parseInt(el?.value ?? '');
    if (isNaN(newQty) || newQty < 0) { alert('Enter a valid quantity.'); return; }
    await new Promise(r => setTimeout(r, 0));
    if (!confirm(`Set stock to ${newQty}?`)) return;
    const item = this.consumables.find(m => stockId(m) === sid);
    const s = Settings.get();
    const by = (s.managerName || 'Manager').trim() || 'Manager';
    try {
      await DB.setStock(sid, item?.description || sid, newQty, by);
      if (el) el.value = '';
    } catch(e) { alert('Override failed: ' + e.message); }
  },

  async stockSaveThresholds(sid) {
    const warnEl   = document.getElementById(`si-warn-${sid}`);
    const reordEl  = document.getElementById(`si-reorder-${sid}`);
    const warnQty  = parseInt(warnEl?.value  || '0') || 0;
    const reordQty = parseInt(reordEl?.value || '0') || 0;
    try {
      await DB.updateThresholds(sid, reordQty, warnQty);
      const btn = document.querySelector(`[data-stock-thresh="${sid}"]`);
      if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => btn.textContent = 'Save', 1500); }
    } catch(e) { alert('Failed to save thresholds: ' + e.message); }
  },

  stockOpenHistory(sid, itemName) {
    this._historyFilter = { stockId: sid, itemName };
    this._historyRecords = [];
    this._historyLastDoc = null;
    this.renderHistoryFilter();
    this.setMainTab('history');
    this._loadHistory();
  },

  // ══════════════════════════════════════════
  // HISTORY TAB
  // ══════════════════════════════════════════
  renderHistoryFilter() {
    const chip  = document.getElementById('history-clear-filter');
    const label = document.getElementById('history-filter-label');
    const all   = document.getElementById('history-filter-all');
    if (!chip || !label || !all) return;
    if (this._historyFilter) {
      chip.style.display = 'flex';
      label.textContent  = this._historyFilter.itemName || this._historyFilter.stockId;
      all.style.display  = 'none';
    } else {
      chip.style.display = 'none';
      all.style.display  = 'inline';
    }
  },

  async _loadHistory(append) {
    if (this._historyLoading) return;
    this._historyLoading = true;
    const list = document.getElementById('history-list'); if (!list) { this._historyLoading=false; return; }
    if (!append) {
      this._historyRecords = [];
      this._historyLastDoc = null;
      list.innerHTML = `<div class="empty-state"><i class="ti ti-loader" style="animation:spin 1s linear infinite"></i><p>Loading…</p></div>`;
    }
    try {
      const { records, lastDoc, hasMore } = await DB.fetchHistory(
        this._historyFilter?.stockId || null, 50, append ? this._historyLastDoc : null
      );
      if (append) this._historyRecords.push(...records);
      else        this._historyRecords = records;
      this._historyLastDoc = lastDoc;
      this._historyHasMore = hasMore;
      this.renderHistoryList();
    } catch(e) {
      if (list) list.innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><p>Failed to load history: ${esc(e.message)}</p></div>`;
    } finally { this._historyLoading = false; }
  },

  renderHistoryList() {
    const list = document.getElementById('history-list'); if (!list) return;
    if (!this._historyRecords.length) {
      list.innerHTML = `<div class="empty-state"><i class="ti ti-history"></i><p>No history yet.</p></div>`;
      return;
    }
    const rows = this._historyRecords.map(r => {
      const ts     = r.timestamp?.toDate ? fmtTime(r.timestamp.toDate()) : fmtTime(r.timestamp);
      const delta  = r.delta >= 0 ? `+${r.delta}` : `${r.delta}`;
      const dClass = r.delta >= 0 ? 'positive' : 'negative';
      const action = r.action || 'adjustment';
      return `<div class="history-row">
        <span class="history-action-pill ${action}">${action}</span>
        <span class="history-delta ${dClass}">${delta}</span>
        <div style="flex:1;min-width:0">
          <div class="history-item-name">${esc(r.itemName||r.stockId||'')}</div>
          <div class="history-meta">${esc(r.by||'')}${ts ? ' · '+ts : ''} · now: ${r.newQty??'?'}</div>
        </div>
      </div>`;
    }).join('');
    const moreBtn = this._historyHasMore
      ? `<div style="padding:12px;text-align:center"><button class="btn-sm" data-hist-more="1">Load more</button></div>`
      : '';
    list.innerHTML = rows + moreBtn;
  },

  // ══════════════════════════════════════════
  // SETTINGS
  // ══════════════════════════════════════════
  _populateSettings() {
    const s = Settings.get();
    const el = document.getElementById('settings-body'); if (!el) return;
    el.innerHTML = `
      <div class="settings-section">
        <div class="settings-label">Manager</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">Manager name</div><div class="settings-row-sub">Used as device name on orders added to queue</div></div>
            <input type="text" id="s-manager-name" value="${esc(s.managerName||'Manager')}" placeholder="Manager">
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Email</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">To (purchasing)</div><div class="settings-row-sub">Auto-filled in To: field</div></div>
            <input type="email" id="s-supplier" value="${esc(s.supplierEmail)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">CC email</div><div class="settings-row-sub">Always CC'd</div></div>
            <input type="email" id="s-cc" value="${esc(s.ccEmail)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Subject template</div><div class="settings-row-sub">{category} {date} available</div></div>
            <input type="text" id="s-subject" value="${esc(s.emailSubject||DEFAULT_SETTINGS.emailSubject)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Bulk consumables subject</div><div class="settings-row-sub">Used when emailing all consumables at once</div></div>
            <input type="text" id="s-bulk-subject" value="${esc(s.bulkConsumablesSubject||DEFAULT_SETTINGS.bulkConsumablesSubject)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Closing note</div><div class="settings-row-sub">Added after items</div></div>
            <input type="text" id="s-delivery" value="${esc(s.deliveryNote)}">
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Email signature</div>
        <div class="settings-card">
          <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:8px">
            <div class="settings-row-sub">
              Appended to every email body. Use this to include your sign-off since Outlook Classic does not auto-insert signatures into mailto-generated emails.
            </div>
            <textarea id="s-signature" rows="5"
              style="width:100%;border:1px solid var(--border);background:var(--bg);border-radius:var(--radius);
              padding:8px 10px;font-size:13px;color:var(--text);font-family:var(--font);line-height:1.6;
              resize:vertical;outline:none" placeholder="Kind regards,&#10;Your Name&#10;Your Company">${esc(s.emailSignature||'')}</textarea>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Email template</div>
        <div class="settings-card">
          <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:8px">
            <div class="settings-row-sub">
              Placeholders:
              <code style="font-family:var(--mono);font-size:11px;background:var(--bg2);padding:1px 4px;border-radius:3px">{orderType}</code>
              <code style="font-family:var(--mono);font-size:11px;background:var(--bg2);padding:1px 4px;border-radius:3px">{date}</code>
              <code style="font-family:var(--mono);font-size:11px;background:var(--bg2);padding:1px 4px;border-radius:3px">{category}</code>
              <code style="font-family:var(--mono);font-size:11px;background:var(--bg2);padding:1px 4px;border-radius:3px">{items}</code>
              <code style="font-family:var(--mono);font-size:11px;background:var(--bg2);padding:1px 4px;border-radius:3px">{closingNote}</code>
              — all work in subject and body. <code style="font-family:var(--mono);font-size:11px;background:var(--bg2);padding:1px 4px;border-radius:3px">{orderType}</code> resolves to "Material Order" or "Consumables Order" automatically.
            </div>
            <textarea id="s-template" rows="10"
              style="width:100%;border:1px solid var(--border);background:var(--bg);border-radius:var(--radius);
              padding:8px 10px;font-size:12px;color:var(--text);font-family:var(--mono);line-height:1.6;
              resize:vertical;outline:none">${esc(s.emailTemplate||DEFAULT_SETTINGS.emailTemplate)}</textarea>
            <button class="btn-sm" id="btn-reset-template" style="align-self:flex-end">Reset to default</button>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Materials catalogue</div>
        <div class="settings-card">
          <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:6px">
            <div class="settings-row-sub">Edit <strong>materials.csv</strong> in GitHub and commit. Both devices reload automatically.</div>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Connection</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">Firebase config</div><div class="settings-row-sub">Clear to re-enter</div></div>
            <button class="btn-sm btn-sm-danger" id="btn-clear-firebase">Clear</button>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Testing</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">Clear all orders</div><div class="settings-row-sub">Permanently deletes all orders from Firebase</div></div>
            <button class="btn-sm btn-sm-danger" id="btn-clear-orders">Clear all</button>
          </div>
        </div>
      </div>`;

    document.getElementById('btn-clear-firebase').addEventListener('click', () => this.clearFirebase());
    document.getElementById('btn-reset-template').addEventListener('click', () => {
      const ta = document.getElementById('s-template'); if (ta) ta.value = DEFAULT_SETTINGS.emailTemplate;
    });
    document.getElementById('btn-clear-orders').addEventListener('click', async () => {
      if (!confirm('Delete ALL orders from Firebase? This cannot be undone.')) return;
      try { await DB.deleteAllOrders(); alert('All orders cleared.'); } catch(e) { alert('Failed: '+e.message); }
    });
  },

  saveSettings() {
    Settings.save({
      managerName:            document.getElementById('s-manager-name')?.value.trim(),
      supplierEmail:          document.getElementById('s-supplier')?.value.trim(),
      ccEmail:                document.getElementById('s-cc')?.value.trim(),
      emailSubject:           document.getElementById('s-subject')?.value.trim(),
      bulkConsumablesSubject: document.getElementById('s-bulk-subject')?.value.trim(),
      deliveryNote:           document.getElementById('s-delivery')?.value.trim(),
      emailSignature:         document.getElementById('s-signature')?.value,
      emailTemplate:          document.getElementById('s-template')?.value,
    });
    const btn = document.getElementById('btn-save-settings');
    if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => btn.textContent = 'Save', 1500); }
  },

  clearFirebase() {
    if (!confirm('Clear Firebase config?')) return;
    FirebaseConfig.clear(); location.reload();
  },
};

document.addEventListener('DOMContentLoaded', () => Manager.init());
</script>
</body>
</html>
