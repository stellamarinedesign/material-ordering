<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Material Orders — Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Qty controls inside order cards */
    .qty-row { display:flex; align-items:center; }
    .qty-row .qty-btn {
      width:28px; height:28px; font-size:15px;
      background:var(--bg); border:1px solid var(--border); color:var(--text);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .qty-row .qty-btn:first-child { border-radius:var(--radius) 0 0 var(--radius); }
    .qty-row .qty-btn:last-child  { border-radius:0 var(--radius) var(--radius) 0; border-left:none; }
    .qty-row .qty-edit {
      width:44px; height:28px;
      border:1px solid var(--border); border-left:none; border-right:none;
      background:var(--surface); font-size:12px; font-family:var(--mono);
      text-align:center; outline:none; color:var(--text);
      -moz-appearance:textfield;
    }
    .qty-row .qty-edit::-webkit-inner-spin-button,
    .qty-row .qty-edit::-webkit-outer-spin-button { -webkit-appearance:none; }

    /* Bin button for new order tab */
    .mat-bin {
      width:30px; height:32px; display:flex; align-items:center; justify-content:center;
      background:none; border:none; color:var(--red-text); font-size:15px;
      opacity:0; pointer-events:none; transition:opacity 0.15s; flex-shrink:0;
    }
    .mat-card.in-order .mat-bin { opacity:1; pointer-events:auto; }

    /* Active main tab indicator */
    .main-tab { padding:11px 18px; font-size:13px; font-weight:500; color:var(--text3);
      border-bottom:2px solid transparent; background:none;
      border-top:none; border-left:none; border-right:none; cursor:pointer; white-space:nowrap; }
    .main-tab.active { color:var(--text); border-bottom-color:#1e3a5f; }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/shared.js"></script>
<script src="js/firebase-sync.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister()));
}

const Manager = {
  // ── Order queue state ──
  orders:        [],
  activeView:    'pending',
  unsubscribe:   null,
  _openCards:    new Set(),
  _emailOrderId: null,

  // ── New order (manager direct order) state ──
  mainTab:       'queue',   // 'queue' | 'new-order'
  materials:     [],
  activeCat:     null,
  activeSub:     null,
  orderRef:      '',
  _cats:         [],
  _subs:         [],

  async init() {
    const cfg = FirebaseConfig.get();
    if (!cfg) { this.showSetup(); return; }
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Could not connect. Check your Firebase config.'); return; }
    this.materials = await Data.load('./materials.csv');
    this.orderRef  = genRef();
    this.renderShell();
    this.startListening();
  },

  showSetup(err) {
    document.getElementById('root').innerHTML = `
      <div class="setup-screen">
        <div class="setup-card">
          <h2><i class="ti ti-flame" style="color:#ea580c;vertical-align:-2px"></i> Connect to Firebase</h2>
          <p>Enter your Firebase project config to receive orders from the iPad.</p>
          ${err ? `<div style="background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);
            padding:10px 12px;font-size:13px;margin-bottom:12px">${esc(err)}</div>` : ''}
          <div class="setup-field"><label>API Key</label><input id="cfg-apiKey" autocomplete="off" placeholder="AIzaSy..."></div>
          <div class="setup-field"><label>Project ID</label><input id="cfg-projectId" autocomplete="off" placeholder="my-project-id"></div>
          <div class="setup-field"><label>App ID</label><input id="cfg-appId" autocomplete="off" placeholder="1:123456:web:abc..."></div>
          <button id="btn-connect" class="btn btn-primary" style="margin-top:8px">
            <i class="ti ti-plug"></i> Connect
          </button>
          <div class="setup-note" style="margin-top:14px">Same config as the iPad. See README.md.</div>
        </div>
      </div>`;
    document.getElementById('btn-connect').addEventListener('click', () => this.saveConfig());
  },

  async saveConfig() {
    const apiKey    = document.getElementById('cfg-apiKey').value.trim();
    const projectId = document.getElementById('cfg-projectId').value.trim();
    const appId     = document.getElementById('cfg-appId').value.trim();
    if (!apiKey || !projectId || !appId) { alert('Please fill in all fields.'); return; }
    const cfg = { apiKey, projectId, appId,
      authDomain:`${projectId}.firebaseapp.com`,
      storageBucket:`${projectId}.appspot.com`,
      messagingSenderId:'000000000000' };
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Connection failed. Double-check your config values.'); return; }
    FirebaseConfig.save(cfg);
    this.materials = await Data.load('./materials.csv');
    this.orderRef  = genRef();
    this.renderShell();
    this.startListening();
  },

  // ══════════════════════════════════════════════════════
  // SHELL — rendered once, all listeners attached here
  // ══════════════════════════════════════════════════════
  renderShell() {
    document.getElementById('root').innerHTML = `
      <div class="app-root manager-root" id="app-root">

        <!-- HEADER -->
        <div class="header manager-hdr">
          <div class="col"><div class="header-inner">
            <div class="header-left">
              <div class="header-title">Material Orders — Manager</div>
              <div class="header-ref"><span class="live-dot"></span>Live</div>
            </div>
            <div class="header-actions">
              <span class="role-pill">Production Manager</span>
              <button class="icon-btn" id="btn-settings" title="Settings">
                <i class="ti ti-settings"></i>
              </button>
            </div>
          </div></div>
        </div>

        <!-- MAIN TABS: Order Queue | New Order -->
        <div style="background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0">
          <div class="col" style="padding-left:0;padding-right:0">
            <div style="display:flex;overflow-x:auto;scrollbar-width:none">
              <button class="main-tab active" id="main-tab-queue">
                <i class="ti ti-inbox" style="margin-right:5px"></i>Order Queue
                <span class="sidebar-count zero" id="queue-pending-badge" style="margin-left:5px">0</span>
              </button>
              <button class="main-tab" id="main-tab-new">
                <i class="ti ti-plus" style="margin-right:5px"></i>New Order
                <span class="order-badge" id="new-order-badge"
                  style="display:none;position:relative;top:0;right:0;margin-left:5px;
                  background:#ef4444;color:#fff;border-radius:50%;width:17px;height:17px;
                  font-size:10px;font-weight:600;align-items:center;justify-content:center;
                  border:none">0</span>
              </button>
            </div>
          </div>
        </div>

        <!-- QUEUE VIEW -->
        <div id="view-queue" class="manager-body" style="flex:1;overflow:hidden">

          <!-- Mobile sub-tabs for queue filter -->
          <div class="mobile-tabs" id="mobile-tabs">
            <button class="tab active" data-view="pending">
              Pending <span class="sidebar-count zero" id="mob-pending-count" style="margin-left:4px">0</span>
            </button>
            <button class="tab" data-view="sent">Sent</button>
            <button class="tab" data-view="all">All</button>
          </div>

          <div class="manager-sidebar">
            <div class="sidebar-section">
              <div class="sidebar-title">Orders</div>
              <button class="sidebar-btn active" data-sb="pending">
                <i class="ti ti-clock"></i> Pending
                <span class="sidebar-count zero" id="pending-count">0</span>
              </button>
              <button class="sidebar-btn" data-sb="sent">
                <i class="ti ti-mail-check"></i> Sent
              </button>
              <button class="sidebar-btn" data-sb="all">
                <i class="ti ti-list"></i> All
              </button>
            </div>
            <div class="sidebar-section">
              <div class="sidebar-title">Settings</div>
              <button class="sidebar-btn" id="sb-settings">
                <i class="ti ti-adjustments"></i> Email &amp; preferences
              </button>
              <button class="sidebar-btn" id="sb-reset">
                <i class="ti ti-plug-x"></i> Reset connection
              </button>
            </div>
          </div>

          <div class="manager-main">
            <div class="order-queue" id="order-queue"></div>
          </div>
        </div>

        <!-- NEW ORDER VIEW (hidden initially) -->
        <div id="view-new-order" style="display:none;flex:1;flex-direction:column;overflow:hidden">
          <div id="no-tabs-wrap"></div>
          <div class="search-bar">
            <div class="col"><div class="search-wrap">
              <i class="ti ti-search"></i>
              <input type="search" id="no-search" placeholder="Search part code or description…" autocomplete="off">
            </div></div>
          </div>
          <div class="app-scroll" id="no-scroll">
            <div class="col">
              <div class="mat-list" id="no-mat-list"></div>
            </div>
          </div>
        </div>

        <!-- ── PANELS (all inside app-root) ── -->

        <!-- EMAIL PANEL -->
        <div class="panel" id="email-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-email">
              <i class="ti ti-chevron-left"></i> Back
            </button>
            <div class="panel-title">Order Email</div>
            <button class="btn-green btn" id="btn-send-email" style="width:auto;padding:7px 14px;font-size:13px">
              <i class="ti ti-send"></i> Send
            </button>
          </div>
          <div class="email-fields">
            <div class="email-field"><label>To</label><input type="email" id="email-to"></div>
            <div class="email-field"><label>CC</label><input type="email" id="email-cc"></div>
            <div class="email-field"><label>Subject</label><input type="text" id="email-subject"></div>
          </div>
          <div class="email-body-wrap"><textarea id="email-body"></textarea></div>
        </div>

        <!-- ORDER REVIEW PANEL (manager new order) -->
        <div class="panel" id="no-review-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-no-review">
              <i class="ti ti-chevron-left"></i> Back
            </button>
            <div class="panel-title">Order Confirmation</div>
            <div class="panel-spacer"></div>
          </div>
          <div class="panel-scroll">
            <div class="panel-col" id="no-review-contents"></div>
          </div>
          <div class="action-bar"><div class="action-bar-inner">
            <button class="btn btn-green" id="btn-no-email">
              <i class="ti ti-mail"></i> Compose email
            </button>
            <button class="btn btn-danger" id="btn-no-clear">
              <i class="ti ti-x"></i> Clear order
            </button>
          </div></div>
        </div>

        <!-- SETTINGS PANEL -->
        <div class="panel" id="settings-panel">
          <div class="panel-header">
            <button class="back-btn" id="btn-close-settings">
              <i class="ti ti-chevron-left"></i> Back
            </button>
            <div class="panel-title">Settings</div>
            <button class="btn-sm btn-sm-save" id="btn-save-settings">Save</button>
          </div>
          <div class="panel-scroll">
            <div class="panel-col" style="gap:20px" id="settings-body"></div>
          </div>
        </div>

      </div>
      <div id="overlay-wrap"></div>`;

    // ── ALL LISTENERS ATTACHED ONCE ──

    // Header / settings
    document.getElementById('btn-settings')      .addEventListener('click', () => this.openPanel('settings-panel'));
    document.getElementById('sb-settings')       .addEventListener('click', () => this.openPanel('settings-panel'));
    document.getElementById('sb-reset')          .addEventListener('click', () => this.clearFirebase());
    document.getElementById('btn-close-settings').addEventListener('click', () => this.closePanel('settings-panel'));
    document.getElementById('btn-save-settings') .addEventListener('click', () => this.saveSettings());

    // Email panel
    document.getElementById('btn-close-email') .addEventListener('click', () => this.closePanel('email-panel'));
    document.getElementById('btn-send-email')  .addEventListener('click', () => this.sendEmail());

    // Main tabs
    document.getElementById('main-tab-queue').addEventListener('click', () => this.setMainTab('queue'));
    document.getElementById('main-tab-new')  .addEventListener('click', () => this.setMainTab('new-order'));

    // Queue view/filter buttons
    document.querySelectorAll('[data-sb]').forEach(btn =>
      btn.addEventListener('click', () => this.setView(btn.dataset.sb))
    );
    document.getElementById('mobile-tabs').addEventListener('click', e => {
      const btn = e.target.closest('[data-view]');
      if (btn) this.setView(btn.dataset.view);
    });

    // Order queue — single permanent delegated listener
    const queue = document.getElementById('order-queue');
    queue.addEventListener('click', e => {
      const dec     = e.target.closest('[data-qdec]');
      const inc     = e.target.closest('[data-qinc]');
      const approve = e.target.closest('[data-approve]');
      const del     = e.target.closest('[data-delete]');
      const header  = e.target.closest('.order-card-header');
      if (dec)     { e.stopPropagation(); this.stepQty(dec.dataset.qdec,  +dec.dataset.idx,    -1); return; }
      if (inc)     { e.stopPropagation(); this.stepQty(inc.dataset.qinc,  +inc.dataset.idx,     1); return; }
      if (approve) { e.stopPropagation(); this.prepareEmail(approve.dataset.approve);               return; }
      if (del)     { e.stopPropagation(); this.deleteOrder(del.dataset.delete);                     return; }
      if (header)  { this.toggleCard(header.dataset.cardId); }
    });
    queue.addEventListener('change', e => {
      const inp = e.target.closest('[data-qchange]');
      if (inp) { e.stopPropagation(); this.editQty(inp.dataset.qchange, +inp.dataset.idx, inp.value); }
    });

    // New order — tabs-wrap (permanent wrapper, renderNoTabs only sets innerHTML)
    document.getElementById('no-tabs-wrap').addEventListener('click', e => {
      const catBtn = e.target.closest('[data-cat-idx]');
      const subBtn = e.target.closest('[data-sub-idx]');
      if (catBtn) { const i = +catBtn.dataset.catIdx; this.noSetCat(i === -1 ? null : this._cats[i]); }
      else if (subBtn) { const i = +subBtn.dataset.subIdx; this.noSetSub(i === -1 ? null : this._subs[i]); }
    });

    // New order — mat list (permanent element)
    document.getElementById('no-mat-list').addEventListener('click', e => {
      const dec = e.target.closest('[data-dec]');
      const inc = e.target.closest('[data-inc]');
      const add = e.target.closest('[data-add]');
      const bin = e.target.closest('[data-bin]');
      if (dec) { e.stopPropagation(); this.noAdj(+dec.dataset.dec, -1); }
      if (inc) { e.stopPropagation(); this.noAdj(+inc.dataset.inc,  1); }
      if (add) { e.stopPropagation(); this.noQuickAdd(+add.dataset.add); }
      if (bin) { e.stopPropagation(); this.noZero(+bin.dataset.bin); }
    });
    document.getElementById('no-mat-list').addEventListener('change', e => {
      const inp = e.target.closest('[data-qid]');
      if (inp) this.noSetQty(+inp.dataset.qid, inp.value);
    });

    // New order search
    document.getElementById('no-search').addEventListener('input', () => this.renderNoList());

    // New order review panel
    document.getElementById('btn-close-no-review').addEventListener('click', () => this.closePanel('no-review-panel'));
    document.getElementById('btn-no-email')       .addEventListener('click', () => this.noComposeEmail());
    document.getElementById('btn-no-clear')       .addEventListener('click', () => this.noClearOrder());

    // New order review contents (permanent element)
    document.getElementById('no-review-contents').addEventListener('click', e => {
      const dec = e.target.closest('[data-rdec]');
      const inc = e.target.closest('[data-rinc]');
      const rem = e.target.closest('[data-rrem]');
      if (dec) this.noRevAdj(+dec.dataset.rdec, -1);
      if (inc) this.noRevAdj(+inc.dataset.rinc,  1);
      if (rem) this.noRemove(+rem.dataset.rrem);
    });
    document.getElementById('no-review-contents').addEventListener('change', e => {
      const inp = e.target.closest('[data-rqid]');
      if (inp) this.noRevSet(+inp.dataset.rqid, inp.value);
    });

    this._populateSettings();
    this.renderQueue();
    this.renderNoTabs();
    this.renderNoList();
  },

  // ══════════════════════════════════════════════════════
  // MAIN TAB SWITCHING
  // ══════════════════════════════════════════════════════
  setMainTab(tab) {
    this.mainTab = tab;
    const isQueue = tab === 'queue';
    document.getElementById('view-queue')    .style.display = isQueue ? 'flex'  : 'none';
    document.getElementById('view-new-order').style.display = isQueue ? 'none'  : 'flex';
    document.getElementById('main-tab-queue').classList.toggle('active',  isQueue);
    document.getElementById('main-tab-new')  .classList.toggle('active', !isQueue);
  },

  // ══════════════════════════════════════════════════════
  // QUEUE VIEW
  // ══════════════════════════════════════════════════════
  setView(v) {
    this.activeView = v;
    document.querySelectorAll('[data-sb]').forEach(b =>
      b.classList.toggle('active', b.dataset.sb === v));
    document.querySelectorAll('#mobile-tabs [data-view]').forEach(b =>
      b.classList.toggle('active', b.dataset.view === v));
    this.renderQueue();
  },

  startListening() {
    if (this.unsubscribe) this.unsubscribe();
    this.unsubscribe = DB.listenOrders(orders => {
      this.orders = orders;
      const n = orders.filter(o => o.status === 'pending').length;
      ['pending-count','mob-pending-count','queue-pending-badge'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.textContent = n; el.classList.toggle('zero', n === 0); }
      });
      this.renderQueue();
    });
  },

  renderQueue() {
    const wrap = document.getElementById('order-queue');
    if (!wrap) return;

    // Preserve open card state
    wrap.querySelectorAll('.order-card-body.open').forEach(el => {
      this._openCards.add(el.id.replace('body-', ''));
    });

    let list = this.orders;
    if (this.activeView === 'pending') list = list.filter(o => o.status === 'pending');
    if (this.activeView === 'sent')    list = list.filter(o => o.status === 'sent');
    const listIds = new Set(list.map(o => o._id));
    for (const id of this._openCards) { if (!listIds.has(id)) this._openCards.delete(id); }

    if (!list.length) {
      const msgs = {
        pending: ['ti-clock','No pending orders yet.<br>Waiting for the worker to submit.'],
        sent:    ['ti-mail-check','No sent orders yet.'],
        all:     ['ti-inbox','No orders yet.'],
      };
      const [ic, msg] = msgs[this.activeView] || msgs.all;
      wrap.innerHTML = `<div class="empty-queue"><i class="ti ${ic}"></i><p>${msg}</p></div>`;
      return;
    }
    wrap.innerHTML = list.map(o => this._orderCard(o)).join('');
    for (const id of this._openCards) {
      document.getElementById(`body-${id}`)?.classList.add('open');
      document.getElementById(`chev-${id}`)?.classList.add('open');
    }
  },

  _orderCard(o) {
    const ts        = o.submittedAt?.toDate ? fmtTime(o.submittedAt.toDate()) : fmtTime(o.submittedAt);
    const isPending = o.status === 'pending';
    const isSent    = o.status === 'sent';
    const items     = o.items || [];
    const statusLabel = isPending ? 'Pending review' : isSent ? 'Sent' : o.status;
    const statusClass = isPending ? 'status-pending' : 'status-sent';

    const rows = items.map((item, idx) => `
      <div class="order-line">
        <div class="order-line-info">
          <div class="order-line-name">${esc(item.description)}</div>
          <div class="order-line-code">${esc(item.partCode)}</div>
        </div>
        <div class="order-line-right">
          ${isPending ? `
            <div class="qty-row">
              <button class="qty-btn" data-qdec="${o._id}" data-idx="${idx}">−</button>
              <input class="qty-edit" type="number" min="0" step="1" value="${item.qty}"
                data-qchange="${o._id}" data-idx="${idx}" id="qinp-${o._id}-${idx}">
              <button class="qty-btn" data-qinc="${o._id}" data-idx="${idx}">+</button>
            </div>` : `<span class="order-line-qty">× ${item.qty}</span>`}
          <span style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:6px">
            ${esc(item.qtyType||'')}</span>
        </div>
      </div>`).join('');

    const actions = isPending ? `
      <button class="btn btn-green" data-approve="${o._id}">
        <i class="ti ti-mail"></i> Approve &amp; send email
      </button>
      <button class="btn btn-danger" data-delete="${o._id}">
        <i class="ti ti-x"></i> Reject
      </button>` : isSent ? `
      <span class="sent-stamp"><i class="ti ti-circle-check"></i> Email sent</span>
      <button class="btn btn-outline" data-delete="${o._id}" style="margin-top:8px">
        <i class="ti ti-trash"></i> Delete record
      </button>` : '';

    return `<div class="order-card" id="card-${o._id}">
      <div class="order-card-header" data-card-id="${o._id}">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%">
          <div>
            <div class="order-ref-text">${esc(o.ref||o._id)}</div>
            <div class="order-meta">${ts} · ${items.length} line${items.length!==1?'s':''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="status-pill ${statusClass}">${statusLabel}</span>
            <i class="ti ti-chevron-right chevron" id="chev-${o._id}"></i>
          </div>
        </div>
      </div>
      <div class="order-card-body" id="body-${o._id}">
        ${isPending ? '<div class="edit-note">You can edit quantities before approving.</div>' : ''}
        ${rows}
        <div class="order-card-actions">${actions}</div>
      </div>
    </div>`;
  },

  toggleCard(id) {
    const body = document.getElementById(`body-${id}`);
    const chev = document.getElementById(`chev-${id}`);
    if (!body) return;
    const opening = !body.classList.contains('open');
    body.classList.toggle('open', opening);
    chev?.classList.toggle('open', opening);
    if (opening) this._openCards.add(id); else this._openCards.delete(id);
  },

  async stepQty(orderId, idx, delta) {
    const order = this.orders.find(o => o._id === orderId); if (!order) return;
    const items  = [...order.items];
    const newQty = Math.max(0, (items[idx].qty||0) + delta);
    items[idx]   = { ...items[idx], qty: newQty };
    const inp = document.getElementById(`qinp-${orderId}-${idx}`);
    if (inp) inp.value = newQty;
    try { await DB.updateItems(orderId, items); }
    catch(e) { alert('Update failed: ' + e.message); }
  },
  async editQty(orderId, idx, val) {
    const order = this.orders.find(o => o._id === orderId); if (!order) return;
    const items = [...order.items];
    items[idx]  = { ...items[idx], qty: Math.max(0, parseInt(val)||0) };
    try { await DB.updateItems(orderId, items); }
    catch(e) { alert('Update failed: ' + e.message); }
  },
  async deleteOrder(id) {
    if (!confirm('Delete this order?')) return;
    try { await DB.deleteOrder(id); }
    catch(e) { alert('Delete failed: ' + e.message); }
  },

  // ══════════════════════════════════════════════════════
  // EMAIL (shared by queue approve + new order)
  // ══════════════════════════════════════════════════════
  prepareEmail(orderId) {
    const order = this.orders.find(o => o._id === orderId); if (!order) return;
    this._emailOrderId = orderId;
    const s = Settings.get();
    document.getElementById('email-to').value      = s.supplierEmail;
    document.getElementById('email-cc').value      = s.ccEmail;
    document.getElementById('email-subject').value = `Material Order — ${order.ref||order._id}`;
    document.getElementById('email-body').value    = buildEmailBody(order.ref||order._id, order.items||[]);
    this.openPanel('email-panel');
  },

  async sendEmail() {
    const to      = document.getElementById('email-to').value;
    const cc      = document.getElementById('email-cc').value;
    const subject = document.getElementById('email-subject').value;
    const body    = document.getElementById('email-body').value;
    const mailto  = `mailto:${to}?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

    // If this came from queue approval, mark it sent
    if (this._emailOrderId) {
      try { await DB.updateStatus(this._emailOrderId, 'sent'); } catch {}
      this._emailOrderId = null;
    }

    this.closePanel('email-panel');

    const ow = document.getElementById('overlay-wrap');
    ow.innerHTML = `
      <div class="success-overlay">
        <div class="success-card">
          <div class="success-icon blue"><i class="ti ti-mail-forward"></i></div>
          <h3>Opening mail client…</h3>
          <p>Outlook will open with the order pre-filled.</p>
          <button class="btn btn-primary" id="btn-done-email">Done</button>
        </div>
      </div>`;
    document.getElementById('btn-done-email').addEventListener('click', () => { ow.innerHTML = ''; });
    setTimeout(() => { window.location.href = mailto; }, 400);
  },

  // ══════════════════════════════════════════════════════
  // NEW ORDER TAB — material selection
  // ══════════════════════════════════════════════════════

  // Separate Order instance for the manager's own orders
  // (avoids conflicts with any shared state)
  _no: {_items:{}},
  noGet(id)       { return this._no._items[id] || 0; },
  noSet(id, qty)  { if (qty<=0) delete this._no._items[id]; else this._no._items[id]=qty; },
  noAdj(id, d)    { this.noSet(id, (this.noGet(id))+d); this._noChanged(); },
  noSetQty(id, v) { this.noSet(id, parseInt(v)||0);     this._noChanged(); },
  noQuickAdd(id)  { if (!this.noGet(id)) this.noSet(id, 1); this._noChanged(); },
  noZero(id)      { delete this._no._items[id]; this._noChanged(); },
  noRevAdj(id, d) { this.noAdj(id, d); },
  noRevSet(id, v) { this.noSetQty(id, v); },
  noRemove(id)    { this.noZero(id); },
  noCount()       { return Object.keys(this._no._items).length; },
  noItems()       {
    return Object.keys(this._no._items).map(id => {
      const m = this.materials.find(x => x.id==id);
      return m ? {...m, qty: this._no._items[id]} : null;
    }).filter(Boolean);
  },

  _noChanged() {
    this._updateNoBadge();
    this.renderNoList();
    if (document.getElementById('no-review-panel')?.classList.contains('open')) {
      this._renderNoReview();
    }
  },

  _updateNoBadge() {
    const b = document.getElementById('new-order-badge');
    if (!b) return;
    const n = this.noCount();
    b.textContent = n; b.style.display = n > 0 ? 'flex' : 'none';
  },

  renderNoTabs() {
    const wrap = document.getElementById('no-tabs-wrap');
    if (!wrap) return;
    this._cats = Data.categories(this.materials);
    this._subs = this.activeCat ? Data.subcategories(this.materials, this.activeCat) : [];

    const catBtns = this._cats.map((c, i) =>
      `<button class="tab ${this.activeCat===c?'active':''}" data-cat-idx="${i}">${esc(c)}</button>`
    ).join('');
    let subHtml = '';
    if (this.activeCat && this._subs.length) {
      const subBtns = this._subs.map((s, i) =>
        `<button class="tab ${this.activeSub===s?'active':''}" data-sub-idx="${i}">${esc(s)}</button>`
      ).join('');
      subHtml = `<div class="tabs-bar sub-bar">
        <div class="tabs-inner">
          <button class="tab ${!this.activeSub?'active':''}" data-sub-idx="-1">All</button>
          ${subBtns}
        </div>
      </div>`;
    }
    wrap.innerHTML = `<div class="tabs-bar">
      <div class="tabs-inner">
        <button class="tab ${!this.activeCat?'active':''}" data-cat-idx="-1">All</button>
        ${catBtns}
      </div>
    </div>${subHtml}`;
  },

  noSetCat(cat) {
    this.activeCat = cat; this.activeSub = null;
    this.renderNoTabs(); this.renderNoList();
    const s = document.getElementById('no-scroll'); if (s) s.scrollTop = 0;
  },
  noSetSub(sub) {
    this.activeSub = sub;
    this.renderNoTabs(); this.renderNoList();
    const s = document.getElementById('no-scroll'); if (s) s.scrollTop = 0;
  },

  renderNoList() {
    const q        = document.getElementById('no-search')?.value || '';
    const filtered = Data.filter(this.materials, this.activeCat, this.activeSub, q);
    const list     = document.getElementById('no-mat-list');
    if (!list) return;
    if (!filtered.length) {
      list.innerHTML = `<div class="empty-state"><i class="ti ti-package-off"></i><p>No materials found.</p></div>`;
      return;
    }
    list.innerHTML = filtered.map(m => this._noMatCard(m)).join('');
  },

  _noMatCard(m) {
    const qty = this.noGet(m.id), inOrder = qty > 0;
    const ci  = CAT_ICONS[m.category] || CAT_ICONS.default;
    return `<div class="mat-card ${inOrder?'in-order':''}">
      <button class="mat-bin" data-bin="${m.id}" aria-label="Remove">
        <i class="ti ti-trash"></i>
      </button>
      <div class="mat-icon" style="background:${ci.bg}">
        <i class="ti ${ci.icon}" style="color:${ci.color}"></i>
      </div>
      <div class="mat-info">
        <div class="mat-name">${esc(m.description)}</div>
        <div class="mat-partcode">${esc(m.partCode)}</div>
        <div class="mat-unit">${esc(m.qtyType||'')}</div>
      </div>
      <div class="mat-controls">
        <button class="qty-btn" data-dec="${m.id}">−</button>
        <input class="qty-input" type="number" min="0" step="1" value="${qty}" data-qid="${m.id}">
        <button class="qty-btn" data-inc="${m.id}">+</button>
        <button class="add-btn ${inOrder?'in-order':''}" data-add="${m.id}">
          <i class="ti ${inOrder?'ti-check':'ti-plus'}"></i>
        </button>
      </div>
    </div>`;
  },

  noClearOrder() {
    if (!confirm('Clear all items from this order?')) return;
    this._no._items = {};
    this._updateNoBadge();
    this.renderNoList();
    if (document.getElementById('no-review-panel')?.classList.contains('open')) {
      this._renderNoReview();
    }
  },

  noOpenReview() {
    this._renderNoReview();
    this.openPanel('no-review-panel');
  },

  _renderNoReview() {
    const wrap  = document.getElementById('no-review-contents');
    if (!wrap) return;
    const items = this.noItems();
    if (!items.length) {
      wrap.innerHTML = `<div class="empty-state"><i class="ti ti-clipboard"></i><p>No items on this order yet.</p></div>`;
      return;
    }
    wrap.innerHTML = items.map(i => `
      <div class="order-item">
        <div class="order-item-row">
          <div>
            <div class="order-item-name">${esc(i.description)}</div>
            <div class="order-item-code">${esc(i.partCode)}</div>
            <div class="order-item-unit">${esc(i.qtyType||'')}</div>
          </div>
          <div class="order-item-qty">× ${i.qty}</div>
        </div>
        <div class="order-item-foot">
          <button class="qty-btn" data-rdec="${i.id}">−</button>
          <input class="qty-input" type="number" min="1" step="1" value="${i.qty}" data-rqid="${i.id}">
          <button class="qty-btn" data-rinc="${i.id}">+</button>
          <button class="remove-btn" data-rrem="${i.id}"><i class="ti ti-x"></i> Remove</button>
        </div>
      </div>`).join('') + `
      <div class="order-summary-card">
        <div class="order-summary-row total">
          <span>Total items</span>
          <span>${items.reduce((s,i)=>s+i.qty,0)} across ${items.length} line${items.length!==1?'s':''}</span>
        </div>
      </div>`;
  },

  // "New Order" review button — adds a review button in the new-order view footer
  // We show it via a floating action button approach: the review panel button is shown
  // when the badge count > 0. We wire a button in the view itself.
  noComposeEmail() {
    const items = this.noItems();
    if (!items.length) { alert('No items on this order.'); return; }
    // Build email directly from new order items
    this._emailOrderId = null;  // not a queue order, don't mark as sent
    const s = Settings.get();
    document.getElementById('email-to').value      = s.supplierEmail;
    document.getElementById('email-cc').value      = s.ccEmail;
    document.getElementById('email-subject').value = `Material Order — ${this.orderRef}`;
    document.getElementById('email-body').value    = buildEmailBody(this.orderRef, items);
    this.closePanel('no-review-panel');
    this.openPanel('email-panel');
  },

  // ══════════════════════════════════════════════════════
  // SETTINGS
  // ══════════════════════════════════════════════════════
  openPanel(id)  { document.getElementById(id)?.classList.add('open'); },
  closePanel(id) { document.getElementById(id)?.classList.remove('open'); },

  _populateSettings() {
    const s  = Settings.get();
    const el = document.getElementById('settings-body');
    if (!el) return;
    el.innerHTML = `
      <div class="settings-section">
        <div class="settings-label">Email</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">To (purchasing)</div>
              <div class="settings-row-sub">Auto-filled in To: field</div></div>
            <input type="email" id="s-supplier" value="${esc(s.supplierEmail)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">CC email</div>
              <div class="settings-row-sub">Always CC'd on orders</div></div>
            <input type="email" id="s-cc" value="${esc(s.ccEmail)}">
          </div>
          <div class="settings-row">
            <div><div class="settings-row-label">Closing note</div>
              <div class="settings-row-sub">Added at end of email</div></div>
            <input type="text" id="s-delivery" value="${esc(s.deliveryNote)}">
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Materials catalogue</div>
        <div class="settings-card">
          <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:6px">
            <div class="settings-row-sub">
              Edit <strong>materials.csv</strong> in the GitHub repository and commit.
              Both devices reload automatically on next open.
            </div>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Connection</div>
        <div class="settings-card">
          <div class="settings-row">
            <div><div class="settings-row-label">Firebase config</div>
              <div class="settings-row-sub">Clear to re-enter connection details</div></div>
            <button class="btn-sm btn-sm-danger" id="btn-clear-firebase">Clear</button>
          </div>
        </div>
      </div>`;
    document.getElementById('btn-clear-firebase').addEventListener('click', () => this.clearFirebase());
  },

  saveSettings() {
    Settings.save({
      supplierEmail: document.getElementById('s-supplier')?.value.trim(),
      ccEmail:       document.getElementById('s-cc')?.value.trim(),
      deliveryNote:  document.getElementById('s-delivery')?.value.trim(),
    });
    const btn = document.getElementById('btn-save-settings');
    if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => btn.textContent = 'Save', 1500); }
  },

  clearFirebase() {
    if (!confirm('Clear Firebase config? You will need to re-enter it.')) return;
    FirebaseConfig.clear(); location.reload();
  },
};

// Wire up the "review" button in the new-order view — rendered after shell
// We watch for it via a small MutationObserver since it's inside the new-order view
document.addEventListener('DOMContentLoaded', () => Manager.init());

// After shell renders, add a floating review button to the new-order view
const _noReviewObserver = new MutationObserver(() => {
  const view = document.getElementById('view-new-order');
  if (view && !document.getElementById('btn-no-review')) {
    // Insert a sticky action bar at the bottom of the new-order view
    const bar = document.createElement('div');
    bar.className = 'action-bar';
    bar.innerHTML = `<div class="action-bar-inner">
      <button class="btn btn-primary" id="btn-no-review">
        <i class="ti ti-clipboard-list"></i> Review &amp; compose email
      </button>
    </div>`;
    view.appendChild(bar);
    document.getElementById('btn-no-review').addEventListener('click', () => Manager.noOpenReview());
    _noReviewObserver.disconnect();
  }
});
_noReviewObserver.observe(document.getElementById('root'), { childList: true, subtree: true });
</script>
</body>
</html>
