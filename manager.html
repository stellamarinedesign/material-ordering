<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material Orders — Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="root"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<!-- SheetJS for Excel import -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script src="js/shared.js"></script>
<script src="js/firebase-sync.js"></script>
<script>
const Manager = {
  orders: [],
  activeView: 'pending',
  unsubscribe: null,
  importPreview: null,  // parsed rows from Excel, awaiting confirmation

  async init() {
    const cfg = FirebaseConfig.get();
    if (!cfg) { this.showSetup(); return; }
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Could not connect. Check your Firebase config.'); return; }
    this.renderShell();
    this.startListening();
  },

  // ── SETUP ──
  showSetup(err) {
    document.getElementById('root').innerHTML = `
      <div class="setup-screen">
        <div class="setup-card">
          <h2><i class="ti ti-flame" style="color:#ea580c;vertical-align:-2px"></i> Connect to Firebase</h2>
          <p>Enter your Firebase project config to receive orders from the iPad.</p>
          ${err ? `<div style="background:var(--red-bg);color:var(--red-text);border-radius:var(--radius);padding:10px 12px;font-size:13px;margin-bottom:12px">${esc(err)}</div>` : ''}
          <div class="setup-field"><label>API Key</label><input id="cfg-apiKey" placeholder="AIzaSy..." autocomplete="off"></div>
          <div class="setup-field"><label>Project ID</label><input id="cfg-projectId" placeholder="my-project-id" autocomplete="off"></div>
          <div class="setup-field"><label>App ID</label><input id="cfg-appId" placeholder="1:123456:web:abc..." autocomplete="off"></div>
          <button class="btn btn-primary" style="margin-top:8px" onclick="Manager.saveConfig()">
            <i class="ti ti-plug"></i> Connect
          </button>
          <div class="setup-note" style="margin-top:14px">
            Same config as the iPad. See README.md for setup guide.
          </div>
        </div>
      </div>`;
  },

  async saveConfig() {
    const apiKey = document.getElementById('cfg-apiKey').value.trim();
    const projectId = document.getElementById('cfg-projectId').value.trim();
    const appId = document.getElementById('cfg-appId').value.trim();
    if (!apiKey || !projectId || !appId) { alert('Please fill in all fields.'); return; }
    const cfg = { apiKey, projectId, appId, authDomain:`${projectId}.firebaseapp.com`, storageBucket:`${projectId}.appspot.com`, messagingSenderId:'000000000000' };
    const ok = await DB.init(cfg);
    if (!ok) { this.showSetup('Connection failed. Double-check your config values.'); return; }
    FirebaseConfig.save(cfg);
    this.renderShell();
    this.startListening();
  },

  // ── SHELL ──
  renderShell() {
    document.getElementById('root').innerHTML = `
      <div class="page-wrap manager-wrap">
        <div class="header manager">
          <div class="header-left">
            <div class="header-title">Material Orders — Manager</div>
            <div class="header-ref"><span class="live-dot"></span>Live</div>
          </div>
          <div class="header-actions">
            <span class="role-pill">Production Manager</span>
            <button class="icon-btn" onclick="Manager.openSettings()" title="Settings" aria-label="Settings">
              <i class="ti ti-settings"></i>
            </button>
          </div>
        </div>
        <div class="manager-body" style="flex:1;min-height:0">
          <div class="manager-sidebar">
            <div class="sidebar-section">
              <div class="sidebar-title">Orders</div>
              <button class="sidebar-btn active" id="sb-pending" onclick="Manager.setView('pending')">
                <i class="ti ti-clock"></i> Pending
                <span class="sidebar-count zero" id="pending-count">0</span>
              </button>
              <button class="sidebar-btn" id="sb-sent" onclick="Manager.setView('sent')">
                <i class="ti ti-mail-check"></i> Sent
              </button>
              <button class="sidebar-btn" id="sb-all" onclick="Manager.setView('all')">
                <i class="ti ti-list"></i> All
              </button>
            </div>
            <div class="sidebar-section">
              <div class="sidebar-title">Catalogue</div>
              <button class="sidebar-btn" onclick="Manager.openImport()">
                <i class="ti ti-file-spreadsheet"></i> Import from Excel
              </button>
              <button class="sidebar-btn" onclick="Manager.openSettings()">
                <i class="ti ti-adjustments"></i> Settings
              </button>
            </div>
          </div>
          <div class="manager-main">
            <div class="order-queue" id="order-queue">
              <div class="empty-queue"><i class="ti ti-loader" style="animation:spin 1s linear infinite"></i><p>Loading…</p></div>
            </div>
          </div>
        </div>
      </div>
      <div id="email-panel-wrap"></div>
      <div id="settings-panel-wrap"></div>
      <div id="import-panel-wrap"></div>
      <div id="overlay-wrap"></div>`;
  },

  setView(v) {
    this.activeView = v;
    ['pending','sent','all'].forEach(x => {
      document.getElementById(`sb-${x}`)?.classList.toggle('active', x === v);
    });
    this.renderQueue();
  },

  // ── LIVE ORDERS ──
  startListening() {
    if (this.unsubscribe) this.unsubscribe();
    this.unsubscribe = DB.listenOrders(orders => {
      this.orders = orders;
      const pending = orders.filter(o => o.status === 'pending').length;
      const badge = document.getElementById('pending-count');
      if (badge) { badge.textContent = pending; badge.classList.toggle('zero', pending === 0); }
      this.renderQueue();
    });
  },

  renderQueue() {
    const wrap = document.getElementById('order-queue');
    if (!wrap) return;
    let list = this.orders;
    if (this.activeView === 'pending') list = list.filter(o => o.status === 'pending');
    if (this.activeView === 'sent')    list = list.filter(o => o.status === 'sent');

    if (!list.length) {
      const msgs = {
        pending: ['ti-clock','No pending orders yet.<br>Waiting for the worker to submit.'],
        sent:    ['ti-mail-check','No sent orders yet.'],
        all:     ['ti-inbox','No orders yet.'],
      };
      const [icon, msg] = msgs[this.activeView] || msgs.all;
      wrap.innerHTML = `<div class="empty-queue"><i class="ti ${icon}"></i><p>${msg}</p></div>`;
      return;
    }
    wrap.innerHTML = list.map(o => this.orderCardHtml(o)).join('');
  },

  orderCardHtml(o) {
    const ts = o.submittedAt?.toDate ? fmtTime(o.submittedAt.toDate()) : fmtTime(o.submittedAt);
    const isPending = o.status === 'pending';
    const isSent = o.status === 'sent';
    const statusLabel = isPending ? 'Pending review' : isSent ? 'Sent' : o.status;
    const statusClass = isPending ? 'status-pending' : isSent ? 'status-sent' : 'status-pending';
    const items = o.items || [];

    const itemRows = items.map((item, idx) => `
      <div class="order-line">
        <div class="order-line-info">
          <div class="order-line-name">${esc(item.description)}</div>
          <div class="order-line-code">${esc(item.partCode)}</div>
        </div>
        <div class="order-line-right">
          ${isPending
            ? `<input class="qty-edit" type="number" min="0" step="1" value="${item.qty}" onchange="Manager.editQty('${o._id}',${idx},this.value)" title="Edit quantity">`
            : `<span class="order-line-qty">× ${item.qty}</span>`}
          <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${esc(item.qtyType||'')}</span>
        </div>
      </div>`).join('');

    const actionBtns = isPending ? `
      <button class="btn btn-green" onclick="Manager.openEmail('${o._id}')">
        <i class="ti ti-mail"></i> Approve &amp; send email
      </button>
      <button class="btn btn-danger" onclick="Manager.deleteOrder('${o._id}')">
        <i class="ti ti-x"></i> Reject
      </button>` : isSent ? `
      <span class="sent-stamp"><i class="ti ti-circle-check"></i> Email sent</span>
      <button class="btn btn-outline" style="margin-top:8px" onclick="Manager.deleteOrder('${o._id}')">
        <i class="ti ti-trash"></i> Delete record
      </button>` : '';

    return `<div class="order-card" id="card-${o._id}">
      <div class="order-card-header" onclick="Manager.toggleCard('${o._id}')">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%">
          <div>
            <div class="order-ref-text">${esc(o.ref||o._id)}</div>
            <div class="order-meta">${ts} · ${items.length} line${items.length!==1?'s':''}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="status-pill ${statusClass}">${statusLabel}</span>
            <i class="ti ti-chevron-right chevron" id="chev-${o._id}"></i>
          </div>
        </div>
      </div>
      <div class="order-card-body" id="body-${o._id}">
        ${isPending ? '<div class="edit-note">You can edit quantities before approving.</div>' : ''}
        ${itemRows}
        <div class="order-card-actions">${actionBtns}</div>
      </div>
    </div>`;
  },

  toggleCard(id) {
    const body = document.getElementById(`body-${id}`);
    const chev = document.getElementById(`chev-${id}`);
    const isOpen = body?.classList.contains('open');
    body?.classList.toggle('open', !isOpen);
    chev?.classList.toggle('open', !isOpen);
  },

  async editQty(orderId, idx, val) {
    const order = this.orders.find(o => o._id === orderId);
    if (!order) return;
    const items = [...order.items];
    items[idx] = { ...items[idx], qty: Math.max(0, parseInt(val) || 0) };
    try { await DB.updateItems(orderId, items); }
    catch (e) { alert('Update failed: ' + e.message); }
  },

  async deleteOrder(id) {
    if (!confirm('Delete this order?')) return;
    try { await DB.deleteOrder(id); }
    catch (e) { alert('Delete failed: ' + e.message); }
  },

  // ── EMAIL ──
  openEmail(orderId) {
    const order = this.orders.find(o => o._id === orderId);
    if (!order) return;
    const s = Settings.get();
    const body = buildEmailBody(order.ref || order._id, order.items || []);
    document.getElementById('email-panel-wrap').innerHTML = `
      <div class="panel" id="email-panel">
        <div class="panel-header">
          <button class="back-btn" onclick="Manager.closeEmail()"><i class="ti ti-chevron-left"></i> Back</button>
          <div class="panel-title">Order Email</div>
          <button class="btn-green btn" style="width:auto;padding:7px 14px;font-size:13px" onclick="Manager.sendEmail('${orderId}')">
            <i class="ti ti-send"></i> Send
          </button>
        </div>
        <div class="email-field"><label>To</label><input type="email" id="email-to" value="${esc(s.supplierEmail)}"></div>
        <div class="email-field"><label>CC</label><input type="email" id="email-cc" value="${esc(s.ccEmail)}"></div>
        <div class="email-field"><label>Subject</label><input type="text" id="email-subject" value="${esc('Material Order — ' + (order.ref||order._id))}"></div>
        <div class="email-body-wrap"><textarea id="email-body">${esc(body)}</textarea></div>
      </div>`;
    requestAnimationFrame(() => document.getElementById('email-panel')?.classList.add('open'));
  },

  closeEmail() { document.getElementById('email-panel')?.classList.remove('open'); },

  async sendEmail(orderId) {
    const to = document.getElementById('email-to').value;
    const cc = document.getElementById('email-cc').value;
    const subject = document.getElementById('email-subject').value;
    const body = document.getElementById('email-body').value;
    const mailto = `mailto:${to}?cc=${encodeURIComponent(cc)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    try { await DB.updateStatus(orderId, 'sent'); } catch {}
    this.closeEmail();
    document.getElementById('overlay-wrap').innerHTML = `
      <div class="success-overlay">
        <div class="success-card">
          <div class="success-icon blue"><i class="ti ti-mail-forward"></i></div>
          <h3>Opening mail client…</h3>
          <p>Order marked as sent. Outlook will open with the order pre-filled.</p>
          <button class="btn btn-primary" onclick="document.getElementById('overlay-wrap').innerHTML=''">Done</button>
        </div>
      </div>`;
    setTimeout(() => { window.location.href = mailto; }, 400);
  },

  // ── EXCEL IMPORT ──
  openImport() {
    this.importPreview = null;
    document.getElementById('import-panel-wrap').innerHTML = `
      <div class="panel" id="import-panel">
        <div class="panel-header">
          <button class="back-btn" onclick="Manager.closeImport()"><i class="ti ti-chevron-left"></i> Back</button>
          <div class="panel-title">Import Materials</div>
          <div class="panel-spacer"></div>
        </div>
        <div class="settings-scroll">
          <div class="settings-section">
            <div class="settings-label">Upload spreadsheet</div>
            <div class="import-zone" id="import-zone" onclick="document.getElementById('file-input').click()"
              ondragover="event.preventDefault();this.classList.add('drag-over')"
              ondragleave="this.classList.remove('drag-over')"
              ondrop="Manager.handleDrop(event)">
              <i class="ti ti-file-spreadsheet"></i>
              <p>Tap to choose an Excel file (.xlsx)<br>or drag and drop here</p>
              <small>Columns: Part Code · Description · Category · Subcategory · Quantity Type</small>
            </div>
            <input type="file" id="file-input" accept=".xlsx,.xls,.csv" style="display:none" onchange="Manager.handleFile(this.files[0])">
          </div>

          <div class="settings-section">
            <div class="settings-label">Spreadsheet format</div>
            <div class="settings-card">
              <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:6px">
                <div class="settings-row-sub">Your spreadsheet must have these column headers in row 1 (order doesn't matter):</div>
                <div style="font-family:var(--mono);font-size:12px;background:var(--bg);padding:8px 10px;border-radius:var(--radius);width:100%;line-height:1.8">
                  Part Code<br>Description<br>Category<br>Subcategory<br>Quantity Type
                </div>
                <div class="settings-row-sub">Once imported, the updated list is pushed to Firebase and the iPad will update automatically.</div>
              </div>
            </div>
          </div>

          <div id="import-preview-wrap"></div>
        </div>
      </div>`;
    requestAnimationFrame(() => document.getElementById('import-panel')?.classList.add('open'));
  },

  closeImport() { document.getElementById('import-panel')?.classList.remove('open'); },

  handleDrop(e) {
    e.preventDefault();
    document.getElementById('import-zone')?.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) this.handleFile(file);
  },

  handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

        // Normalise column names (trim + case-insensitive)
        const normalised = rows.map(r => {
          const out = {};
          Object.keys(r).forEach(k => { out[k.trim().toLowerCase()] = String(r[k]).trim(); });
          return out;
        }).filter(r => r['part code'] || r['partcode'] || r['part_code']);

        if (!normalised.length) {
          alert('No valid rows found. Check your column headers match: Part Code, Description, Category, Subcategory, Quantity Type');
          return;
        }

        this.importPreview = normalised.map((r, i) => ({
          id: i + 1,
          partCode:    r['part code'] || r['partcode'] || r['part_code'] || '',
          description: r['description'] || '',
          category:    r['category'] || 'Uncategorised',
          subcategory: r['subcategory'] || 'General',
          qtyType:     r['quantity type'] || r['qty type'] || r['quantitytype'] || 'Each',
        }));

        this.renderImportPreview();
      } catch (err) {
        alert('Could not read file: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  },

  renderImportPreview() {
    const wrap = document.getElementById('import-preview-wrap');
    if (!wrap || !this.importPreview) return;
    const preview = this.importPreview.slice(0, 8);
    const more = this.importPreview.length - preview.length;
    wrap.innerHTML = `
      <div class="settings-section">
        <div class="settings-label">Preview — ${this.importPreview.length} materials found</div>
        <div class="import-preview">
          <div class="import-preview-header">
            <span>Part Code · Description</span>
            <span>Category / Sub</span>
          </div>
          ${preview.map(r => `
            <div class="import-preview-row">
              <div style="flex:1;min-width:0">
                <span class="import-preview-code">${esc(r.partCode)}</span>
                <span style="color:var(--text);margin-left:6px">${esc(r.description)}</span>
              </div>
              <div style="font-size:11px;color:var(--text3);flex-shrink:0;text-align:right">${esc(r.category)}<br>${esc(r.subcategory)}</div>
            </div>`).join('')}
          ${more > 0 ? `<div class="import-preview-row" style="color:var(--text3);font-style:italic">…and ${more} more</div>` : ''}
        </div>
        <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
          <button class="btn btn-primary" onclick="Manager.confirmImport()">
            <i class="ti ti-cloud-upload"></i> Push to Firebase (updates iPad automatically)
          </button>
          <button class="btn btn-outline" onclick="Manager.cancelImport()">
            <i class="ti ti-x"></i> Cancel
          </button>
        </div>
      </div>`;
  },

  cancelImport() {
    this.importPreview = null;
    document.getElementById('import-preview-wrap').innerHTML = '';
  },

  async confirmImport() {
    if (!this.importPreview?.length) return;
    try {
      await DB.pushMaterials(this.importPreview);
      // Also save locally
      Data.save(this.importPreview);
      this.closeImport();
      document.getElementById('overlay-wrap').innerHTML = `
        <div class="success-overlay">
          <div class="success-card">
            <div class="success-icon green"><i class="ti ti-circle-check"></i></div>
            <h3>Materials updated!</h3>
            <p>${this.importPreview.length} materials pushed to Firebase. The iPad will update automatically next time it connects.</p>
            <button class="btn btn-primary" onclick="document.getElementById('overlay-wrap').innerHTML=''">Done</button>
          </div>
        </div>`;
    } catch (e) {
      alert('Import failed: ' + e.message);
    }
  },

  // ── SETTINGS ──
  openSettings() {
    const s = Settings.get();
    document.getElementById('settings-panel-wrap').innerHTML = `
      <div class="panel" id="settings-panel">
        <div class="panel-header">
          <button class="back-btn" onclick="Manager.closeSettings()"><i class="ti ti-chevron-left"></i> Back</button>
          <div class="panel-title">Settings</div>
          <button class="btn-sm btn-sm-save" onclick="Manager.saveSettings()">Save</button>
        </div>
        <div class="settings-scroll">

          <div class="settings-section">
            <div class="settings-label">Email</div>
            <div class="settings-card">
              <div class="settings-row">
                <div><div class="settings-row-label">To (purchasing email)</div><div class="settings-row-sub">Auto-filled in To: field</div></div>
                <input type="email" id="s-supplier" value="${esc(s.supplierEmail)}">
              </div>
              <div class="settings-row">
                <div><div class="settings-row-label">CC email</div><div class="settings-row-sub">Always CC'd on orders</div></div>
                <input type="email" id="s-cc" value="${esc(s.ccEmail)}">
              </div>
              <div class="settings-row">
                <div><div class="settings-row-label">Sender name</div><div class="settings-row-sub">Shown at bottom of email</div></div>
                <input type="text" id="s-sender" value="${esc(s.senderName)}">
              </div>
              <div class="settings-row">
                <div><div class="settings-row-label">Delivery / closing note</div><div class="settings-row-sub">Added at end of email body</div></div>
                <input type="text" id="s-delivery" value="${esc(s.deliveryNote)}">
              </div>
            </div>
          </div>

          <div class="settings-section">
            <div class="settings-label">Materials catalogue</div>
            <div class="settings-card">
              <div class="settings-row" style="flex-direction:column;align-items:flex-start;gap:6px">
                <div class="settings-row-sub">To update the materials list, use <strong>Import from Excel</strong> in the sidebar. This pushes changes to Firebase and the iPad updates automatically.</div>
              </div>
            </div>
          </div>

          <div class="settings-section">
            <div class="settings-label">Connection</div>
            <div class="settings-card">
              <div class="settings-row">
                <div><div class="settings-row-label">Firebase config</div><div class="settings-row-sub">Clear to re-enter connection details</div></div>
                <button class="btn-sm btn-sm-danger" onclick="Manager.clearFirebase()">Clear</button>
              </div>
            </div>
          </div>

        </div>
      </div>`;
    requestAnimationFrame(() => document.getElementById('settings-panel')?.classList.add('open'));
  },

  closeSettings() { document.getElementById('settings-panel')?.classList.remove('open'); },

  saveSettings() {
    Settings.save({
      supplierEmail: document.getElementById('s-supplier')?.value.trim(),
      ccEmail:       document.getElementById('s-cc')?.value.trim(),
      senderName:    document.getElementById('s-sender')?.value.trim(),
      deliveryNote:  document.getElementById('s-delivery')?.value.trim(),
    });
    const btn = document.querySelector('[onclick="Manager.saveSettings()"]');
    if (btn) { btn.textContent = '✓ Saved'; setTimeout(() => btn.textContent = 'Save', 1500); }
  },

  clearFirebase() {
    if (!confirm('Clear Firebase config? You will need to re-enter it.')) return;
    FirebaseConfig.clear();
    location.reload();
  },
};

document.addEventListener('DOMContentLoaded', () => Manager.init());
</script>
</body>
</html>
